<!--
  ═══════════════════════════════════════════════════════════════════════
  MERCHLIST — Pricing Engine v77
  ═══════════════════════════════════════════════════════════════════════
  V77 changes (from v76):
    • MASTERSHEET column reorder: Status moved S→Q (editable cols first),
      Total Stock Q→R, # Alt Suppliers R→S (formula/robot cols last).
    • Engine code is UNCHANGED — PDATA structure stays at 22 fields;
      Status is still at PDATA pos 14 (stockCode) + pos 18 (raw text).
    • Build script (server-side) reads Status from mastersheet col Q (17)
      instead of col S (19). All other column positions are unchanged.
    • Bonus fix: Dashboard B19/B20/B21 status counts now point at Q:Q
      (were pointing at R:R, returning 0 for all status counts).
  V64 changes (from v63):
    • UAE Delivery moved INTO q-totals box (inline before Total row)
    • Total inc. VAT now dynamically includes delivery as you type
    • Email quote + Quote Builder copy text show delivery line when > 0
    • Rubik's Cube: defaults to 6 sides, side buttons extend 1-6
    • Other products unchanged: side buttons stay 1-4
  Carries forward from v62.x:
    • V62.20  Densified tier table (19 tiers, original anchors preserved)
    • V62.19  Sublimation on Hardline = DTF cost/price formula
    • V62.18  Product Finder 2.0 (similar products + Request Upload msg)
    • V62.14  Searchable supplier filter
    • V62.10  Inline screen-print tip + redesigned quote totals
    • V62.6+  Subtle section dividers in calc card
  ═══════════════════════════════════════════════════════════════════════
-->

   V39: Mobile responsive — CORRECTED LAYOUT
   Fixes: V37 broke .body overflow which collapsed scroll
   containers, making taps unreliable on Android.
   ═══════════════════════════════════════════════════════════ */

@media (max-width: 900px){
  /* CRITICAL: Keep .body overflow:hidden — DO NOT use overflow:visible.
     Without this, .plist can't compute its scroll height, products
     overflow visually, and taps land on the wrong element. */
  .body{flex-direction:column;overflow:hidden}
  
  /* Sidebar: full width, height-constrained, MUST have overflow:hidden 
     so .plist inside it can scroll properly. */
  .sb{width:100%;height:38vh;max-height:38vh;border-right:none;border-bottom:1px solid #e5e7eb;flex-shrink:0;overflow:hidden}
  
  /* Main content scrolls internally — keep its overflow-y:auto */
  .mn{padding:14px 14px 24px}
  
  /* Topbar: compact, but NO wrap (wrap breaks layout) */
  .topbar{padding:0 12px;height:46px;flex-shrink:0}
  .tb-r{font-size:9px;letter-spacing:.5px}
  .tb-l{gap:6px;min-width:0;overflow:hidden}
  .tb-tabs{margin-left:4px;gap:1px}
  
  /* Calculator card tighter */
  .cd{padding:14px;margin-bottom:10px;border-radius:10px}
  .ph{gap:10px}

var ICACHE={};
DCACHE={};
// V25: SKU-first image + short description fetch from WooCommerce
function loadProductData(p, cb){
  if(!p||!p.sku){cb(null);return;}
  if(ICACHE[p.sku]!==undefined && DCACHE[p.sku]!==undefined){
    cb({img:ICACHE[p.sku], desc:DCACHE[p.sku], url:null});
    return;
  }
  try{
    var cached=localStorage.getItem('ml_pd_'+p.sku);
    if(cached){
      var pd=JSON.parse(cached);
      if(pd&&pd._t&&(Date.now()-pd._t < 7*24*60*60*1000)){
        ICACHE[p.sku]=pd.img||false;
        DCACHE[p.sku]=pd.desc||'';
        cb({img:pd.img||false, desc:pd.desc||'', url:pd.url||null});
        return;
      }
    }
  }catch(e){}
  ICACHE[p.sku]=null; DCACHE[p.sku]=null;
  /* v67: Sheet-provided Product Image is primary IF it looks like a direct image URL.
     Drive folder URLs (drive.google.com/drive/folders/...) are NOT direct images and fall through to WC API. */
  function _ml_isDirectImg(u){
    if(!u) return false;
    if(/\.(jpe?g|png|webp|gif|avif|bmp|svg)(\?|$)/i.test(u)) return true;
    if(/drive\.google\.com\/(uc|thumbnail)\?/i.test(u)) return true;
    if(/(googleusercontent|cloudinary|imgix|wp-content\/uploads)/i.test(u)) return true;
    return false;
  }
  if(p.prodImg && _ml_isDirectImg(p.prodImg)){
    ICACHE[p.sku]=p.prodImg; DCACHE[p.sku]="";
    try{localStorage.setItem("ml_pd_"+p.sku,JSON.stringify({img:p.prodImg,desc:"",url:null,_t:Date.now()}));}catch(e){}
    cb({img:p.prodImg, desc:"", url:null});
    return;
  }
  var skuQ=ML_ENDPOINTS.wcBySku(p.sku);
  var titleQ=ML_ENDPOINTS.wcByTitle(p.title);
  function stripHTML(s){return String(s||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/\s+/g,' ').trim();}
  function parseProduct(d){
    try{
      var data=Array.isArray(d)?d:(d&&d.contents?JSON.parse(d.contents):d);
      if(!Array.isArray(data))data=data?[data]:[];
      if(!data.length)return null;
      var prod=data[0];
      return {
        img:(prod.images&&prod.images[0]&&prod.images[0].src)?prod.images[0].src:null,
        desc:stripHTML(prod.short_description||prod.description||'').slice(0,280),
        url:prod.permalink||null
      };
    }catch(e){return null;}
  }
  function done(r){
    var img=r&&r.img||false, desc=r&&r.desc||'', url=r&&r.url||null;
    ICACHE[p.sku]=img; DCACHE[p.sku]=desc;
    try{localStorage.setItem('ml_pd_'+p.sku, JSON.stringify({img:img,desc:desc,url:url,_t:Date.now()}));}catch(e){}
    cb({img:img,desc:desc,url:url});
  }
  function tryFetch(url, useProxy, onResult){
    var sig=null; try{sig=AbortSignal.timeout(8000);}catch(e){}
    var u=useProxy?(PROX+encodeURIComponent(url)):url;
    fetch(u, sig?{signal:sig}:{})
      .then(function(r){return r.json();})
      .then(function(d){onResult(parseProduct(d));})
      .catch(function(){onResult(null);});
  }
  // 4-stage chain: direct-SKU, proxy-SKU, direct-title, proxy-title
  tryFetch(skuQ, false, function(r1){
    if(r1&&r1.img){done(r1);return;}
    tryFetch(skuQ, true, function(r2){
      if(r2&&r2.img){done(r2);return;}
      tryFetch(titleQ, false, function(r3){
        if(r3&&r3.img){done(r3);return;}
        tryFetch(titleQ, true, function(r4){done(r4);});
      });
    });
  });
}
function loadImg(p, cb){loadProductData(p, function(pd){cb(pd&&pd.img?pd.img:false);});}

function buildFinder(){
  if(S.fl)return "<div class='fload'>Searching\u2026</div>";

  return "<div class='fres'>"+good.map(function(x){
    var sc=Math.round(x.score*100),bg=sc>=80?"#16a34a":sc>=60?"#ca8a04":"#6b7280",g=gridOf(x.p),gn=(x.p.tags&&x.p.tags.length)?x.p.tags.slice(0,2).join(" / "):(g==="S"?"Softline":g==="H"?"Hardline":"Custom");

// ── FUZZY SEARCH ─────────────────────────────────────────────────────────
// Normalises input so "tshirt" matches "t-shirt", "polo shirt" matches "polo",
// single-char typos are tolerated (Levenshtein ≤1 on individual words).
function normStr(s){
  return s.toLowerCase()
    .replace(/[-_]/g,' ')        // t-shirt → t shirt
    .replace(/\s+/g,' ')
    .trim();
}
// Alias map: common alternate spellings / abbreviations
var ALIASES={
  'tshirt':'t shirt','tshirts':'t shirts',
  'hoodie':'hoodies','hoodies':'hoodie',
  'polo':'polo shirt','polos':'polo shirt',
  'cap':'baseball cap','caps':'baseball cap',
  'mug':'ceramic mug','bottle':'water bottle',
  'bag':'tote bag','bags':'tote bag',
  'notebook':'notebook','notepad':'notebook',
  'pen':'ballpoint pen','pens':'metal pen',
  'powerbank':'power bank','power bank':'powerbank',
  'usb':'usb stick'
};
function expandQuery(q){
  var n=normStr(q),words=n.split(' '),extra=[];
  words.forEach(function(w){if(ALIASES[w])extra.push(ALIASES[w]);});
  return [n].concat(extra);
}
function levenshtein(a,b){
  if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;
  var m=[];
  for(var i=0;i<=b.length;i++){m[i]=[i];for(var j=1;j<=a.length;j++){m[i][j]=i===0?j:Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(b[i-1]!==a[j-1]?1:0));}}
  return m[b.length][a.length];
}
function fuzzyScore(haystack,queries){
  var h=normStr(haystack),best=0;
  queries.forEach(function(q){
    // exact substring
    if(h.indexOf(q)>=0){best=Math.max(best,1);return;}
    // word-level fuzzy: all query words must match within distance 1
    var qWords=q.split(' '),hWords=h.split(' ');
    var allMatch=qWords.every(function(qw){
      return hWords.some(function(hw){
        if(hw.indexOf(qw)>=0||qw.indexOf(hw)>=0)return true;
        if(qw.length>=4&&levenshtein(qw,hw)<=1)return true;
        return false;
      });
    });
    if(allMatch)best=Math.max(best,0.8);
  });
  return best;
}
// V62.14: Supplier extraction helpers.
// extractSupplierSegments(supStr): split on URL/paren/comma/slash/newline → array of segments
function extractSupplierSegments(supStr){
  if(!supStr) return [];
  // Strip embedded URLs (both https:// and bare-domain forms like "Amazon.ae/...")
  var cleaned = supStr.replace(/\s+(?:https?:\/\/|[a-zA-Z0-9-]+\.[a-zA-Z]{2,5}\/)\S*/gi,'');
  return cleaned.split(/[\n,/()]/).map(function(s){return s.trim();}).filter(Boolean);
}
// Levenshtein distance — used to merge typos like Jasani/Jassani (distance=1).
function _levenshtein(a,b){
  if(a===b) return 0;
  if(!a.length) return b.length;
  if(!b.length) return a.length;
  var prev=[]; for(var j=0;j<=a.length;j++) prev[j]=j;
  for(var i=1;i<=b.length;i++){
    var curr=[i];
    for(j=1;j<=a.length;j++){
      var cost = b.charAt(i-1)===a.charAt(j-1) ? 0 : 1;
      curr[j] = Math.min(curr[j-1]+1, prev[j]+1, prev[j-1]+cost);
    }
    prev=curr;
  }
  return prev[a.length];
}
// Display formatter — title-case multi-letter words, preserve ≤3-char all-caps acronyms.
function _formatSupName(s){
  return s.split(/\s+/).map(function(w){
    if(w.length<=3 && /^[A-Z]+$/.test(w)) return w;
    return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase();
  }).join(' ');
}
// Build the supplier list with compound-split + fuzzy-merge.
// Returns { list: [{name,n}], expandedCanon: { rawNameLower: [canonical1, canonical2, ...] } }
function buildSupplierList(P){
  // PASS 1: extract raw segments from every product
  var rawCounts={};
  var rawDisplays={};  // remember the best display casing per raw key
  P.forEach(function(p){
    if(!p.sup) return;
    extractSupplierSegments(p.sup).forEach(function(seg){
      var key=seg.toLowerCase();
      rawCounts[key]=(rawCounts[key]||0)+1;
      if(!rawDisplays[key]) rawDisplays[key]=_formatSupName(seg);
    });
  });

  // Closure: try to split a multi-word name into known supplier names.
  // Recursive — handles "MTC HAK Jasani" → ["MTC", "HAK", "Jasani"].
  function tryCompoundSplit(name){
    var parts=name.split(/\s+/);
    if(parts.length<2) return [name];
    for(var i=1;i<parts.length;i++){
      var left=parts.slice(0,i).join(' ');
      var right=parts.slice(i).join(' ');
      var lk=left.toLowerCase(), rk=right.toLowerCase();
      if(rawCounts[lk] && rawCounts[rk]){
        return [].concat(tryCompoundSplit(left), tryCompoundSplit(right));
      }
    }
    return [name];
  }

  // PASS 2: compound-split. Build splitCounts (atomic supplier name counts).
  var splitCounts={};
  var splitDisplays={};
  Object.keys(rawCounts).forEach(function(key){
    var components=tryCompoundSplit(rawDisplays[key]);
    components.forEach(function(comp){
      var ck=comp.toLowerCase();
      splitCounts[ck]=(splitCounts[ck]||0)+rawCounts[key];
      if(!splitDisplays[ck]) splitDisplays[ck]=comp;
    });
  });

  // PASS 3: fuzzy-merge near-duplicates (Levenshtein ≤ 1).
  // Only merge if BOTH names have normalised-length ≥ 4 (avoid merging "MTC"/"NTC").
  var keys=Object.keys(splitCounts);
  var parent={};
  keys.forEach(function(k){parent[k]=k;});
  function find(k){while(parent[k]!==k){parent[k]=parent[parent[k]];k=parent[k];}return k;}
  function union(a,b){
    var ra=find(a), rb=find(b);
    if(ra===rb) return;
    if((splitCounts[ra]||0) >= (splitCounts[rb]||0)) parent[rb]=ra;
    else parent[ra]=rb;
  }
  for(var i=0;i<keys.length;i++){
    var a=keys[i];
    var aNorm=a.replace(/[^a-z0-9]/g,'');
    if(aNorm.length<4) continue;
    for(var j=i+1;j<keys.length;j++){
      var b=keys[j];
      var bNorm=b.replace(/[^a-z0-9]/g,'');
      if(bNorm.length<4) continue;
      if(Math.abs(aNorm.length-bNorm.length)>1) continue;
      if(_levenshtein(aNorm,bNorm)<=1){
        union(a,b);
      }
    }
  }

  // Build groups (canonical = root with highest count, display from splitDisplays)
  var groups={};
  keys.forEach(function(k){
    var root=find(k);
    if(!groups[root]) groups[root]={name:splitDisplays[root],n:0,members:[]};
    groups[root].n+=splitCounts[k];
    groups[root].members.push(k);
  });

  // Map each split key → canonical display name
  var splitToCanon={};
  Object.keys(groups).forEach(function(root){
    groups[root].members.forEach(function(m){
      splitToCanon[m]=groups[root].name;
    });
  });

  // Build EXPANDED canon map: every raw key → ARRAY of canonical names.
  // For atomic names, single-entry array. For compounds like "Jasani MTC", multi-entry.
  var expandedCanon={};
  Object.keys(rawCounts).forEach(function(rawKey){
    var components=tryCompoundSplit(rawDisplays[rawKey]);
    var canons=[];
    components.forEach(function(comp){
      var c=splitToCanon[comp.toLowerCase()];
      if(c && canons.indexOf(c)===-1) canons.push(c);
    });
    expandedCanon[rawKey]=canons;
  });

  // Final list, sorted alphabetically
  var list=Object.keys(groups).map(function(root){
    return {name:groups[root].name, n:groups[root].n};
  }).sort(function(a,b){return a.name.localeCompare(b.name);});

  return { list: list, expandedCanon: expandedCanon };
}

function fuzzyFilter(products,query){
  var queries=expandQuery(query);
  var scored=products.map(function(p){
    var ts=fuzzyScore(p.title,queries);
    var ss=fuzzyScore(p.sku,queries)*0.9;  // SKU match slightly lower priority
    return{p:p,score:Math.max(ts,ss)};
  }).filter(function(x){return x.score>0;});
  scored.sort(function(a,b){return b.score-a.score;});
  return scored.map(function(x){return x.p;});
}

        var first=Array.prototype.find.call(supList.children, function(o){return o.style.display!=='none';});
        if(first){S.sup=first.getAttribute('data-name');render();}
      }
    };
    // Wire option clicks (mousedown so it fires before blur)
    Array.prototype.forEach.call(supList.children, function(opt){
      opt.onmousedown=function(e){
        e.preventDefault();
        S.sup=this.getAttribute('data-name');
        render();
      };
    });
  }
  var supClr=document.getElementById("supClr");
  if(supClr)supClr.onclick=function(){S.sup="ALL";render();};
  document.querySelectorAll("[data-tab]").forEach(function(el){el.onclick=function(){S.tab=el.getAttribute("data-tab");render();};});
  // V62.5: detail tabs (Details / Stock) — toggle via data-dtab; pane visibility flipped without full re-render
  document.querySelectorAll("[data-dtab]").forEach(function(el){el.onclick=function(){
    var v=el.getAttribute("data-dtab"); S.dt=v;
    document.querySelectorAll(".dtab").forEach(function(b){b.classList.toggle("on", b.getAttribute("data-dtab")===v);});
    var dpDetails=document.querySelector(".dt-pane.details"); if(dpDetails) dpDetails.style.display=(v==="details"?"block":"none");
    var dpStock=document.querySelector(".dt-pane.stock"); if(dpStock) dpStock.style.display=(v==="stock"?"block":"none");
  };});
  document.querySelectorAll(".pi").forEach(function(el){el.onclick=function(){S.si=parseInt(el.getAttribute("data-i"));S.pr=false;var pm2=gpm(P[S.si]);if(!pm2.find(function(m){return m.id===S.pm;}))S.pm=pm2[0]?pm2[0].id:"dtf";render();};});
  document.querySelectorAll("[data-pm]").forEach(function(el){el.onclick=function(){S.pm=el.getAttribute("data-pm");var pm=PMS.find(function(m){return m.id===S.pm;});if(pm&&pm.f)S.sd=1;render(true);};});
  document.querySelectorAll("[data-sd]").forEach(function(el){el.onclick=function(){S.sd=parseInt(el.getAttribute("data-sd"));render(true);};});
  document.querySelectorAll("[data-fb]").forEach(function(el){el.onclick=function(){S.pr=el.getAttribute("data-fb")==="1";render(true);};});
  // V33: Web Discount handler — document-level so it survives updOut() re-renders
  if(!window._wdHandlerInstalled){
    window._wdHandlerInstalled=true;
    document.addEventListener("click",function(e){
      var btn=e.target.closest("[data-wd]");
      if(!btn)return;
      S.wd=btn.getAttribute("data-wd")==="1";
      try{localStorage.setItem("ml_wd_v1",S.wd?"1":"0");}catch(err){}
      render(true);
    });
  }
  // Finder
  var fIn=document.getElementById("fIn"),fGo=document.getElementById("fGo");
  if(fIn){fIn.oninput=function(){S.fq=this.value;};fIn.onkeydown=function(e){if(e.key==="Enter"&&fGo)fGo.click();};}
  if(fGo){fGo.onclick=function(){
    if(!S.fq||!S.fq.trim())return;
    S.fl=true;S.fr=null;render();
    setTimeout(function(){
      var queries=expandQuery(S.fq);
      var results=P.map(function(p){
        var ts=fuzzyScore(p.title,queries);
        var ss=fuzzyScore(p.sku,queries)*0.9;
        return{p:p,score:Math.max(ts,ss)};
      }).filter(function(x){return x.score>0;}).sort(function(a,b){return b.score-a.score;}).slice(0,10);
      S.fr=results;S.fl=false;render();
    },30);
  };}
  document.querySelectorAll("[data-fu]").forEach(function(el){el.onclick=function(){S.si=parseInt(el.getAttribute("data-fu"));S.tab="calc";render();};});
  updOut();
}
// V32: Load Web Discount preference from localStorage
try{var wdSaved=localStorage.getItem('ml_wd_v1');if(wdSaved!==null)S.wd=wdSaved==='1';}catch(e){}
render();
</script>

<script>
(function () {
  var KEY = 'ml_access_v1';
  var CODE = '2026';

  function isAuthed() {
    try { return localStorage.getItem(KEY) === CODE; } catch (e) { return false; }
  }

  function grantAccess() {
    if (typeof S !== 'undefined') { S.u = true; }
    if (typeof render === 'function') { render(); }
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (ch) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[ch];
    });
  }

  function showGate() {
    var gate = document.createElement('div');
    gate.id = 'ml-gate';
    gate.innerHTML =
      '<div class="ml-card">' +
        '<div class="ml-wordmark"><div class="ml-dot"></div><div class="ml-brand">MERCHLIST</div></div>' +
        '<div class="ml-title">Sales Tool Access</div>' +
        '<div class="ml-sub">Enter the team access code<br>to open the Pricing Engine.</div>' +
        '<div class="ml-field"><label class="ml-label">Access Code</label>' +
          '<input class="ml-inp" id="ml-code" type="password" inputmode="numeric" placeholder="••••" autocomplete="off" autofocus></div>' +
        '<button class="ml-btn" id="ml-submit">Unlock →</button>' +
        '<div class="ml-err" id="ml-err"></div>' +
        '<div class="ml-footer"><strong>Staff only</strong> · Access saved on this device</div>' +
      '</div>';
    document.body.appendChild(gate);

    setTimeout(function () {
      var i = document.getElementById('ml-code');
      if (i) i.focus();
    }, 80);

    function submit() {
      var inp = document.getElementById('ml-code');
      var err = document.getElementById('ml-err');
      var v = (inp.value || '').trim();
      if (v !== CODE) {
        err.textContent = 'Incorrect code. Please try again.';
        err.style.display = 'block';
        inp.value = '';
        inp.focus();
        return;
      }
      try { localStorage.setItem(KEY, CODE); } catch (e) {}
      gate.remove();
      grantAccess();
    }

    document.getElementById('ml-submit').onclick = submit;
    document.getElementById('ml-code').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') submit();
    });
  }

  if (isAuthed()) {
    grantAccess();
  } else {
    showGate();
  }

})();
</script>

<script>
(function(){
'use strict';

/* ══════════════════════════════════════════════════════
   UTIL
   ══════════════════════════════════════════════════════ */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ══════════════════════════════════════════════════════
   1. LOGO
   ══════════════════════════════════════════════════════ */
var ML_SVG='<svg class="ml-logo-svg" viewBox="0 0 148 30" xmlns="http://www.w3.org/2000/svg"><text y="24" font-family="Georgia,\'Times New Roman\',serif" font-size="25" font-weight="700" fill="#111" letter-spacing="-0.8">merchlist</text></svg>';
function initLogo(){
  var el=document.querySelector('.tb-logo');
  if(!el||document.querySelector('.ml-logo-svg')) return;
  var par=el.parentNode;
  var d=document.createElement('div'); d.innerHTML=ML_SVG;
  par.insertBefore(d.firstChild,el);
  var img=document.createElement('img'); img.className='ml-logo-img';
  par.insertBefore(img,el);
  fetch(ML_ENDPOINTS.viaProxy('https://themerchlist.com'),{signal:AbortSignal.timeout(10000)})
    .then(function(r){return r.json();})
    .then(function(d){
      var h=d.contents||'';
      var pats=[/class="custom-logo"[^>]*src="([^"]+)"/i,/src="([^"]*\/wp-content\/[^"]*logo[^"]*\.(?:png|svg|jpg|webp))"/i];
      for(var i=0;i<pats.length;i++){
        var m=h.match(pats[i]);
        if(m&&m[1]){
          var url=m[1].startsWith('http')?m[1]:'https://themerchlist.com'+m[1];
          img.onload=function(){document.querySelector('.ml-logo-svg').style.display='none';img.style.display='block';};
          img.src=url; return;
        }
      }
    }).catch(function(){});
}

/* ══════════════════════════════════════════════════════
   2. PRODUCT FINDER — URL LOOKUP ENGINE
   
   Purpose: Sales staff paste a supplier product URL.
   We check if that URL exists in our catalogue (p.supUrl).
   ══════════════════════════════════════════════════════ */

function normURL(u){
  return (u||'').toLowerCase()
    .replace(/^https?:\/\/(www\.)?/,'')
    .replace(/[?#].*/,'')          // strip query params & hash
    .replace(/\/+$/,'')            // strip trailing slashes
    .trim();
}
function getDomain(u){
  var n=normURL(u);
  return n.split('/')[0];
}
function getPathParts(u){
  var n=normURL(u);
  var parts=n.split('/').slice(1).filter(Boolean);
  return parts;
}
function urlMatchScore(query,candidate){
  if(!query||!candidate) return 0;
  var nq=normURL(query), nc=normURL(candidate);
  if(!nq||!nc) return 0;
  if(getDomain(nq)!==getDomain(nc)) return 0;
  var pq=getPathParts(nq), pc=getPathParts(nc);
  // Listing/category pages cannot be high-confidence matches
  var LISTING={shop:1,product:1,products:1,category:1,categories:1,search:1,catalog:1};
  var qListing=(pq.length===0)||(pq.length===1&&LISTING[pq[0]]);
  var cListing=(pc.length===0)||(pc.length===1&&LISTING[pc[0]]);
  if(qListing||cListing) return (qListing&&cListing)?0.20:0.30;
  // Exact match
  if(nq===nc) return 1.0;
  // Last path segment (slug) exact match
  var slugQ=pq[pq.length-1], slugC=pc[pc.length-1];
  if(slugQ===slugC) return 0.98;
  // Trailing product-ID match (e.g. Jasani -20241)
  var idQ=(slugQ.match(/-(\d{3,})$/)||[])[1];
  var idC=(slugC.match(/-(\d{3,})$/)||[])[1];
  if(idQ&&idC&&idQ===idC) return 0.92;
  // Path-overlap fallback (don't credit listing segments)
  var matching=0, minLen=Math.min(pq.length,pc.length);
  for(var i=0;i<minLen;i++){
    if(pq[i]===pc[i]&&!LISTING[pq[i]]) matching++;
    else break;
  }
  if(matching===0){
    var shared=pq.filter(function(s){return pc.indexOf(s)>=0&&s.length>4&&!LISTING[s];}).length;
    return shared>0?0.55:0.30;
  }
  return 0.30+0.4*(matching/Math.max(pq.length,pc.length));
}

function looksLikeURL(s){
  s=s.trim();
  return /^https?:\/\//i.test(s)||/^www\./i.test(s)||(s.length>6&&/\.(com|ae|net|org|co|io|me)\b/.test(s)&&s.indexOf(' ')<0);
}

/* Extract product keywords from a supplier URL path.
   e.g. /products/black-leather-notebook-a5.html → ['black','leather','notebook'] */
function extractURLKeywords(u){
  if(!u) return [];
  var n=normURL(u);
  var path=n.split('/').slice(1).join(' ');
  path=path.replace(/\.(html?|aspx?|php|asp)\b/gi,'');
  var tokens=path.split(/[^a-z0-9]+/i).filter(Boolean);
  var STOPS={'product':1,'products':1,'item':1,'items':1,'p':1,'dp':1,'gp':1,'pd':1,'sku':1,'ref':1,'shop':1,'store':1,'category':1,'cat':1,'collection':1,'collections':1,'detail':1,'details':1,'view':1,'index':1,'home':1,'cn':1,'en':1,'us':1,'uk':1,'ae':1,'the':1,'and':1,'for':1,'with':1};
  var seen={};
  return tokens.filter(function(t){
    t=t.toLowerCase();
    if(t.length<3) return false;
    if(STOPS[t]) return false;
    if(/^\d+$/.test(t)) return false;                              // pure numbers (IDs)
    if(/^[a-z]\d{4,}/i.test(t)) return false;                       // SKU-like codes
    if(t.length>=8 && /[a-z]/i.test(t) && /\d/.test(t)) return false; // long alphanum IDs (B07ZPKBL9V)
    if(seen[t]) return false;
    seen[t]=1;
    return true;
  });
}

function searchByURL(q){
  if(typeof P==='undefined') return{exact:null,similar:[],domainName:'',keywords:[]};
  var nq=normURL(q), dq=getDomain(nq);
  var best=null, domainMatches=[];
  P.forEach(function(p){
    var url=p.supUrl||'';
    if(!url) return;
    var score=urlMatchScore(q,url);
    if(score>=0.85){
      if(!best||score>best.score){
        if(best) domainMatches.push({p:best.p,score:best.score,via:'domain'});
        best={p:p,score:score};
      } else {
        domainMatches.push({p:p,score:score,via:'domain'});
      }
    } else if(score>=0.30){
      domainMatches.push({p:p,score:score,via:'domain'});
    }
  });
  // No exact → also do keyword search against catalogue
  var keywordMatches=[], keywords=[];
  if(!best){
    keywords=extractURLKeywords(q);
    if(keywords.length>0 && typeof improvedTextSearch==='function'){
      var kRes=improvedTextSearch(keywords.join(' '));
      keywordMatches=kRes.map(function(x){return{p:x.p,score:x.score,via:'keyword'};});
    }
  }
  // Merge + dedupe by SKU, keep higher score
  var bySku={};
  domainMatches.concat(keywordMatches).forEach(function(m){
    var k=m.p.sku;
    if(!bySku[k]||bySku[k].score<m.score) bySku[k]=m;
  });
  var similar=Object.keys(bySku).map(function(k){return bySku[k];});
  similar.sort(function(a,b){return b.score-a.score;});
  return{exact:best,similar:similar.slice(0,6),domainName:dq,keywords:keywords};
}

        '</div>'+

/* ══════════════════════════════════════════════════════
   3. IMPROVED TEXT SEARCH (sidebar search only)
      — kept here to improve the sidebar filter as well
   ══════════════════════════════════════════════════════ */
function mlNorm(s){return(s||'').toLowerCase().replace(/[-_\/]/g,' ').replace(/\s+/g,' ').trim();}
function mlLev(a,b){
  if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;
  var m=[];for(var i=0;i<=b.length;i++){m[i]=[i];for(var j=1;j<=a.length;j++){m[i][j]=i===0?j:Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(b[i-1]!==a[j-1]?1:0));}}
  return m[b.length][a.length];
}
function mlScoreOne(hay,q){
  var h=mlNorm(hay);if(!h||!q)return 0;
  if(h===q)return 1.0;if(h.indexOf(q)>=0)return 0.95;if(q.indexOf(h)>=0)return 0.85;
  var hW=h.split(' '),qW=q.split(' '),matched=0;
  qW.forEach(function(qw){
    if(hW.indexOf(qw)>=0){matched+=1;return;}
    if(hW.some(function(hw){return hw.indexOf(qw)>=0||qw.indexOf(hw)>=0;})){matched+=0.8;return;}
    if(qw.length>=3&&hW.some(function(hw){return mlLev(qw,hw)<=1;})){matched+=0.6;return;}
  });
  var raw=matched/qW.length;
  return raw<0.5?0:raw*0.85;
}
var ML_ALIASES={'tshirt':'t shirt','tshirts':'t shirt','tee':'t shirt','hoodie':'hoodie sweatshirt','polo':'polo shirt','cap':'cap hat','mug':'ceramic mug','bottle':'water bottle','flask':'water bottle','bag':'tote bag','tote':'tote bag','notebook':'notebook','notepad':'notebook','pen':'pen','powerbank':'power bank'};
function mlExpandQ(q){var n=mlNorm(q),qs=[n];n.split(' ').forEach(function(w){if(ML_ALIASES[w])qs.push(ML_ALIASES[w]);});return qs;}
function improvedTextSearch(q){
  if(typeof P==='undefined')return[];
  var qs=mlExpandQ(q);
  var scored=P.map(function(p){
    var ts=0,ss=0;
    qs.forEach(function(qv){ts=Math.max(ts,mlScoreOne(p.title,qv));ss=Math.max(ss,mlScoreOne(p.sku,qv)*0.85);});
    return{p:p,score:Math.max(ts,ss)};
  }).filter(function(x){return x.score>=0.4;});
  scored.sort(function(a,b){return b.score-a.score;});
  return scored.slice(0,20);
}

/* ══════════════════════════════════════════════════════
   4. INTERCEPT fGo CLICK — full finder takeover
   ══════════════════════════════════════════════════════ */
var _finderMode='idle'; // 'url' | 'text' | 'idle'
var _finderData=null;

function runFinder(q){
  if(!q||!q.trim()){_finderMode='idle';return;}
  if(looksLikeURL(q)){
    _finderMode='url';
    _finderData=searchByURL(q);
  } else {
    _finderMode='text';
    _finderData=improvedTextSearch(q);
  }
  renderFinderResults();
}

function renderFinderResults(){
  var wrap=document.querySelector('.fwrap');
  if(!wrap) return;
  // Remove old result area
  var old=wrap.querySelector('.ml-finder-results');
  if(old) old.remove();
  var div=document.createElement('div'); div.className='ml-finder-results';
  if(_finderMode==='url'){
    div.innerHTML=renderURLResults(_finderData, document.getElementById('fIn')?document.getElementById('fIn').value:'');
  } else if(_finderMode==='text'){
    // Text search results
    var results=_finderData;
    if(!results||!results.length){
      div.innerHTML='<div class="fno"><div class="ic">🔍</div><h3>No match found</h3><p>Try the exact product name or SKU.</p></div>';
    } else {
      var html='<div class="fres">';
      results.slice(0,10).forEach(function(x){
        var p=x.p,sc=Math.round(x.score*100);
        var bg=sc>=80?'#16a34a':sc>=60?'#ca8a04':'#6b7280';
        var g=(typeof gridOf==='function')?gridOf(p):'S';
        var gn=(p.tags&&p.tags.length)?p.tags.slice(0,2).join(' / '):(g==='S'?'Softline':g==='H'?'Hardline':'Custom');
        var idx=(typeof P!=='undefined')?P.indexOf(p):-1;
        html+='<div class="fmatch">'+
          '<div class="fscore" style="background:'+bg+';width:36px;text-align:center;border-radius:6px;padding:3px 0;font-size:10px;font-weight:800;color:#fff;flex-shrink:0">'+sc+'%</div>'+
          '<div class="fmi">'+
            '<div class="fmt">'+esc(p.title)+'</div>'+
            '<div class="fms">'+esc(p.sku)+' · '+esc(p.cat||'')+' <span class="bd '+g+'" style="padding:1px 6px;border-radius:12px;font-size:9px">'+gn+'</span></div>'+
          '</div>'+
          (idx>=0?'<button class="fuse" data-fu="'+idx+'" type="button">Use →</button>':'')+
        '</div>';
      });
      html+='</div>';
      div.innerHTML=html;
    }
  }
  wrap.appendChild(div);
  // Re-attach button listeners
  div.querySelectorAll('[data-ml-load]').forEach(function(btn){
    btn.onclick=function(){
      var idx=parseInt(btn.getAttribute('data-ml-load'));
      if(typeof S!=='undefined'&&typeof render==='function'){S.si=idx;S.tab='calc';render();}
    };
  });
  div.querySelectorAll('[data-fu]').forEach(function(btn){
    btn.onclick=function(){
      var idx=parseInt(btn.getAttribute('data-fu'));
      if(typeof S!=='undefined'&&typeof render==='function'){S.si=idx;S.tab='calc';render();}
    };
  });
  // Copy-message handler for Request Product Upload button
  div.querySelectorAll('[data-ml-copy-url]').forEach(function(btn){
    btn.onclick=function(){
      // Decode the URL from the data attribute
      var holder=document.createElement('textarea');
      holder.innerHTML=btn.getAttribute('data-ml-copy-url')||'';
      var url=holder.value;
      var msg='Hi George,\n\nPlease upload this product to Odoo, Mastersheet and the Website:\n\n'+url+'\n\nThanks!';
      var done=function(){
        var orig=btn.innerHTML;
        btn.innerHTML='✓ Copied to clipboard';
        btn.classList.add('on');
        btn.disabled=true;
        setTimeout(function(){btn.innerHTML=orig;btn.classList.remove('on');btn.disabled=false;},2200);
      };
      var fail=function(){
        // Fallback: select + execCommand
        var ta=document.createElement('textarea');
        ta.value=msg;
        ta.style.position='fixed';ta.style.top='-1000px';ta.style.opacity='0';
        document.body.appendChild(ta);
        ta.select();
        try{document.execCommand('copy');done();}catch(e){btn.innerHTML='✗ Copy failed — copy manually';}
        document.body.removeChild(ta);
      };
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(msg).then(done).catch(fail);
      } else { fail(); }
    };
  });
}

// Intercept fGo button with capture-phase listener (runs before onclick)
document.addEventListener('click',function(e){
  var t=e.target;
  if(!t||t.id!=='fGo') return;

function fixScreenTip(){
  var tip=document.querySelector('.tip[data-ta="screen"]');
  if(!tip||tip.dataset.ml) return;
  var tt=tip.querySelector('.tt'); if(!tt) return;
  var ts=tip.querySelector('.ts');
  var sm=tt.textContent.match(/save AED ([\d.]+)\/unit/i);
  var tsText=ts?ts.textContent:'';
  var pm=tsText.match(/([\d]+)%/);
  // V40: preserve MOQ + single color info from original ts text
  var moqMatch=tsText.match(/MOQ\s*(\d+)/i);
  var singleSide=/single color/i.test(tsText);
  if(sm&&pm){
    var subParts=[pm[1]+'% cheaper'];
    if(moqMatch)subParts.push('MOQ '+moqMatch[1]);
    if(singleSide)subParts.push('single color only');
    tip.innerHTML='<div class="tt">Switch to Screen Print \u2014 save AED '+sm[1]+'/unit <span class="ts">('+subParts.join(' \u00B7 ')+')</span></div>';
    tip.dataset.ml='1';
  }
}

var ML_LABELS={dtf:'DTF',uv:'UV Print',uvdtf:'UV Print',engrave:'Engrave',emb:'Embroidery',sand:'Sand Blast',screen:'Screen',none:'No Print'};
function fixMethodLabels(){
  document.querySelectorAll('[data-pm]').forEach(function(btn){
    var pm=btn.getAttribute('data-pm');
    if(!pm||!ML_LABELS[pm]) return;
    var lbl=btn.querySelector('.ml-lbl');

      btn.insertBefore(lbl,btn.firstChild);
    }
    lbl.textContent=ML_LABELS[pm];
  });

function fixSupplierSpec(){
  try{
    var p=(typeof S!=='undefined'&&S.si!==null&&typeof P!=='undefined')?P[S.si]:null;
    if(!p) return;
    document.querySelectorAll('.spec').forEach(function(spec){
      var lbl=spec.querySelector('.l');

      spec.classList.add('spec-sup');
      var val=spec.querySelector('.v'); if(!val) return;
      var suppliers=(p.sup||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
      var supUrl=p.supUrl||'';
      var html='';
      // V62.8: all supplier names render as plain chips; URL becomes a compact "Link ↗" chip
      suppliers.forEach(function(s){
        html+='<span class="ml-sup-chip">'+esc(s)+'</span>';
      });
      if(supUrl){
        html+='<a class="ml-sup-link" href="'+supUrl+'" target="_blank" rel="noopener" title="'+esc(supUrl)+'">'+
          'Link'+
          '<svg width="9" height="9" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'+
        '</a>';
      }
      val.innerHTML=html;
    });
  }catch(e){}
}

.ml-stk.D .ml-stk-dot{background:#9ca3af}

/* ── SHIPPING TOGGLE IN TOPBAR ── */
.ml-ship-wrap{display:inline-flex;align-items:center;gap:6px;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:8px;padding:3px;margin-right:14px}
.ml-ship-btn{padding:5px 12px;font-size:10.5px;font-weight:700;border:none;background:none;color:#6b7280;border-radius:5px;cursor:pointer;transition:all .12s;letter-spacing:.2px}
.ml-ship-btn.on{background:#111;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.ml-ship-btn:not(.on):hover{color:#111}

/* ── QUOTE BUILDER TAB ── */
.ml-qb-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;margin-left:6px;background:#16a34a;color:#fff;font-size:10px;font-weight:800;border-radius:9px;line-height:1}
.tab.on .ml-qb-badge{background:#fff;color:#111}

/* ── ADD TO QUOTE BUTTON (in main calc) ── */
.ml-addq-row{display:flex;gap:8px;margin-top:10px}
.ml-addq-btn{flex:1;padding:11px 14px;background:#fff;border:1.5px solid #111;color:#111;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.2px;transition:all .12s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.ml-addq-btn:hover{background:#111;color:#fff}
.ml-addq-btn:disabled{opacity:.5;cursor:not-allowed}
.ml-addq-btn.done{background:#16a34a;border-color:#16a34a;color:#fff}

/* ── UAE DELIVERY FIELD ── */
.ml-del-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,.025);border-radius:8px;margin-top:10px}
.ml-del-lbl{font-size:10.5px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;flex:1}
.ml-del-inp{width:110px;padding:7px 9px;border:1.5px solid #d1d5db;border-radius:6px;font-size:13px;font-weight:700;color:#111;text-align:right;background:#fff;font-family:inherit}
.ml-del-inp:focus{outline:none;border-color:#111}
.ml-del-pre{font-size:10px;color:#9ca3af;font-weight:600}

/* ── INTERNATIONAL NOTICE ── */
.ml-intl-note{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:9px;margin-top:10px}
.ml-intl-icon{font-size:16px;line-height:1;margin-top:1px}
.ml-intl-txt{flex:1;font-size:11.5px;color:#9a3412;line-height:1.45}
.ml-intl-txt strong{color:#7c2d12;font-weight:800}

/* ── QUOTE BUILDER TAB CONTENT ── */
.qb-wrap{padding:24px 28px;max-width:980px;margin:0 auto}
.qb-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px;padding-bottom:14px;border-bottom:1.5px solid #f3f4f6}
.qb-title{font-size:22px;font-weight:900;color:#111;letter-spacing:-.3px}
.qb-sub{font-size:11.5px;color:#6b7280;margin-top:3px}
.qb-actions{display:flex;gap:8px}
.qb-act-btn{padding:8px 14px;font-size:11px;font-weight:700;border:1.5px solid #e5e7eb;background:#fff;color:#111;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s}
.qb-act-btn:hover{border-color:#111}
.qb-act-btn.danger:hover{border-color:#dc2626;color:#dc2626}
.qb-act-btn.primary{background:#16a34a;color:#fff;border-color:#16a34a}
.qb-act-btn.primary:hover{background:#15803d;border-color:#15803d}

.qb-empty{padding:60px 30px;text-align:center;background:#f9fafb;border-radius:12px;border:2px dashed #e5e7eb}
.qb-empty-ic{font-size:42px;margin-bottom:12px}
.qb-empty-t{font-size:15px;font-weight:800;color:#111;margin-bottom:5px}
.qb-empty-s{font-size:12px;color:#6b7280;line-height:1.5;max-width:380px;margin:0 auto}

.qb-items{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.qb-item{display:grid;grid-template-columns:1fr auto auto auto auto;gap:14px;align-items:center;padding:13px 16px;background:#fff;border:1.5px solid #f3f4f6;border-radius:10px;transition:all .12s}
.qb-item:hover{border-color:#e5e7eb;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.qb-it-info .qb-it-t{font-size:13px;font-weight:700;color:#111;line-height:1.3}
.qb-it-info .qb-it-m{font-size:10.5px;color:#6b7280;margin-top:3px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.qb-it-info .qb-it-m .qb-pill{padding:1px 7px;background:#f3f4f6;border-radius:4px;font-size:10px;font-weight:600;color:#374151}
.qb-it-col{text-align:right}
.qb-it-lbl{font-size:9px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.qb-it-val{font-size:13px;font-weight:700;color:#111}
.qb-it-val.tot{color:#16a34a;font-weight:800}
.qb-it-rm{width:30px;height:30px;border:none;background:none;color:#9ca3af;font-size:18px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.qb-it-rm:hover{background:#fef2f2;color:#dc2626}

.qb-summary{background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:12px;padding:18px 20px}
.qb-sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12.5px}
.qb-sum-row.tot{padding-top:12px;margin-top:6px;border-top:1.5px solid #d1d5db;font-size:16px;font-weight:900}
.qb-sum-row .l{color:#6b7280;font-weight:600}
.qb-sum-row.tot .l{color:#111}
.qb-sum-row .v{font-weight:800;color:#111;font-variant-numeric:tabular-nums}
.qb-sum-row.tot .v{color:#16a34a;font-size:20px}
.qb-sum-row.del .v{color:#374151}
.qb-sum-note{font-size:10.5px;color:#9a3412;margin-top:10px;padding:8px 11px;background:#fff7ed;border-radius:6px;border:1px solid #fed7aa;line-height:1.4}

/* Toast for "added to quote" */
.ml-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#111;color:#fff;padding:11px 18px;border-radius:9px;font-size:12.5px;font-weight:700;z-index:99999;display:flex;align-items:center;gap:8px;box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none}
.ml-toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.ml-toast .ic{color:#16a34a;font-weight:900}
</style>

<script>
(function(){
  /* ═══════════════════════════════════════════════════════════
     V18: STORAGE KEYS & STATE
     ═══════════════════════════════════════════════════════════ */
  var QKEY = 'ml_quote_v1';
  var SKEY = 'ml_ship_v1';
  
  function readQuote(){
    try{ return JSON.parse(localStorage.getItem(QKEY)||'[]'); }catch(e){ return []; }
  }
  function writeQuote(arr){
    try{ localStorage.setItem(QKEY, JSON.stringify(arr)); }catch(e){}
  }
  function readShip(){
    try{ return localStorage.getItem(SKEY) || 'uae'; }catch(e){ return 'uae'; }
  }
  function writeShip(v){
    try{ localStorage.setItem(SKEY, v); }catch(e){}
  }
  /* V64: expose readShip to main scope for email template */
  try{ window.readShip = readShip; }catch(e){}
  
  // Delivery charge - session only (cleared on close, since it's deal-specific)
  var _delCharge = 0;
  /* V64: expose to window so main render() scope can read it for inline q-totals + email */
  try{ window._delCharge = 0; }catch(e){}

  /* ═══════════════════════════════════════════════════════════
     V18: SAND-BLAST TROPHY FILTER (override gpm)
     ═══════════════════════════════════════════════════════════ */
  var _gpmPatched = false;
  function patchGpm(){
    if (_gpmPatched || typeof gpm !== 'function') return;
    _gpmPatched = true;
    var orig = gpm;
    window.gpm = function(p){
      var list = orig(p);
      if (!p || !p.title) return list;
      var isAward = /troph|medal|plaque|award/i.test(p.title);
      return list.filter(function(m){
        if (m.id === 'sand') return isAward;
        return true;
      });
    };
  }

  /* ═══════════════════════════════════════════════════════════
     V18: STOCK BADGE INJECTION
     ═══════════════════════════════════════════════════════════ */
  function stockMeta(code){
    return ({
      'I':{label:'In Stock',cls:'I'},
      'O':{label:'Out of Stock',cls:'O'},
      'P':{label:'Pending Approval',cls:'P'},
      'D':{label:'Discontinued',cls:'D'}
    })[code] || null;
  }
  function injectStockBadge(){
    try{
      if (typeof S==='undefined' || S.si===null || typeof P==='undefined') return;
      var p = P[S.si]; if (!p) return;
      var meta = stockMeta(p.stockCode); if (!meta) return;
      
      // Find product card title (the .cd that contains the product info)
      var titleEl = document.querySelector('.cd .pt') ||
                    document.querySelector('.cd h2') ||
                    document.querySelector('.cd .title');
      if (!titleEl){
        // Fallback: find first .cd in main area
        var firstCd = document.querySelector('.body .cd');
        if (!firstCd) return;
        titleEl = firstCd.firstElementChild;
      }
      if (!titleEl) return;
      
      // Remove any existing badge
      var card = titleEl.closest('.cd') || titleEl.parentNode;
      var old = card.querySelector('.ml-stk'); if (old) old.remove();
      
      var b = document.createElement('div');
      b.className = 'ml-stk '+meta.cls;
      b.innerHTML = '<span class="ml-stk-dot"></span>'+meta.label;
      card.insertBefore(b, card.firstChild);
    }catch(e){}
  }

  /* ═══════════════════════════════════════════════════════════
     V18: SHIPPING TOGGLE
     ═══════════════════════════════════════════════════════════ */
  function injectShipToggle(){
    var tbr = document.querySelector('.tb-r');
    if (!tbr || document.getElementById('ml-ship')) return;
    
    var current = readShip();
    var wrap = document.createElement('div');
    wrap.className = 'ml-ship-wrap';
    wrap.id = 'ml-ship';
    wrap.innerHTML =
      '<button class="ml-ship-btn'+(current==='uae'?' on':'')+'" data-ship="uae" type="button">🇦🇪 UAE</button>'+
      '<button class="ml-ship-btn'+(current==='intl'?' on':'')+'" data-ship="intl" type="button">🌍 International</button>';
    tbr.parentNode.insertBefore(wrap, tbr);
    
    wrap.querySelectorAll('[data-ship]').forEach(function(btn){
      btn.onclick = function(){
        var v = btn.getAttribute('data-ship');
        writeShip(v);
        wrap.querySelectorAll('.ml-ship-btn').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-ship')===v); });
        // Reset delivery charge when switching to intl
        if (v==='intl') { _delCharge = 0; try{window._delCharge=0;}catch(e){} }
        if (typeof updOut==='function') updOut();
        renderQuoteBuilder(); // re-render quote tab if open
      };
    });
  }

  /* ═══════════════════════════════════════════════════════════
     V18 / V64: INLINE DELIVERY ROW IN q-totals BOX
     ═══════════════════════════════════════════════════════════ */
  function injectShipping(){
    try{
      var qbox = document.querySelector('.qbox.ok,.qbox.cap');
      if (!qbox) return;
      // Clean up legacy injected nodes from earlier versions
      var legacy = qbox.parentNode.querySelectorAll('.ml-del-row,.ml-intl-note,.ml-grand');
      legacy.forEach(function(n){n.remove();});

      var ship = readShip();
      var inlineRow = document.querySelector('.ml-del-inline');
      if (ship === 'intl'){
        // Hide inline delivery row, show intl note below qbox
        if (inlineRow) inlineRow.classList.add('intl-hide');
        var n = document.createElement('div');
        n.className = 'ml-intl-note';
        n.innerHTML = '<div class="ml-intl-icon">🌍</div><div class="ml-intl-txt"><strong>International shipping</strong> — please get freight pricing from the Shipping Team before sending this quote. The total below excludes shipping.</div>';
        qbox.parentNode.insertBefore(n, qbox.nextSibling);
      } else {
        // UAE — wire the inline input that's already rendered inside q-totals
        if (inlineRow) inlineRow.classList.remove('intl-hide');
        var inp = document.getElementById('ml-del-inp');
        if (inp && !inp.dataset.mlWired){
          inp.dataset.mlWired = '1';
          inp.addEventListener('input', function(){
            var v = parseFloat((this.value||'').replace(/[^0-9.]/g,''))||0;
            _delCharge = v; try{window._delCharge=v;}catch(e){}
            updateGrandTotal();
          });
        }
      }
      updateGrandTotal();
    }catch(e){}
  }
  function updateGrandTotal(){
    try{
      var totVal = document.getElementById('ml-tot-val');
      if (!totVal) return;
      // Read existing subtotal + VAT from the rendered rows (avoids re-computing pricing)
      var rows = document.querySelectorAll('.q-totals .q-tot-row .val');
      if (rows.length < 2) return;
      var sub = parseFloat((rows[0].textContent||'').replace(/[^0-9.]/g,''))||0;
      var vat = parseFloat((rows[1].textContent||'').replace(/[^0-9.]/g,''))||0;
      var del = (readShip()==='uae' ? (_delCharge||0) : 0);
      var grand = sub + vat + del;
      totVal.textContent = 'AED '+grand.toFixed(2);
      // V64: also refresh the email quote box inline (without nuking the delivery input focus)
      try{
        var eBox = document.getElementById('eBox');
        if (eBox){
          // The email uses unicode-bold labels via b(), so we can't regex on <b> tags.
          // Strategy: re-call updOut() to rebuild the entire email body, but defer it
          // via setTimeout so the keystroke completes and the input keeps focus.
          if (typeof updOut==='function' && !window._mlDelRefresh){
            window._mlDelRefresh = setTimeout(function(){
              try{
                var focused = document.activeElement;
                var wasDelInp = focused && focused.id === 'ml-del-inp';
                var caret = wasDelInp ? focused.selectionStart : null;
                updOut();
                // Restore focus + caret to delivery input
                if (wasDelInp){
                  var fresh = document.getElementById('ml-del-inp');
                  if (fresh){
                    fresh.focus();
                    if (caret !== null) try{fresh.setSelectionRange(caret,caret);}catch(e3){}
                  }
                }
              }catch(e4){}
              window._mlDelRefresh = null;
            }, 250);
          }
        }
      }catch(e2){}
    }catch(e){}
  }

  /* ═══════════════════════════════════════════════════════════
     V18: "ADD TO QUOTE" BUTTON
     ═══════════════════════════════════════════════════════════ */
  function injectAddBtn(){
    try{
      var qbox = document.querySelector('.qbox.ok');  // only show on valid quotes
      if (!qbox) return;
      // Find the bottom of the output area
      var oa = document.getElementById('OA');
      if (!oa) return;
      if (oa.querySelector('.ml-addq-row')) return;
      
      if (typeof S==='undefined' || S.si===null) return;
      var p = P[S.si]; if (!p) return;
      
      // Snapshot current state
      var row = document.createElement('div');
      row.className = 'ml-addq-row';
      row.innerHTML = '<button class="ml-addq-btn" id="ml-addq" type="button">'+
        '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>'+
        'Add to Quote List</button>';
      oa.appendChild(row);
      
      document.getElementById('ml-addq').onclick = function(){
        addCurrentToQuote();
      };
    }catch(e){}
  }
  
  function addCurrentToQuote(){
    if (typeof S==='undefined' || S.si===null) return;
    var p = P[S.si]; if (!p) return;
    // v67: block add when product is not available (OOS or Discontinued)
    if(p.stockCode && p.stockCode !== 'I'){
      var _msg = p.stockCode === 'O' ? 'Currently out of stock \u2014 cannot add to quote.'
              :  p.stockCode === 'D' ? 'Product discontinued \u2014 cannot add to quote.'
              :  p.stockCode === 'P' ? 'Pending approval \u2014 cannot add to quote until product is approved.'
              :  p.stockCode === 'F' ? 'In draft \u2014 cannot add to quote until product is live.'
              : 'Product unavailable \u2014 cannot add to quote.';
      try{ alert(_msg); }catch(e){}
      return;
    }
    var cur = calcP(p, S.pm, S.sd, S.pr, qt(S.qty));
    if (!cur) return;
    var pmO = PMS.find(function(m){return m.id===S.pm;});
    
    var item = {
      id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
      sku: p.sku,
      title: p.title,
      cat: p.cat,
      qty: S.qty,
      pm: S.pm,
      pmName: pmO ? pmO.n : S.pm,
      sd: S.sd,
      flatPrint: pmO ? !!pmO.f : true,
      prem: S.pr,
      unit: cur.px,
      margin: cur.m,
      lineTotal: cur.px * S.qty,
      addedAt: Date.now()
    };
    
    var list = readQuote();
    list.push(item);
    writeQuote(list);
    
    // Confirmation
    showToast('Added to Quote List · '+list.length+' items');
    var btn = document.getElementById('ml-addq');
    if (btn){
      btn.classList.add('done');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8l4 4 8-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg> Added ✓';
      setTimeout(function(){
        btn.classList.remove('done');
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg> Add to Quote List';
      }, 1400);
    }
    updateQuoteTabBadge();
  }
  
  function showToast(msg){
    var t = document.getElementById('ml-toast');
    if (!t){
      t = document.createElement('div');
      t.id = 'ml-toast';
      t.className = 'ml-toast';
      document.body.appendChild(t);
    }
    t.innerHTML = '<span class="ic">✓</span> '+msg;
    t.classList.add('on');
    clearTimeout(t._tm);
    t._tm = setTimeout(function(){ t.classList.remove('on'); }, 2200);
  }

  /* ═══════════════════════════════════════════════════════════
     V18: QUOTE BUILDER TAB
     ═══════════════════════════════════════════════════════════ */
  function injectQuoteTab(){
    var tabs = document.querySelector('.tb-tabs');
    if (!tabs || tabs.querySelector('[data-tab="quote"]')) return;
    
    var count = readQuote().length;
    var btn = document.createElement('button');
    btn.className = 'tab' + (typeof S!=='undefined' && S.tab==='quote'?' on':'');
    btn.setAttribute('data-tab','quote');
    btn.type = 'button';
    btn.innerHTML = 'Quote Builder' + (count>0?'<span class="ml-qb-badge">'+count+'</span>':'');
    tabs.appendChild(btn);
    
    btn.onclick = function(){
      if (typeof S==='undefined') return;
      S.tab = 'quote';
      if (typeof render==='function') render(true);
    };
  }
  function updateQuoteTabBadge(){
    var tab = document.querySelector('.tab[data-tab="quote"]');
    if (!tab) return;
    var count = readQuote().length;
    var existing = tab.querySelector('.ml-qb-badge');
    if (count>0){
      if (existing) existing.textContent = count;
      else tab.insertAdjacentHTML('beforeend','<span class="ml-qb-badge">'+count+'</span>');
    } else if (existing) existing.remove();
  }
  
  function renderQuoteBuilder(){
    if (typeof S==='undefined' || S.tab !== 'quote') return;
    
    // Find the main content area
    var body = document.querySelector('.body');
    if (!body) return;
    var mainArea = body.querySelector('.main') || body.children[body.children.length-1];
    if (!mainArea) return;
    
    var items = readQuote();
    var ship = readShip();
    
    var html = '<div class="qb-wrap">';
    html += '<div class="qb-head"><div><div class="qb-title">Quote Builder</div><div class="qb-sub">'+(items.length===0?'Build a multi-product quote — add items from the Calculator tab':items.length+' item'+(items.length>1?'s':'')+' · ready to share')+'</div></div>';
    
    if (items.length>0){
      html += '<div class="qb-actions">'+
        '<button class="qb-act-btn danger" id="qb-clear" type="button">Clear all</button>'+
        '</div>';
    }
    html += '</div>';
    
    if (items.length===0){
      html += '<div class="qb-empty"><div class="qb-empty-ic">📋</div>'+
        '<div class="qb-empty-t">No items yet</div>'+
        '<div class="qb-empty-s">Go to the Calculator tab, configure a product (quantity, print method, sides) and click <strong>Add to Quote List</strong> to build a multi-product quote you can share with one tap.</div></div>';
    } else {
      // Items
      html += '<div class="qb-items">';
      items.forEach(function(it){
        var sideTxt = it.flatPrint ? '' : it.sd+' side'+(it.sd>1?'s':'');
        var method = it.pm==='none' ? 'No print' : (it.pmName + (sideTxt?' ('+sideTxt+')':''));
        html += '<div class="qb-item" data-id="'+it.id+'">'+
          '<div class="qb-it-info">'+
            '<div class="qb-it-t">'+esc(it.title)+'</div>'+
            '<div class="qb-it-m">'+
              '<span class="qb-pill">'+esc(method)+'</span>'+
              (it.prem?'<span class="qb-pill" style="background:#fef3c7;color:#a16207">Premium</span>':'')+
              '<span class="qb-pill" style="background:#fafafa;color:#9ca3af;font-size:9px">'+esc(it.sku)+'</span>'+
            '</div>'+
          '</div>'+
          '<div class="qb-it-col"><div class="qb-it-lbl">Qty</div><div class="qb-it-val">'+it.qty.toLocaleString()+'</div></div>'+
          '<div class="qb-it-col"><div class="qb-it-lbl">Unit</div><div class="qb-it-val">AED '+it.unit.toFixed(1)+'</div></div>'+
          '<div class="qb-it-col"><div class="qb-it-lbl">Line</div><div class="qb-it-val tot">AED '+it.lineTotal.toFixed(1)+'</div></div>'+
          '<button class="qb-it-rm" data-rm="'+it.id+'" type="button" title="Remove">×</button>'+
          '</div>';
      });
      html += '</div>';
      
      // Summary

        var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
      });

    // Refresh copy text when delivery input changes (already handled in v18's renderer)

<script>
(function(){
  /* ═══════════════════════════════════════════════════════════
     V24: AI RECOMMENDER — Smart Local Matcher
     ═══════════════════════════════════════════════════════════ */
  
  // Synonym + alias dictionary — maps colloquial / variant terms to canonical search tokens
  var SYNONYMS = {
    'keychain':['keychain','key chain','keyring','key ring','keytag','key tag','keyholder'],
    'powerbank':['powerbank','power bank','battery pack','portable charger','power pack'],
    'charger':['charger','charging','cable','usb cable','adapter'],
    'cap':['cap','hat','baseball cap','beanie','bucket hat','trucker','snapback','visor'],
    'hat':['hat','cap','beanie','headwear','bucket','sunhat'],
    'tshirt':['tshirt','t-shirt','tee','shirt'],
    't-shirt':['t-shirt','tshirt','tee'],
    'polo':['polo','polo shirt'],
    'hoodie':['hoodie','sweatshirt','pullover','sweater'],
    'jacket':['jacket','windbreaker','coat','blazer'],
    'bag':['bag','tote','sling','backpack','duffel','pouch'],
    'tote':['tote','tote bag','shopper','canvas bag'],
    'backpack':['backpack','rucksack','laptop bag'],
    'bottle':['bottle','water bottle','flask','tumbler','sipper'],
    'flask':['flask','bottle','thermos','tumbler'],
    'mug':['mug','cup','coffee mug','tea cup','tumbler'],
    'pen':['pen','ballpoint','stylus','writing'],
    'notebook':['notebook','notepad','journal','diary','planner'],
    'diary':['diary','journal','notebook','planner','organizer'],
    'usb':['usb','flash drive','pen drive','memory stick','thumb drive'],
    'speaker':['speaker','bluetooth speaker','wireless speaker','audio','sound'],
    'headphone':['headphone','earphone','earbud','airpod','earpiece'],
    'umbrella':['umbrella','parasol','rain'],
    'wallet':['wallet','cardholder','card holder','purse'],
    'lanyard':['lanyard','badge','id holder','strap'],
    'badge':['badge','pin','button badge','lapel','id'],
    'trophy':['trophy','award','medal','plaque','recognition'],
    'medal':['medal','award','trophy','recognition'],
    'plaque':['plaque','award','trophy'],
    'mousepad':['mousepad','mouse pad','desk mat','desk pad'],
    'stationery':['stationery','pen','notebook','desk','office'],
    'gift':['gift','present','set','box','kit'],
    'apparel':['apparel','clothing','tshirt','polo','hoodie','wear'],
    'drinkware':['drinkware','bottle','mug','tumbler','flask','cup'],
    'tech':['tech','usb','charger','speaker','headphone','powerbank','gadget'],
    'office':['office','pen','notebook','desk','stationery','folder']
  };
  
  // Fluff words to strip from input
  var FLUFF = new Set(['my','your','our','client','customer','wants','want','wanted','wanting','need','needs','needed','needing','looking','look','for','some','any','few','several','many','lots','of','the','a','an','to','from','please','find','search','show','give','me','recommend','suggestion','suggestions','options','option','option','choices','choice','idea','ideas','can','you','could','would','should','i','we','they','he','she','it','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','should','could','may','might','must','about','around','also','and','or','but','with','without','plus','include','including','show','tell','let','this','that','these','those','here','there','quote','price','cost','pricing','quotation','quotes']);
  
  function tokenize(input){
    // Split on common separators: comma, semicolon, "and", "or", line breaks
    var raw = (input||'').toLowerCase()
      .replace(/[\.;:!?\(\)]/g,' ')
      .split(/,| and | or |\/|\n|;/);
    var tokens = [];
    raw.forEach(function(seg){
      // Strip fluff and split into words
      var words = seg.trim().split(/\s+/).filter(function(w){
        return w && !FLUFF.has(w) && w.length>1;
      });
      // Try to keep as phrase first (e.g. "power bank")
      if (words.length){
        tokens.push({raw:words.join(' '), words:words});
      }
    });
    return tokens;
  }
  
  // Score a product against a query token
  function scoreMatch(product, token){
    var title = (product.title||'').toLowerCase();
    var cat = (product.cat||'').toLowerCase();
    var mat = (product.mat||'').toLowerCase();
    var sku = (product.sku||'').toLowerCase();
    var hay = title + ' ' + cat + ' ' + mat + ' ' + sku;
    
    // Get all candidate search terms for this token (token + synonyms)
    var allTerms = [token.raw];
    token.words.forEach(function(w){
      if (SYNONYMS[w]) allTerms = allTerms.concat(SYNONYMS[w]);
      allTerms.push(w);
    });
    // dedup
    allTerms = allTerms.filter(function(t,i,arr){return arr.indexOf(t)===i;});
    
    var bestScore = 0;
    var matchedTerm = '';
    
    allTerms.forEach(function(term){
      if (!term || term.length<2) return;
      var score = 0;
      // Exact phrase in title
      if (title.indexOf(term) >= 0){
        score = term===token.raw ? 1.0 : 0.85;
        // Start of title is even better
        if (title.indexOf(term)===0 || title.indexOf(' '+term)>=0) score += 0.05;
      }
      // Word in title (boundary)
      else if (new RegExp('\\b'+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(title)){
        score = 0.75;
      }
      // In category
      else if (cat.indexOf(term) >= 0){
        score = 0.45;
      }
      // In material
      else if (mat.indexOf(term) >= 0){
        score = 0.30;
      }
      if (score > bestScore){
        bestScore = score;
        matchedTerm = term;
      }
    });
    
    return {score: bestScore, matchedTerm: matchedTerm};
  }
  
  // Run full search across all tokens, group results
  function recommend(input){
    if (typeof P==='undefined' || !P.length) return {groups:[], totalMatches:0};
    var tokens = tokenize(input);
    if (!tokens.length) return {groups:[], totalMatches:0};
    
    var groups = tokens.map(function(token){
      var scored = [];
      P.forEach(function(p){
        if (!p.web || !p.cost) return; // skip incomplete
        var res = scoreMatch(p, token);
        if (res.score >= 0.40){
          scored.push({p:p, score:res.score, term:res.matchedTerm});
        }
      });
      scored.sort(function(a,b){
        // Prefer in-stock, then higher score
        var stockA = a.p.stockCode==='I' ? 1 : 0;
        var stockB = b.p.stockCode==='I' ? 1 : 0;
        if (stockB - stockA !== 0) return stockB - stockA;
        return b.score - a.score;
      });
      return {
        token: token.raw,
        results: scored.slice(0, 6),
        totalFound: scored.length
      };
    });
    
    var totalMatches = groups.reduce(function(s,g){return s+g.totalFound;},0);
    return {groups:groups, totalMatches:totalMatches};
  }
  
  // ─── Render the AI Recommender tab ───
  function renderAIRecommender(){
    if (typeof S==='undefined' || S.tab!=='airec') return;

    if (!body) return;

            '<div class="air-sub">Describe what your client is looking for in plain English — categories, gifts, themes, or specific products. The recommender searches the full catalogue and surfaces matches grouped by what your client asked for.</div></div>';
    
    html += '<div class="air-input-wrap">'+
              '<textarea class="air-input" id="air-input" rows="3" placeholder="e.g. my client is looking for keychain, powerbank, charger and cap options for a tech giveaway">'+escAIR(prevQuery)+'</textarea>'+
              '<div class="air-actions">'+
                '<span class="air-hint">Tip: separate items with commas. Mention quantities or use cases if relevant.</span>'+
                '<button class="air-btn" id="air-go" type="button">'+
                  '<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
                  'Find products'+
                '</button>'+
              '</div>'+
            '</div>';
    
    html += '<div class="air-examples">'+
              '<span class="air-hint" style="margin-right:4px">Try:</span>'+
              '<button class="air-ex-chip" data-ex="keychain, powerbank, cap" type="button">Tech giveaway</button>'+
              '<button class="air-ex-chip" data-ex="tshirt, hoodie, tote bag, water bottle" type="button">Onboarding kit</button>'+
              '<button class="air-ex-chip" data-ex="trophy, medal, plaque for awards ceremony" type="button">Awards</button>'+
              '<button class="air-ex-chip" data-ex="notebook, pen, mug for office" type="button">Office set</button>'+
              '<button class="air-ex-chip" data-ex="travel mug, backpack, sleeve" type="button">Travel essentials</button>'+

    html += '<div id="air-results">';

    mainArea.innerHTML = html;
    
    // Wire events

  function renderResults(results){
    if (!results || !results.groups.length) return '';
    var html = '';
    
    var nonEmptyGroups = results.groups.filter(function(g){return g.results.length>0;});
    var emptyGroups = results.groups.filter(function(g){return g.results.length===0;});
    
    if (nonEmptyGroups.length === 0){
      return '<div class="air-nomatch"><div class="air-nomatch-i">🤔</div><strong>No products matched your search.</strong><br><span style="font-size:11px;color:#9a3412">Try different keywords or use category terms like "drinkware", "tech", or "apparel".</span></div>';

    // Summary
    html += '<div class="air-summary">'+

      'Found <b>'+results.totalMatches+'</b> matches across <b>'+nonEmptyGroups.length+'</b> product type'+(nonEmptyGroups.length>1?'s':'')+
      '. Click any product to open it in the Calculator.</div>';
    
    html += '<div class="air-results">';
    nonEmptyGroups.forEach(function(g){
      html += '<div class="air-group">';
      html += '<div class="air-grp-head"><div class="air-grp-t">'+escAIR(g.token)+'</div>'+
              '<div class="air-grp-count">'+g.results.length+' shown · '+g.totalFound+' total</div></div>';
      html += '<div class="air-cards">';
      g.results.forEach(function(r){
        var p = r.p;
        var stkLabel = ({I:'In Stock',O:'Out',P:'Pending',D:'Disc.',F:'Draft'})[p.stockCode] || '';
        var stkCls = p.stockCode || '';
        var catName = catLabel(p.cc);
        html += '<div class="air-card" data-sku="'+escAIR(p.sku)+'">'+
          '<div class="air-c-top"><div class="air-c-t">'+escAIR(p.title)+'</div></div>'+
          '<div class="air-c-meta">'+
            '<span class="air-c-sku">'+escAIR(p.sku)+'</span>'+
            (stkLabel?'<span class="air-c-stk '+stkCls+'">'+stkLabel+'</span>':'')+
            '<span class="air-c-cat">'+escAIR(catName)+'</span>'+
            '<span class="air-c-price">AED '+(p.web||0)+'</span>'+
          '</div>'+
        '</div>';
      });
      html += '</div></div>';
    });
    html += '</div>';
    
    if (emptyGroups.length){
      html += '<div style="margin-top:14px;padding:11px 14px;background:#fef3c7;border:1px solid #fde68a;border-radius:9px;font-size:11px;color:#92400e">'+
        '<strong>No matches for:</strong> '+emptyGroups.map(function(g){return '"'+escAIR(g.token)+'"';}).join(', ')+

    }
    
    return html;
  }
  
  function wireResultCards(){
    document.querySelectorAll('.air-card').forEach(function(card){
      card.onclick = function(){
        var sku = card.getAttribute('data-sku');

          if (pm2.length && !pm2.find(function(m){return m.id===S.pm;})) S.pm = pm2[0].id;
          render(true);
        }
      };
    });
  }
  
  function catLabel(cc){
    var map = {TP:'T-shirts',UW:'Uniforms',HS:'Hoodies',JS:'Jerseys',DW:'Drinkware',CH:'Caps',
               BT:'Bags',OA:'Office',PM:'Print Materials',BP:'Boxes',TT:'Travel & Tech',
               TE:'Tradeshow',GS:'Gift Sets',HW:'Home',PS:'Pants',PE:'Pet',KC:'Kids',FC:'Food'};
    return map[cc] || cc;
  }
  
  function escAIR(s){
    return String(s||'').replace(/[&<>"']/g,function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  var FLUFF = new Set(['my','your','our','client','customer','wants','want','wanted','wanting','need','needs',
    'needed','needing','looking','look','for','some','any','few','several','many','lots','of','the','a','an',

    'this','that','these','those','here','there','quote','price','cost','pricing','quotation','quotes','show',
    'maybe','prefer','prefers','preferring','similar','like','related','types','type','kinds','kind','sort',
    'sorts','various','different','etc','options','various','really','very','quite','rather','just']);
  
  function tokenize(input){
    var raw=(input||'').toLowerCase().replace(/[\.;:!?\(\)\[\]]/g,' ').split(/,| and | or |\/|\n|;/);
    var tokens=[];
    raw.forEach(function(seg){
      var words=seg.trim().split(/\s+/).filter(function(w){return w&&!FLUFF.has(w)&&w.length>1;});
      if(words.length) tokens.push({raw:words.join(' '),words:words});
    });
    return tokens;
  }
  
  function scoreMatch(product, token){
    var title=(product.title||'').toLowerCase();
    var cat=(product.cat||'').toLowerCase();
    var mat=(product.mat||'').toLowerCase();
    var sku=(product.sku||'').toLowerCase();
    
    var allTerms=[token.raw];
    token.words.forEach(function(w){
      if(SYNONYMS[w]) allTerms=allTerms.concat(SYNONYMS[w]);
      allTerms.push(w);
    });
    allTerms=allTerms.filter(function(t,i,arr){return arr.indexOf(t)===i;});
    
    var bestScore=0, matchedTerm='';
    allTerms.forEach(function(term){
      if(!term||term.length<2) return;
      var score=0;
      try{
        if(title.indexOf(term)>=0){
          score=term===token.raw?1.0:0.85;
          if(title.indexOf(term)===0||title.indexOf(' '+term)>=0) score+=0.05;
        } else if(new RegExp('\\b'+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(title)){
          score=0.75;
        } else if(cat.indexOf(term)>=0){
          score=0.45;
        } else if(mat.indexOf(term)>=0){
          score=0.30;
        }
      }catch(e){}
      if(score>bestScore){bestScore=score;matchedTerm=term;}
    });
    return {score:bestScore, matchedTerm:matchedTerm};
  }
  
  function recommend(input, budget, budgetMode){
    if(typeof P==='undefined'||!P.length) return {groups:[],totalMatches:0};
    var tokens=tokenize(input);
    if(!tokens.length) return {groups:[],totalMatches:0};
    var bud=parseFloat(budget)||0;
    
    var groups=tokens.map(function(token){
      var scored=[];
      P.forEach(function(p){
        if(!p.web||!p.cost) return;
        var res=scoreMatch(p,token);
        if(res.score>=0.40){
          // Budget filter
          var withinBudget=true;
          if(bud>0&&budgetMode==='per_item'){
            withinBudget=(p.web<=bud);
          }
          scored.push({p:p, score:res.score, term:res.matchedTerm, withinBudget:withinBudget});
        }
      });
      // Sort: in-stock first, within-budget next, then score
      scored.sort(function(a,b){
        var sa=a.p.stockCode==='I'?1:0, sb=b.p.stockCode==='I'?1:0;
        if(sb-sa!==0) return sb-sa;
        var ba=a.withinBudget?1:0, bb=b.withinBudget?1:0;
        if(bb-ba!==0) return bb-ba;
        return b.score-a.score;
      });
      return {token:token.raw, results:scored, totalFound:scored.length};
    });
    
    var totalMatches=groups.reduce(function(s,g){return s+g.totalFound;},0);
    return {groups:groups, totalMatches:totalMatches, budget:bud, budgetMode:budgetMode};
  }

            '<div class="air-fld">'+
