var ICACHE={};
function loadImg(p,cb){
  if(ICACHE[p.sku]!==undefined){cb(ICACHE[p.sku]);return;}
  ICACHE[p.sku]=null;
  var apiUrl="https://themerchlist.com/wp-json/wc/store/v1/products?search="+encodeURIComponent(p.title)+"&per_page=1";
  fetch(PROX+encodeURIComponent(apiUrl),{signal:AbortSignal.timeout(8000)})
    .then(function(r){return r.json();})
    .then(function(d){
      try{
        var data=JSON.parse(d.contents||"[]");
        if(Array.isArray(data)&&data[0]&&data[0].images&&data[0].images[0]&&data[0].images[0].src){
          ICACHE[p.sku]=data[0].images[0].src;cb(ICACHE[p.sku]);return;
        }
      }catch(e){}
      // Fallback: scrape themerchlist.com product page
      var pgUrl="https://themerchlist.com/customize/"+encodeURIComponent(p.title.toLowerCase().replace(/[^a-z0-9]+/g,"-"))+"/";
      fetch(PROX+encodeURIComponent(pgUrl),{signal:AbortSignal.timeout(6000)})
        .then(function(r2){return r2.json();})
        .then(function(d2){
          try{
            var h=d2.contents||"";
            var m=h.match(/"src":"(https:\/\/themerchlist\.com\/wp-content\/uploads\/[^"]+\.(?:jpg|jpeg|png|webp))"/i);
            if(!m)m=h.match(/class="[^"]*wp-post-image[^"]*"[^>]*src="([^"]+)"/);
            if(m&&m[1]){ICACHE[p.sku]=m[1];cb(m[1]);return;}
          }catch(e){}
          ICACHE[p.sku]=false;cb(false);
        }).catch(function(){ICACHE[p.sku]=false;cb(false);});
    }).catch(function(){ICACHE[p.sku]=false;cb(false);});
}

// ── FUZZY SEARCH ─────────────────────────────────────────────────────────
// Normalises input so "tshirt" matches "t-shirt", "polo shirt" matches "polo",
// single-char typos are tolerated (Levenshtein ≤1 on individual words).
function normStr(s){
  return s.toLowerCase()
    .replace(/[-_]/g,' ')        // t-shirt → t shirt
    .replace(/\s+/g,' ')
    .trim();
}
// Alias map: common alternate spellings / abbreviations
var ALIASES={
  'tshirt':'t shirt','tshirts':'t shirts',
  'hoodie':'hoodies','hoodies':'hoodie',
  'polo':'polo shirt','polos':'polo shirt',
  'cap':'baseball cap','caps':'baseball cap',
  'mug':'ceramic mug','bottle':'water bottle',
  'bag':'tote bag','bags':'tote bag',
  'notebook':'notebook','notepad':'notebook',
  'pen':'ballpoint pen','pens':'metal pen',
  'powerbank':'power bank','power bank':'powerbank',
  'usb':'usb stick'
};
function expandQuery(q){
  var n=normStr(q),words=n.split(' '),extra=[];
  words.forEach(function(w){if(ALIASES[w])extra.push(ALIASES[w]);});
  return [n].concat(extra);
}
function levenshtein(a,b){
  if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;
  var m=[];
  for(var i=0;i<=b.length;i++){m[i]=[i];for(var j=1;j<=a.length;j++){m[i][j]=i===0?j:Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(b[i-1]!==a[j-1]?1:0));}}
  return m[b.length][a.length];
}
function fuzzyScore(haystack,queries){
  var h=normStr(haystack),best=0;
  queries.forEach(function(q){
    // exact substring
    if(h.indexOf(q)>=0){best=Math.max(best,1);return;}
    // word-level fuzzy: all query words must match within distance 1
    var qWords=q.split(' '),hWords=h.split(' ');
    var allMatch=qWords.every(function(qw){
      return hWords.some(function(hw){
        if(hw.indexOf(qw)>=0||qw.indexOf(hw)>=0)return true;
        if(qw.length>=4&&levenshtein(qw,hw)<=1)return true;
        return false;
      });
    });
    if(allMatch)best=Math.max(best,0.8);
  });
  return best;
}
function fuzzyFilter(products,query){
  var queries=expandQuery(query);
  var scored=products.map(function(p){
    var ts=fuzzyScore(p.title,queries);
    var ss=fuzzyScore(p.sku,queries)*0.9;  // SKU match slightly lower priority
    return{p:p,score:Math.max(ts,ss)};
  }).filter(function(x){return x.score>0;});
  scored.sort(function(a,b){return b.score-a.score;});
  return scored.map(function(x){return x.p;});
}

  }).join("")+(fl.length>300?"<div style='padding:8px;text-align:center;font-size:10px;color:#9ca3af'>Showing 300 of "+fl.length+"</div>":"")+(fl.length===0?"<div style='padding:16px;text-align:center;font-size:11px;color:#9ca3af'>No products found</div>":"");
  app.innerHTML="<div class='app'><div class='topbar'><div class='tb-l'><span class='tb-logo'>MERCHLIST</span><span class='tb-v'>v13</span><div class='tb-tabs'><button class='tab "+(S.tab==="calc"?"on":"")+"' data-tab='calc' type='button'>Calculator</button><button class='tab "+(S.tab==="finder"?"on":"")+"' data-tab='finder' type='button'>Product Finder</button></div></div><span class='tb-r'>INTERNAL USE ONLY</span></div><div class='body'><div class='sb'><div class='sf'><input class='sf-inp' id='sIn' placeholder='Search name or SKU\u2026' value='"+he(S.q)+"'><div class='sf-row'><select class='sf-sel' id='cSel'><option value='ALL'>All Categories</option>"+cats.map(function(c){return"<option value='"+he(c)+"' "+(S.cf===c?"selected":"")+">"+he(c)+"</option>";}).join("")+"</select><select class='sf-sel' id='gSel' style='flex:0 0 88px'><option value='ALL'>All Grids</option><option value='S' "+(S.gf==="S"?"selected":"")+">Softline</option><option value='H' "+(S.gf==="H"?"selected":"")+">Hardline</option><option value='C' "+(S.gf==="C"?"selected":"")+">Custom</option></select></div><div class='sf-cnt'>"+fl.length+" products</div></div><div class='plist'>"+listH+"</div></div><div class='mn'>"+main+"</div></div></div>";
  if(keep){var mn2=document.querySelector(".mn");if(mn2)mn2.scrollTop=sy;}
  if(p&&!isC(p)&&ICACHE[p.sku]===undefined){
    loadImg(p,function(url){var el=document.getElementById("phImg");if(el){el.classList.remove("img-loading");el.innerHTML=url?"<img src='"+url+"' alt='' onerror=\"this.parentNode.innerHTML='\uD83D\uDCE6'\">":"\uD83D\uDCE6";}});
  }
  var sIn=document.getElementById("sIn");
  if(sIn){sIn.oninput=function(){S.q=this.value;var pos=this.selectionStart;render();var e=document.getElementById("sIn");if(e){e.focus();try{e.setSelectionRange(pos,pos);}catch(x){}}};}
  document.getElementById("cSel").onchange=function(){S.cf=this.value;render();};
  document.getElementById("gSel").onchange=function(){S.gf=this.value;render();};
  document.querySelectorAll("[data-tab]").forEach(function(el){el.onclick=function(){S.tab=el.getAttribute("data-tab");render();};});
  document.querySelectorAll(".pi").forEach(function(el){el.onclick=function(){S.si=parseInt(el.getAttribute("data-i"));S.pr=false;var pm2=gpm(P[S.si]);if(!pm2.find(function(m){return m.id===S.pm;}))S.pm=pm2[0]?pm2[0].id:"dtf";render();};});
  document.querySelectorAll("[data-pm]").forEach(function(el){el.onclick=function(){S.pm=el.getAttribute("data-pm");var pm=PMS.find(function(m){return m.id===S.pm;});if(pm&&pm.f)S.sd=1;render(true);};});
  document.querySelectorAll("[data-sd]").forEach(function(el){el.onclick=function(){S.sd=parseInt(el.getAttribute("data-sd"));render(true);};});
  document.querySelectorAll("[data-fb]").forEach(function(el){el.onclick=function(){S.pr=el.getAttribute("data-fb")==="1";render(true);};});
  // Finder
  var fIn=document.getElementById("fIn"),fGo=document.getElementById("fGo");
  if(fIn){fIn.oninput=function(){S.fq=this.value;};fIn.onkeydown=function(e){if(e.key==="Enter"&&fGo)fGo.click();};}
  if(fGo){fGo.onclick=function(){
    if(!S.fq||!S.fq.trim())return;
    S.fl=true;S.fr=null;render();
    setTimeout(function(){
      var queries=expandQuery(S.fq);
      var results=P.map(function(p){
        var ts=fuzzyScore(p.title,queries);
        var ss=fuzzyScore(p.sku,queries)*0.9;
        return{p:p,score:Math.max(ts,ss)};
      }).filter(function(x){return x.score>0;}).sort(function(a,b){return b.score-a.score;}).slice(0,10);
      S.fr=results;S.fl=false;render();
    },30);
  };}
  document.querySelectorAll("[data-fu]").forEach(function(el){el.onclick=function(){S.si=parseInt(el.getAttribute("data-fu"));S.tab="calc";render();};});
  updOut();
}
render();

<script>
(function () {
  var KEY = 'ml_access_v1';
  var CODE = '2026';

  function isAuthed() {
    try { return localStorage.getItem(KEY) === CODE; } catch (e) { return false; }
  }

  function grantAccess() {
    if (typeof S !== 'undefined') { S.u = true; }
    if (typeof render === 'function') { render(); }
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (ch) {
      return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[ch];
    });
  }

  function showGate() {
    var gate = document.createElement('div');
    gate.id = 'ml-gate';
    gate.innerHTML =
      '<div class="ml-card">' +
        '<div class="ml-wordmark"><div class="ml-dot"></div><div class="ml-brand">MERCHLIST</div></div>' +
        '<div class="ml-title">Sales Tool Access</div>' +
        '<div class="ml-sub">Enter the team access code<br>to open the Pricing Engine.</div>' +
        '<div class="ml-field"><label class="ml-label">Access Code</label>' +
          '<input class="ml-inp" id="ml-code" type="password" inputmode="numeric" placeholder="••••" autocomplete="off" autofocus></div>' +
        '<button class="ml-btn" id="ml-submit">Unlock →</button>' +
        '<div class="ml-err" id="ml-err"></div>' +
        '<div class="ml-footer"><strong>Staff only</strong> · Access saved on this device</div>' +
      '</div>';
    document.body.appendChild(gate);

    setTimeout(function () {
      var i = document.getElementById('ml-code');
      if (i) i.focus();
    }, 80);

    function submit() {
      var inp = document.getElementById('ml-code');
      var err = document.getElementById('ml-err');
      var v = (inp.value || '').trim();
      if (v !== CODE) {
        err.textContent = 'Incorrect code. Please try again.';
        err.style.display = 'block';
        inp.value = '';
        inp.focus();
        return;
      }
      try { localStorage.setItem(KEY, CODE); } catch (e) {}
      gate.remove();
      grantAccess();
    }

    document.getElementById('ml-submit').onclick = submit;
    document.getElementById('ml-code').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') submit();
    });
  }

  if (isAuthed()) {
    grantAccess();
  } else {
    showGate();
  }

})();
</script>

<script>
(function(){

/* ══════════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════

   ══════════════════════════════════════════════════════ */
var ML_SVG='<svg class="ml-logo-svg" viewBox="0 0 148 30" xmlns="http://www.w3.org/2000/svg"><text y="24" font-family="Georgia,\'Times New Roman\',serif" font-size="25" font-weight="700" fill="#111" letter-spacing="-0.8">merchlist</text></svg>';
function initLogo(){
  var el=document.querySelector('.tb-logo');
  if(!el||document.querySelector('.ml-logo-svg')) return;
  var par=el.parentNode;
  var d=document.createElement('div'); d.innerHTML=ML_SVG;
  par.insertBefore(d.firstChild,el);
  var img=document.createElement('img'); img.className='ml-logo-img';
  par.insertBefore(img,el);
  fetch('https://api.allorigins.win/get?url='+encodeURIComponent('https://themerchlist.com'),{signal:AbortSignal.timeout(10000)})
    .then(function(r){return r.json();})
    .then(function(d){
      var h=d.contents||'';
      var pats=[/class="custom-logo"[^>]*src="([^"]+)"/i,/src="([^"]*\/wp-content\/[^"]*logo[^"]*\.(?:png|svg|jpg|webp))"/i];
      for(var i=0;i<pats.length;i++){
        var m=h.match(pats[i]);
        if(m&&m[1]){
          var url=m[1].startsWith('http')?m[1]:'https://themerchlist.com'+m[1];

/* ══════════════════════════════════════════════════════
   2. PRODUCT FINDER — URL LOOKUP ENGINE
   
   Purpose: Sales staff paste a supplier product URL.
   We check if that URL exists in our catalogue (p.supUrl).
   ══════════════════════════════════════════════════════ */

function normURL(u){
  return (u||'').toLowerCase()
    .replace(/^https?:\/\/(www\.)?/,'')
    .replace(/[?#].*/,'')          // strip query params & hash
    .replace(/\/+$/,'')            // strip trailing slashes
    .trim();
}
function getDomain(u){
  var n=normURL(u);
  return n.split('/')[0];
}
function getPathParts(u){
  var n=normURL(u);
  var parts=n.split('/').slice(1).filter(Boolean);
  return parts;
}
function urlMatchScore(query,candidate){
  if(!query||!candidate) return 0;
  var nq=normURL(query), nc=normURL(candidate);
  if(!nq||!nc) return 0;
  if(getDomain(nq)!==getDomain(nc)) return 0;
  var pq=getPathParts(nq), pc=getPathParts(nc);
  // Listing/category pages cannot be high-confidence matches
  var LISTING={shop:1,product:1,products:1,category:1,categories:1,search:1,catalog:1};
  var qListing=(pq.length===0)||(pq.length===1&&LISTING[pq[0]]);
  var cListing=(pc.length===0)||(pc.length===1&&LISTING[pc[0]]);
  if(qListing||cListing) return (qListing&&cListing)?0.20:0.30;
  // Exact match
  if(nq===nc) return 1.0;
  // Last path segment (slug) exact match
  var slugQ=pq[pq.length-1], slugC=pc[pc.length-1];
  if(slugQ===slugC) return 0.98;
  // Trailing product-ID match (e.g. Jasani -20241)
  var idQ=(slugQ.match(/-(\d{3,})$/)||[])[1];
  var idC=(slugC.match(/-(\d{3,})$/)||[])[1];
  if(idQ&&idC&&idQ===idC) return 0.92;
  // Path-overlap fallback (don't credit listing segments)
  var matching=0, minLen=Math.min(pq.length,pc.length);
  for(var i=0;i<minLen;i++){
    if(pq[i]===pc[i]&&!LISTING[pq[i]]) matching++;
    else break;
  }
  if(matching===0){
    var shared=pq.filter(function(s){return pc.indexOf(s)>=0&&s.length>4&&!LISTING[s];}).length;
    return shared>0?0.55:0.30;
  }
  return 0.30+0.4*(matching/Math.max(pq.length,pc.length));
}

function looksLikeURL(s){
  s=s.trim();
  return /^https?:\/\//i.test(s)||/^www\./i.test(s)||(s.length>6&&/\.(com|ae|net|org|co|io|me)\b/.test(s)&&s.indexOf(' ')<0);
}

function searchByURL(q){
  if(typeof P==='undefined') return{exact:null,domain:[],domainName:''};
  var nq=normURL(q), dq=getDomain(nq);
  var best=null, others=[];
  P.forEach(function(p){
    var url=p.supUrl||'';
    if(!url) return;
    var score=urlMatchScore(q,url);
    if(score>=0.85){
      if(!best||score>best.score){ if(best) others.push(best); best={p:p,score:score}; }
      else others.push({p:p,score:score});
    } else if(score>=0.30){
      others.push({p:p,score:score});
    }
  });
  others.sort(function(a,b){return b.score-a.score;});
  return{exact:best,domain:others.slice(0,8),domainName:dq};
}

/* ══════════════════════════════════════════════════════
   3. IMPROVED TEXT SEARCH (sidebar search only)
      — kept here to improve the sidebar filter as well
   ══════════════════════════════════════════════════════ */
function mlNorm(s){return(s||'').toLowerCase().replace(/[-_\/]/g,' ').replace(/\s+/g,' ').trim();}
function mlLev(a,b){
  if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;
  var m=[];for(var i=0;i<=b.length;i++){m[i]=[i];for(var j=1;j<=a.length;j++){m[i][j]=i===0?j:Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(b[i-1]!==a[j-1]?1:0));}}
  return m[b.length][a.length];
}
function mlScoreOne(hay,q){
  var h=mlNorm(hay);if(!h||!q)return 0;
  if(h===q)return 1.0;if(h.indexOf(q)>=0)return 0.95;if(q.indexOf(h)>=0)return 0.85;
  var hW=h.split(' '),qW=q.split(' '),matched=0;
  qW.forEach(function(qw){
    if(hW.indexOf(qw)>=0){matched+=1;return;}
    if(hW.some(function(hw){return hw.indexOf(qw)>=0||qw.indexOf(hw)>=0;})){matched+=0.8;return;}
    if(qw.length>=3&&hW.some(function(hw){return mlLev(qw,hw)<=1;})){matched+=0.6;return;}
  });
  var raw=matched/qW.length;
  return raw<0.5?0:raw*0.85;
}
var ML_ALIASES={'tshirt':'t shirt','tshirts':'t shirt','tee':'t shirt','hoodie':'hoodie sweatshirt','polo':'polo shirt','cap':'cap hat','mug':'ceramic mug','bottle':'water bottle','flask':'water bottle','bag':'tote bag','tote':'tote bag','notebook':'notebook','notepad':'notebook','pen':'pen','powerbank':'power bank'};
function mlExpandQ(q){var n=mlNorm(q),qs=[n];n.split(' ').forEach(function(w){if(ML_ALIASES[w])qs.push(ML_ALIASES[w]);});return qs;}
function improvedTextSearch(q){
  if(typeof P==='undefined')return[];
  var qs=mlExpandQ(q);
  var scored=P.map(function(p){
    var ts=0,ss=0;
    qs.forEach(function(qv){ts=Math.max(ts,mlScoreOne(p.title,qv));ss=Math.max(ss,mlScoreOne(p.sku,qv)*0.85);});
    return{p:p,score:Math.max(ts,ss)};
  }).filter(function(x){return x.score>=0.4;});
  scored.sort(function(a,b){return b.score-a.score;});
  return scored.slice(0,20);
}

/* ══════════════════════════════════════════════════════
   4. INTERCEPT fGo CLICK — full finder takeover
   ══════════════════════════════════════════════════════ */
var _finderMode='idle'; // 'url' | 'text' | 'idle'
var _finderData=null;

function runFinder(q){
  if(!q||!q.trim()){_finderMode='idle';return;}
  if(looksLikeURL(q)){
    _finderMode='url';
    _finderData=searchByURL(q);
  } else {
    _finderMode='text';
    _finderData=improvedTextSearch(q);
  }
  renderFinderResults();
}

function renderFinderResults(){
  var wrap=document.querySelector('.fwrap');
  if(!wrap) return;
  // Remove old result area
  var old=wrap.querySelector('.ml-finder-results');
  if(old) old.remove();
  var div=document.createElement('div'); div.className='ml-finder-results';
  if(_finderMode==='url'){
    div.innerHTML=renderURLResults(_finderData, document.getElementById('fIn')?document.getElementById('fIn').value:'');
  } else if(_finderMode==='text'){
    // Text search results
    var results=_finderData;
    if(!results||!results.length){
      div.innerHTML='<div class="fno"><div class="ic">🔍</div><h3>No match found</h3><p>Try the exact product name or SKU.</p></div>';
    } else {
      var html='<div class="fres">';
      results.slice(0,10).forEach(function(x){
        var p=x.p,sc=Math.round(x.score*100);
        var bg=sc>=80?'#16a34a':sc>=60?'#ca8a04':'#6b7280';
        var g=(typeof gridOf==='function')?gridOf(p):'S';
        var gn=g==='S'?'Softline':g==='H'?'Hardline':'Custom';
        var idx=(typeof P!=='undefined')?P.indexOf(p):-1;
        html+='<div class="fmatch">'+
          '<div class="fscore" style="background:'+bg+';width:36px;text-align:center;border-radius:6px;padding:3px 0;font-size:10px;font-weight:800;color:#fff;flex-shrink:0">'+sc+'%</div>'+
          '<div class="fmi">'+
            '<div class="fmt">'+esc(p.title)+'</div>'+
            '<div class="fms">'+esc(p.sku)+' · '+esc(p.cat||'')+' <span class="bd '+g+'" style="padding:1px 6px;border-radius:12px;font-size:9px">'+gn+'</span></div>'+
          '</div>'+
          (idx>=0?'<button class="fuse" data-fu="'+idx+'" type="button">Use →</button>':'')+
        '</div>';
      });
      html+='</div>';
      div.innerHTML=html;
    }
  }
  wrap.appendChild(div);
  // Re-attach button listeners
  div.querySelectorAll('[data-ml-load]').forEach(function(btn){
    btn.onclick=function(){
      var idx=parseInt(btn.getAttribute('data-ml-load'));
      if(typeof S!=='undefined'&&typeof render==='function'){S.si=idx;S.tab='calc';render();}
    };
  });
  div.querySelectorAll('[data-fu]').forEach(function(btn){
    btn.onclick=function(){
      var idx=parseInt(btn.getAttribute('data-fu'));
      if(typeof S!=='undefined'&&typeof render==='function'){S.si=idx;S.tab='calc';render();}
    };
  });
}

// Intercept fGo button with capture-phase listener (runs before onclick)
document.addEventListener('click',function(e){
  var t=e.target;
  if(!t||t.id!=='fGo') return;
  e.stopImmediatePropagation();
  e.preventDefault();
  var q=(document.getElementById('fIn')||{}).value||'';
  if(typeof S!=='undefined') S.fq=q;
  runFinder(q);
},true);

// Auto-search while typing (debounced)
function initFinderInput(){
  var finp=document.getElementById('fIn');
  if(!finp||finp.dataset.ml15) return;
  finp.dataset.ml15='1';
  // Update placeholder
  finp.placeholder='Paste supplier product URL, or type product name / SKU…';
  var t;
  finp.addEventListener('input',function(){
    clearTimeout(t);
    t=setTimeout(function(){runFinder(finp.value);},400);
  });
  finp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){clearTimeout(t);runFinder(finp.value);}
  });
  // Inject description above input
  var row=finp.closest('.finp-row');
  if(row&&!row.previousElementSibling?.classList.contains('ml-fdesc')){
    var desc=document.createElement('p');
    desc.className='ml-fdesc';
    desc.innerHTML='<strong>URL lookup:</strong> Paste a supplier product URL to check if it\'s already in the Merchlist catalogue.<br><strong>Text search:</strong> Type a product name or SKU for fuzzy matching.';
    row.parentNode.insertBefore(desc,row);
  }
}

function addSavingsBanner(){
  var qbox=document.querySelector('.qbox.ok,.qbox.cap');
  if(!qbox) return;
  var old=qbox.querySelector('.ml-savings'); if(old) old.remove();
  try{
    var p=(typeof S!=='undefined'&&S.si!==null&&typeof P!=='undefined')?P[S.si]:null;
    if(!p||!p.web) return;
    var checkout=p.web*0.8;
    var qval=qbox.querySelector('.q-val'); if(!qval) return;
    var quote=parseFloat(qval.textContent.replace(/[^0-9.]/g,''));
    if(isNaN(quote)||quote<=0) return;
    var saved=checkout-quote; if(saved<0.05) return;
    var pct=Math.round((saved/checkout)*100);
    var b=document.createElement('div'); b.className='ml-savings';
    b.innerHTML='<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><span class="ml-sav-main">Save AED '+saved.toFixed(2)+'/unit</span><span class="ml-sav-pct">'+pct+'% off</span></div><div class="ml-sav-sub">vs website checkout (AED '+checkout.toFixed(2)+'/unit)</div></div>';
    qbox.insertBefore(b,qbox.firstChild);
  }catch(e){}
}

function fixScreenTip(){
  var tip=document.querySelector('.tip[data-ta="screen"]');
  if(!tip||tip.dataset.ml) return;
  var tt=tip.querySelector('.tt'); if(!tt) return;
  var ts=tip.querySelector('.ts');
  var sm=tt.textContent.match(/save AED ([\d.]+)\/unit/i);
  var pm=(ts?ts.textContent:'').match(/([\d]+)%/);
  if(sm&&pm){
    tip.innerHTML='<div class="tt">Switch to Screen Print \u2014 save AED '+sm[1]+'/unit <span class="ts">('+pm[1]+'% cheaper)</span></div>';
    tip.dataset.ml='1';
  }
}

var ML_LABELS={dtf:'DTF',uv:'UV Print',uvdtf:'UV DTF',engrave:'Engrave',emb:'Embroidery',sand:'Sand Blast',screen:'Screen',none:'No Print'};
function fixMethodLabels(){
  document.querySelectorAll('[data-pm]').forEach(function(btn){
    var pm=btn.getAttribute('data-pm');
    if(!pm||!ML_LABELS[pm]) return;
    var lbl=btn.querySelector('.ml-lbl');

      lbl=document.createElement('span'); lbl.className='ml-lbl';
      btn.insertBefore(lbl,btn.firstChild);

    lbl.textContent=ML_LABELS[pm];
  });

function fixSupplierSpec(){
  try{
    var p=(typeof S!=='undefined'&&S.si!==null&&typeof P!=='undefined')?P[S.si]:null;
    if(!p) return;
    document.querySelectorAll('.spec').forEach(function(spec){
      var lbl=spec.querySelector('.l');
      if(!lbl||lbl.textContent.toUpperCase()!=='SUPPLIER') return;
      if(spec.classList.contains('spec-sup')) return;
      spec.classList.add('spec-sup');
      var val=spec.querySelector('.v'); if(!val) return;
      var suppliers=(p.sup||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
      var supUrl=p.supUrl||'';
      var html='';
      suppliers.forEach(function(s,i){
        if(i===0&&supUrl){
          html+='<a class="ml-sup-link" href="'+supUrl+'" target="_blank" rel="noopener">'+
            '<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/></svg>'+
            esc(s)+'</a>';
        } else {
          html+='<span class="ml-sup-chip">'+esc(s)+'</span>';
        }
      });
      val.innerHTML=html;
    });
  }catch(e){}
}

.qb-it-info .qb-it-m .qb-pill{padding:1px 7px;background:#f3f4f6;border-radius:4px;font-size:10px;font-weight:600;color:#374151}
.qb-it-col{text-align:right}
.qb-it-lbl{font-size:9px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.qb-it-val{font-size:13px;font-weight:700;color:#111}
.qb-it-val.tot{color:#16a34a;font-weight:800}
.qb-it-rm{width:30px;height:30px;border:none;background:none;color:#9ca3af;font-size:18px;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.qb-it-rm:hover{background:#fef2f2;color:#dc2626}

.qb-summary{background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:12px;padding:18px 20px}
.qb-sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12.5px}
.qb-sum-row.tot{padding-top:12px;margin-top:6px;border-top:1.5px solid #d1d5db;font-size:16px;font-weight:900}
.qb-sum-row .l{color:#6b7280;font-weight:600}
.qb-sum-row.tot .l{color:#111}
.qb-sum-row .v{font-weight:800;color:#111;font-variant-numeric:tabular-nums}
.qb-sum-row.tot .v{color:#16a34a;font-size:20px}
.qb-sum-row.del .v{color:#374151}
.qb-sum-note{font-size:10.5px;color:#9a3412;margin-top:10px;padding:8px 11px;background:#fff7ed;border-radius:6px;border:1px solid #fed7aa;line-height:1.4}

/* Toast for "added to quote" */
.ml-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#111;color:#fff;padding:11px 18px;border-radius:9px;font-size:12.5px;font-weight:700;z-index:99999;display:flex;align-items:center;gap:8px;box-shadow:0 6px 24px rgba(0,0,0,.25);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none}
.ml-toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.ml-toast .ic{color:#16a34a;font-weight:900}
</style>

<script>
(function(){
  /* ═══════════════════════════════════════════════════════════
     V18: STORAGE KEYS & STATE
     ═══════════════════════════════════════════════════════════ */
  var QKEY = 'ml_quote_v1';
  var SKEY = 'ml_ship_v1';
  
  function readQuote(){
    try{ return JSON.parse(localStorage.getItem(QKEY)||'[]'); }catch(e){ return []; }
  }
  function writeQuote(arr){
    try{ localStorage.setItem(QKEY, JSON.stringify(arr)); }catch(e){}
  }
  function readShip(){
    try{ return localStorage.getItem(SKEY) || 'uae'; }catch(e){ return 'uae'; }
  }
  function writeShip(v){
    try{ localStorage.setItem(SKEY, v); }catch(e){}
  }
  
  // Delivery charge - session only (cleared on close, since it's deal-specific)
  var _delCharge = 0;

  /* ═══════════════════════════════════════════════════════════
     V18: SAND-BLAST TROPHY FILTER (override gpm)
     ═══════════════════════════════════════════════════════════ */
  var _gpmPatched = false;
  function patchGpm(){
    if (_gpmPatched || typeof gpm !== 'function') return;
    _gpmPatched = true;
    var orig = gpm;
    window.gpm = function(p){
      var list = orig(p);
      if (!p || !p.title) return list;
      var isAward = /troph|medal|plaque|award/i.test(p.title);
      return list.filter(function(m){
        if (m.id === 'sand') return isAward;
        return true;
      });
    };
  }

  /* ═══════════════════════════════════════════════════════════
     V18: STOCK BADGE INJECTION
     ═══════════════════════════════════════════════════════════ */
  function stockMeta(code){
    return ({
      'I':{label:'In Stock',cls:'I'},
      'O':{label:'Out of Stock',cls:'O'},
      'P':{label:'Pending Approval',cls:'P'},
      'D':{label:'Discontinued',cls:'D'}
    })[code] || null;
  }
  function injectStockBadge(){
    try{
      if (typeof S==='undefined' || S.si===null || typeof P==='undefined') return;
      var p = P[S.si]; if (!p) return;
      var meta = stockMeta(p.stockCode); if (!meta) return;
      
      // Find product card title (the .cd that contains the product info)
      var titleEl = document.querySelector('.cd .pt') ||
                    document.querySelector('.cd h2') ||
                    document.querySelector('.cd .title');
      if (!titleEl){
        // Fallback: find first .cd in main area
        var firstCd = document.querySelector('.body .cd');
        if (!firstCd) return;
        titleEl = firstCd.firstElementChild;
      }
      if (!titleEl) return;
      
      // Remove any existing badge
      var card = titleEl.closest('.cd') || titleEl.parentNode;
      var old = card.querySelector('.ml-stk'); if (old) old.remove();
      
      var b = document.createElement('div');
      b.className = 'ml-stk '+meta.cls;
      b.innerHTML = '<span class="ml-stk-dot"></span>'+meta.label;
      card.insertBefore(b, card.firstChild);
    }catch(e){}
  }

  /* ═══════════════════════════════════════════════════════════
     V18: SHIPPING TOGGLE
     ═══════════════════════════════════════════════════════════ */
  function injectShipToggle(){
    var tbr = document.querySelector('.tb-r');
    if (!tbr || document.getElementById('ml-ship')) return;
    
    var current = readShip();
    var wrap = document.createElement('div');
    wrap.className = 'ml-ship-wrap';
    wrap.id = 'ml-ship';
    wrap.innerHTML =
      '<button class="ml-ship-btn'+(current==='uae'?' on':'')+'" data-ship="uae" type="button">🇦🇪 UAE</button>'+
      '<button class="ml-ship-btn'+(current==='intl'?' on':'')+'" data-ship="intl" type="button">🌍 International</button>';
    tbr.parentNode.insertBefore(wrap, tbr);
    
    wrap.querySelectorAll('[data-ship]').forEach(function(btn){
      btn.onclick = function(){
        var v = btn.getAttribute('data-ship');
        writeShip(v);
        wrap.querySelectorAll('.ml-ship-btn').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-ship')===v); });
        // Reset delivery charge when switching to intl
        if (v==='intl') _delCharge = 0;
        if (typeof updOut==='function') updOut();
        renderQuoteBuilder(); // re-render quote tab if open
      };
    });
  }

  /* ═══════════════════════════════════════════════════════════
     V18: DELIVERY / INTERNATIONAL ADD-ON TO QUOTE BOX
     ═══════════════════════════════════════════════════════════ */
  function injectShipping(){
    try{
      var qbox = document.querySelector('.qbox.ok,.qbox.cap');
      if (!qbox) return;
      // Remove any prior
      var prev = qbox.parentNode.querySelector('.ml-del-row,.ml-intl-note');
      while(prev){ prev.remove(); prev = qbox.parentNode.querySelector('.ml-del-row,.ml-intl-note'); }
      
      var ship = readShip();
      if (ship === 'intl'){
        var n = document.createElement('div');
        n.className = 'ml-intl-note';
        n.innerHTML = '<div class="ml-intl-icon">🌍</div><div class="ml-intl-txt"><strong>International shipping</strong> — please get freight pricing from the Shipping Team before sending this quote. The total below excludes shipping.</div>';
        qbox.parentNode.insertBefore(n, qbox.nextSibling);
      } else {
        var d = document.createElement('div');
        d.className = 'ml-del-row';
        d.innerHTML =
          '<div class="ml-del-lbl">UAE Delivery (one-time, post-VAT)</div>'+
          '<span class="ml-del-pre">AED</span>'+
          '<input class="ml-del-inp" id="ml-del-inp" type="text" inputmode="decimal" value="'+(_delCharge||'')+'" placeholder="0.00">';
        qbox.parentNode.insertBefore(d, qbox.nextSibling);
        
        var inp = document.getElementById('ml-del-inp');
        inp.addEventListener('input', function(){
          var v = parseFloat((this.value||'').replace(/[^0-9.]/g,''))||0;
          _delCharge = v;
          updateGrandTotal();
        });
      }
      updateGrandTotal();
    }catch(e){}
  }
  function updateGrandTotal(){
    try{
      var totBox = document.querySelector('.q-totals');
      if (!totBox) return;
      // Remove prior grand total injected
      var gt = totBox.parentNode.querySelector('.ml-grand');
      if (gt) gt.remove();
      
      if (readShip()==='intl' || _delCharge<=0) return;
      
      // Compute new grand total = existing inc. VAT + delivery
      var cells = totBox.querySelectorAll('.q-tot .tv');
      if (cells.length < 3) return;
      var incVat = parseFloat(cells[2].textContent.replace(/[^0-9.]/g,''))||0;
      var grand = incVat + _delCharge;
      
      var row = document.createElement('div');
      row.className = 'ml-grand';
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:10px 0 0;margin-top:10px;border-top:1.5px dashed rgba(0,0,0,.12)';
      row.innerHTML =
        '<div><div style="font-size:9px;color:#6b7280;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Grand Total (with delivery)</div></div>'+
        '<div style="font-size:18px;font-weight:900;color:#16a34a">AED '+grand.toFixed(2)+'</div>';
      totBox.parentNode.appendChild(row);
    }catch(e){}
  }

  /* ═══════════════════════════════════════════════════════════
     V18: "ADD TO QUOTE" BUTTON
     ═══════════════════════════════════════════════════════════ */
  function injectAddBtn(){
    try{
      var qbox = document.querySelector('.qbox.ok');  // only show on valid quotes
      if (!qbox) return;
      // Find the bottom of the output area
      var oa = document.getElementById('OA');
      if (!oa) return;
      if (oa.querySelector('.ml-addq-row')) return;
      
      if (typeof S==='undefined' || S.si===null) return;
      var p = P[S.si]; if (!p) return;
      
      // Snapshot current state
      var row = document.createElement('div');
      row.className = 'ml-addq-row';
      row.innerHTML = '<button class="ml-addq-btn" id="ml-addq" type="button">'+
        '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>'+
        'Add to Quote List</button>';
      oa.appendChild(row);
      
      document.getElementById('ml-addq').onclick = function(){
        addCurrentToQuote();
      };
    }catch(e){}
  }
  
  function addCurrentToQuote(){
    if (typeof S==='undefined' || S.si===null) return;
    var p = P[S.si]; if (!p) return;
    var cur = calcP(p, S.pm, S.sd, S.pr, qt(S.qty));
    if (!cur) return;
    var pmO = PMS.find(function(m){return m.id===S.pm;});
    
    var item = {
      id: Date.now()+'-'+Math.random().toString(36).slice(2,7),
      sku: p.sku,
      title: p.title,
      cat: p.cat,
      qty: S.qty,
      pm: S.pm,
      pmName: pmO ? pmO.n : S.pm,
      sd: S.sd,
      flatPrint: pmO ? !!pmO.f : true,
      prem: S.pr,
      unit: cur.px,
      margin: cur.m,
      lineTotal: cur.px * S.qty,
      addedAt: Date.now()
    };
    
    var list = readQuote();
    list.push(item);
    writeQuote(list);
    
    // Confirmation
    showToast('Added to Quote List · '+list.length+' items');
    var btn = document.getElementById('ml-addq');
    if (btn){
      btn.classList.add('done');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8l4 4 8-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg> Added ✓';
      setTimeout(function(){
        btn.classList.remove('done');
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg> Add to Quote List';
      }, 1400);
    }
    updateQuoteTabBadge();
  }
  
  function showToast(msg){
    var t = document.getElementById('ml-toast');
    if (!t){
      t = document.createElement('div');
      t.id = 'ml-toast';
      t.className = 'ml-toast';
      document.body.appendChild(t);
    }
    t.innerHTML = '<span class="ic">✓</span> '+msg;
    t.classList.add('on');
    clearTimeout(t._tm);
    t._tm = setTimeout(function(){ t.classList.remove('on'); }, 2200);
  }

  /* ═══════════════════════════════════════════════════════════
     V18: QUOTE BUILDER TAB
     ═══════════════════════════════════════════════════════════ */
  function injectQuoteTab(){
    var tabs = document.querySelector('.tb-tabs');
    if (!tabs || tabs.querySelector('[data-tab="quote"]')) return;
    
    var count = readQuote().length;
    var btn = document.createElement('button');
    btn.className = 'tab' + (typeof S!=='undefined' && S.tab==='quote'?' on':'');
    btn.setAttribute('data-tab','quote');
    btn.type = 'button';
    btn.innerHTML = 'Quote Builder' + (count>0?'<span class="ml-qb-badge">'+count+'</span>':'');
    tabs.appendChild(btn);
    
    btn.onclick = function(){
      if (typeof S==='undefined') return;
      S.tab = 'quote';
      if (typeof render==='function') render(true);
    };
  }
  function updateQuoteTabBadge(){
    var tab = document.querySelector('.tab[data-tab="quote"]');
    if (!tab) return;
    var count = readQuote().length;
    var existing = tab.querySelector('.ml-qb-badge');
    if (count>0){
      if (existing) existing.textContent = count;
      else tab.insertAdjacentHTML('beforeend','<span class="ml-qb-badge">'+count+'</span>');
    } else if (existing) existing.remove();
  }
  
  function renderQuoteBuilder(){
    if (typeof S==='undefined' || S.tab !== 'quote') return;
    
    // Find the main content area
    var body = document.querySelector('.body');
    if (!body) return;
    var mainArea = body.querySelector('.main') || body.children[body.children.length-1];
    if (!mainArea) return;
    
    var items = readQuote();
    var ship = readShip();
    
    var html = '<div class="qb-wrap">';
    html += '<div class="qb-head"><div><div class="qb-title">Quote Builder</div><div class="qb-sub">'+(items.length===0?'Build a multi-product quote — add items from the Calculator tab':items.length+' item'+(items.length>1?'s':'')+' · ready to share')+'</div></div>';
    
    if (items.length>0){
      html += '<div class="qb-actions">'+
        '<button class="qb-act-btn danger" id="qb-clear" type="button">Clear all</button>'+
        '<button class="qb-act-btn primary" id="qb-share" type="button">📱 Share via WhatsApp</button>'+
        '</div>';
    }
    html += '</div>';
    
    if (items.length===0){
      html += '<div class="qb-empty"><div class="qb-empty-ic">📋</div>'+
        '<div class="qb-empty-t">No items yet</div>'+
        '<div class="qb-empty-s">Go to the Calculator tab, configure a product (quantity, print method, sides) and click <strong>Add to Quote List</strong> to build a multi-product quote you can share with one tap.</div></div>';
    } else {
      // Items
      html += '<div class="qb-items">';
      items.forEach(function(it){
        var sideTxt = it.flatPrint ? '' : it.sd+' side'+(it.sd>1?'s':'');
        var method = it.pm==='none' ? 'No print' : (it.pmName + (sideTxt?' ('+sideTxt+')':''));
        html += '<div class="qb-item" data-id="'+it.id+'">'+
          '<div class="qb-it-info">'+
            '<div class="qb-it-t">'+esc(it.title)+'</div>'+
            '<div class="qb-it-m">'+
              '<span class="qb-pill">'+esc(it.sku)+'</span>'+
              '<span class="qb-pill">'+esc(method)+'</span>'+
              (it.prem?'<span class="qb-pill" style="background:#fef3c7;color:#a16207">Premium</span>':'')+
            '</div>'+
          '</div>'+
          '<div class="qb-it-col"><div class="qb-it-lbl">Qty</div><div class="qb-it-val">'+it.qty.toLocaleString()+'</div></div>'+
          '<div class="qb-it-col"><div class="qb-it-lbl">Unit</div><div class="qb-it-val">AED '+it.unit.toFixed(2)+'</div></div>'+
          '<div class="qb-it-col"><div class="qb-it-lbl">Line</div><div class="qb-it-val tot">AED '+it.lineTotal.toFixed(2)+'</div></div>'+
          '<button class="qb-it-rm" data-rm="'+it.id+'" type="button" title="Remove">×</button>'+
          '</div>';
      });
      html += '</div>';
      
      // Summary
      var subtotal = items.reduce(function(s,it){return s+it.lineTotal;},0);
      var vat = subtotal * 0.05;
      var incVat = subtotal + vat;
      var grand = incVat + (ship==='uae' ? _delCharge : 0);
      var totalUnits = items.reduce(function(s,it){return s+it.qty;},0);
      
      html += '<div class="qb-summary">'+
        '<div class="qb-sum-row"><span class="l">'+items.length+' product'+(items.length>1?'s':'')+' · '+totalUnits.toLocaleString()+' units</span><span class="v">&nbsp;</span></div>'+
        '<div class="qb-sum-row"><span class="l">Subtotal</span><span class="v">AED '+subtotal.toFixed(2)+'</span></div>'+
        '<div class="qb-sum-row"><span class="l">VAT (5%)</span><span class="v">AED '+vat.toFixed(2)+'</span></div>';
      if (ship==='uae'){
        html += '<div class="qb-sum-row del"><span class="l">UAE Delivery (one-time, post-VAT)</span>'+
          '<span class="v">AED <input class="ml-del-inp" id="qb-del-inp" type="text" inputmode="decimal" value="'+(_delCharge||'')+'" placeholder="0.00" style="width:90px;margin-left:6px"></span></div>';
      }
      html += '<div class="qb-sum-row tot"><span class="l">'+(ship==='intl'?'Total inc. VAT (ex-shipping)':'Grand Total')+'</span><span class="v">AED '+grand.toFixed(2)+'</span></div>';
      if (ship==='intl'){
        html += '<div class="qb-sum-note">🌍 <strong>International order</strong> — freight pricing must be obtained from the Shipping Team. Total above excludes shipping.</div>';
      }
      html += '</div>';
    }
    html += '</div>';
    
    mainArea.innerHTML = html;
    
    // Wire events
    document.querySelectorAll('[data-rm]').forEach(function(btn){
      btn.onclick = function(){
        var id = btn.getAttribute('data-rm');
        var list = readQuote().filter(function(it){return it.id!==id;});
        writeQuote(list);
        renderQuoteBuilder();
        updateQuoteTabBadge();
      };
    });
    var clearBtn = document.getElementById('qb-clear');
    if (clearBtn) clearBtn.onclick = function(){
      if (confirm('Clear all '+readQuote().length+' items from the quote list?')){
        writeQuote([]);
        _delCharge = 0;
        renderQuoteBuilder();
        updateQuoteTabBadge();
      }
    };
    var shareBtn = document.getElementById('qb-share');
    if (shareBtn) shareBtn.onclick = shareQuoteWhatsApp;
    var delInp = document.getElementById('qb-del-inp');
    if (delInp) delInp.addEventListener('input', function(){
      _delCharge = parseFloat((this.value||'').replace(/[^0-9.]/g,''))||0;
      renderQuoteBuilder();
    });
  }
  
  function shareQuoteWhatsApp(){
    var items = readQuote();
    if (items.length===0) return;
    var ship = readShip();
    var subtotal = items.reduce(function(s,it){return s+it.lineTotal;},0);
    var vat = subtotal*0.05, incVat = subtotal+vat;
    var grand = incVat + (ship==='uae' ? _delCharge : 0);
    
    var msg = '*Merchlist Quote*\n\n';
    items.forEach(function(it,i){
      var sideTxt = it.flatPrint ? '' : ' ('+it.sd+' side'+(it.sd>1?'s':'')+')';
      var method = it.pm==='none' ? 'No print' : (it.pmName + sideTxt);
      msg += (i+1)+'. *'+it.title+'*\n';
      msg += '   '+it.sku+' · '+method+'\n';
      msg += '   '+it.qty.toLocaleString()+' units × AED '+it.unit.toFixed(2)+' = AED '+it.lineTotal.toFixed(2)+'\n\n';
    });
    msg += '────────────\n';
    msg += 'Subtotal: AED '+subtotal.toFixed(2)+'\n';
    msg += 'VAT 5%: AED '+vat.toFixed(2)+'\n';
    if (ship==='uae' && _delCharge>0) msg += 'Delivery: AED '+_delCharge.toFixed(2)+'\n';
    msg += '*Total: AED '+grand.toFixed(2)+'*\n';
    if (ship==='intl') msg += '\n_International order — shipping quoted separately_';
    msg += '\n\nReady to proceed? Reply here.';
    
    window.open('https://wa.me/?text='+encodeURIComponent(msg), '_blank');
  }
  
  function esc(s){
    return String(s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});
  }

  /* ═══════════════════════════════════════════════════════════
     V18: BOOT — hook into existing render flow
     ═══════════════════════════════════════════════════════════ */
  var _renderPatched = false;
  function patchRender(){
    if (_renderPatched || typeof render !== 'function') return;
    _renderPatched = true;
    var origRender = render;
    window.render = function(){
      var r = origRender.apply(this, arguments);
      // After every render: inject UI extras
      setTimeout(function(){
        patchGpm();
        injectShipToggle();
        injectQuoteTab();
        updateQuoteTabBadge();
        if (S.tab === 'quote') {
          renderQuoteBuilder();
        } else if (S.tab === 'calc') {
          injectStockBadge();
          injectShipping();
          injectAddBtn();
        }
      }, 30);
      return r;
    };
  }
  var _updOutPatched2 = false;
  function patchUpdOut2(){
    if (_updOutPatched2 || typeof updOut !== 'function') return;
    _updOutPatched2 = true;
    var orig = updOut;
    window.updOut = function(){
      var r = orig.apply(this, arguments);
      setTimeout(function(){
        injectStockBadge();
        injectShipping();
        injectAddBtn();
      }, 20);
      return r;
    };
  }
  
  function boot(){
    patchGpm();
    patchRender();
    patchUpdOut2();
    injectShipToggle();
    injectQuoteTab();
    updateQuoteTabBadge();
    if (typeof S!=='undefined' && S.tab==='quote') renderQuoteBuilder();
    else { injectStockBadge(); injectShipping(); injectAddBtn(); }
  }
  
  var bootTries = 0;
  var bootInt = setInterval(function(){
    bootTries++;
    if (typeof render === 'function' && typeof updOut === 'function' && typeof gpm === 'function'){
      clearInterval(bootInt);
      boot();
    } else if (bootTries > 40){
      clearInterval(bootInt);
    }
  }, 150);
})();
</script>
<!-- ═══════════════════ END UI PATCH v3.2 (v18) ═══════════════════ -->


<!-- ═══════════════════ MERCHLIST UI PATCH v3.3 (v19) ═══════════════════ -->
<style>
/* ── ADD TO BULK QUOTE — now inside qbox at top ── */
.qbox{position:relative}
.ml-addbq-row{display:flex;margin-bottom:12px}
.ml-addbq-btn{flex:1;padding:9px 14px;background:#fff;border:1.5px solid #111;color:#111;border-radius:8px;font-size:11.5px;font-weight:800;cursor:pointer;letter-spacing:.2px;transition:all .12s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.ml-addbq-btn:hover{background:#111;color:#fff}
.ml-addbq-btn.done{background:#16a34a;border-color:#16a34a;color:#fff}
/* Suppress the old bottom button completely */
.ml-addq-row{display:none!important}

/* ── 2-LINE SUPPLIER (names row 1, URL row 2) ── */
.spec-sup{flex:1 1 100%!important;border-top:1px solid #f9fafb!important;padding-top:6px!important;margin-top:2px!important}
.spec-sup .l{margin-bottom:5px!important}
.ml-sup-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:5px}
.ml-sup-urlrow{display:flex;align-items:center;gap:6px;padding-top:5px;border-top:1px dashed #f3f4f6;margin-top:2px}
.ml-sup-urllink{font-size:10.5px;font-weight:600;color:#15803d;text-decoration:none;display:inline-flex;align-items:center;gap:5px;padding:3px 8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;line-height:1.4;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ml-sup-urllink:hover{background:#dcfce7;border-color:#86efac}
.ml-sup-urllink svg{flex-shrink:0}

/* ── COPY BOX for Quote Builder ── */
.qb-copybox{margin-top:18px;background:#fff;border:1.5px solid #e5e7eb;border-radius:12px;padding:16px 18px}
.qb-copybox-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qb-copybox-lbl{font-size:11px;font-weight:800;color:#111;text-transform:uppercase;letter-spacing:.5px;display:inline-flex;align-items:center;gap:6px}
.qb-copybox-txt{background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:9px;padding:14px 16px;font-size:12px;line-height:1.7;color:#374151;font-family:inherit;max-height:340px;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word}
.qb-copybtn{padding:8px 14px;font-size:11px;font-weight:700;background:#111;color:#fff;border:1.5px solid #111;border-radius:7px;cursor:pointer;letter-spacing:.3px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.qb-copybtn:hover{background:#000}
.qb-copybtn.done{background:#16a34a;border-color:#16a34a}
</style>

<script>
(function(){
  /* ═══════════════════════════════════════════════════════════
     V19: CAPTURE-PHASE CLICK — sidebar product → Calculator tab
     ═══════════════════════════════════════════════════════════ */
  document.addEventListener('click', function(e){
    var pi = e.target.closest && e.target.closest('.pi');
    if (!pi) return;
    if (typeof S !== 'undefined' && S.tab !== 'calc'){
      S.tab = 'calc';
    }
  }, true);

  /* ═══════════════════════════════════════════════════════════
     V19: TAB REORDER — Calc | Quote | Finder
     ═══════════════════════════════════════════════════════════ */
  function reorderTabs(){
    var tabs = document.querySelector('.tb-tabs');
    if (!tabs) return;
    var finder = tabs.querySelector('[data-tab="finder"]');
    var quote = tabs.querySelector('[data-tab="quote"]');
    if (finder && quote && finder.compareDocumentPosition(quote) & Node.DOCUMENT_POSITION_FOLLOWING){
      // quote currently after finder → swap (move quote before finder)
      tabs.insertBefore(quote, finder);
    }
  }

  /* ═══════════════════════════════════════════════════════════
     V19: HIDE SHIP TOGGLE IN FINDER TAB
     ═══════════════════════════════════════════════════════════ */
  function toggleShipVisibility(){
    var ship = document.getElementById('ml-ship');
    if (!ship) return;
    ship.style.display = (typeof S!=='undefined' && S.tab==='finder') ? 'none' : '';
  }

  /* ═══════════════════════════════════════════════════════════
     V19: LOGO RE-INJECTION (was lost on every render)
     ═══════════════════════════════════════════════════════════ */
  var ML_SVG_V19 = '<svg class="ml-logo-svg" viewBox="0 0 148 30" xmlns="http://www.w3.org/2000/svg"><text y="24" font-family="Georgia,\'Times New Roman\',serif" font-size="25" font-weight="700" fill="#111" letter-spacing="-0.8">merchlist</text></svg>';
  function reInjectLogo(){
    var tbl = document.querySelector('.tb-l');
    if (!tbl) return;
    if (tbl.querySelector('.ml-logo-svg')) return; // already present
    var hidden = tbl.querySelector('.tb-logo');
    var d = document.createElement('div'); d.innerHTML = ML_SVG_V19;
    var svgEl = d.firstChild;
    if (hidden) tbl.insertBefore(svgEl, hidden);
    else tbl.insertBefore(svgEl, tbl.firstChild);
  }

  /* ═══════════════════════════════════════════════════════════
     V19: MOVE ADD-TO-QUOTE INTO QBOX TOP, RENAME LABEL
     ═══════════════════════════════════════════════════════════ */
  function injectAddBtnV19(){
    try{
      var qbox = document.querySelector('.qbox.ok'); // only valid quotes
      if (!qbox) return;
      // Remove any prior v18 injection at bottom OR existing top button (idempotent)
      var oldBot = document.querySelector('.ml-addq-row'); if (oldBot) oldBot.remove();
      if (qbox.querySelector('.ml-addbq-row')) return;
      if (typeof S==='undefined' || S.si===null) return;
      var p = P[S.si]; if (!p) return;
      
      var row = document.createElement('div');
      row.className = 'ml-addbq-row';
      row.innerHTML = '<button class="ml-addbq-btn" id="ml-addbq" type="button">'+
        '<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>'+
        '+ Add to Bulk Quote List</button>';
      qbox.insertBefore(row, qbox.firstChild);
      
      document.getElementById('ml-addbq').onclick = function(){
        if (typeof addCurrentToQuote === 'function') addCurrentToQuote();
        else if (window.addCurrentToQuote) window.addCurrentToQuote();
      };
    }catch(e){}
  }
  // Expose v18's addCurrentToQuote at window level (already is) and re-style toast button text
  // Override v18 button done-state text
  var _origAddCQ = window.addCurrentToQuote;
  if (typeof _origAddCQ !== 'function'){
    // It's defined in v18 patch IIFE — wait briefly
  }
  // Hook to update the new button's done state
  var _addInterceptor = null;
  (function setupInterceptor(){
    var tries=0;
    var iv=setInterval(function(){
      tries++;
      if (typeof window.addCurrentToQuote === 'function' || tries>50){
        clearInterval(iv);
      }
    },150);
  })();
  
  /* ═══════════════════════════════════════════════════════════
     V19: UAE DELIVERY LABEL CLEANUP
     ═══════════════════════════════════════════════════════════ */
  function cleanDeliveryLabel(){
    document.querySelectorAll('.ml-del-lbl').forEach(function(el){
      el.textContent = 'UAE Delivery';
    });
  }

  /* ═══════════════════════════════════════════════════════════
     V19: 2-LINE SUPPLIER — names row 1, URL row 2
     ═══════════════════════════════════════════════════════════ */
  function fixSupplierSpecV19(){
    try{
      var p = (typeof S!=='undefined' && S.si!==null && typeof P!=='undefined') ? P[S.si] : null;
      if (!p) return;
      document.querySelectorAll('.spec').forEach(function(spec){
        var lbl = spec.querySelector('.l');
        if (!lbl || lbl.textContent.trim().toUpperCase() !== 'SUPPLIER') return;
        spec.classList.add('spec-sup');
        var val = spec.querySelector('.v'); if (!val) return;
        // Already v19-rendered? Skip
        if (val.querySelector('.ml-sup-row')) return;
        
        var suppliers = (p.sup||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
        var supUrl = p.supUrl || '';
        
        var html = '<div class="ml-sup-row">';
        suppliers.forEach(function(s){
          html += '<span class="ml-sup-chip">'+escHTML(s)+'</span>';
        });
        html += '</div>';
        if (supUrl){
          var short = supUrl.replace(/^https?:\/\/(www\.)?/,'').slice(0,60) + (supUrl.length>60?'…':'');
          html += '<div class="ml-sup-urlrow">'+
            '<a class="ml-sup-urllink" href="'+escAttr(supUrl)+'" target="_blank" rel="noopener" title="'+escAttr(supUrl)+'">'+
              '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'+
              escHTML(short)+
            '</a>'+
            '</div>';
        }
        val.innerHTML = html;
      });
    }catch(e){}
  }
  function escHTML(s){return String(s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
  function escAttr(s){return escHTML(s);}

  /* ═══════════════════════════════════════════════════════════
     V19: QUOTE BUILDER — REPLACE WHATSAPP BTN WITH COPY-BOX
     ═══════════════════════════════════════════════════════════ */
  function buildQuoteText(){
    if (typeof readQuote!=='function' && typeof window.readQuote!=='function') return '';
    var items = (window.readQuote||readQuote)();
    if (!items.length) return '';
    var ship = (window.readShip||readShip)();
    var subtotal = items.reduce(function(s,it){return s+it.lineTotal;},0);
    var vat = subtotal*0.05, incVat = subtotal+vat;
    var del = (typeof window._delCharge!=='undefined'?window._delCharge:0)||0;
    // Pull current _delCharge from delivery input if visible
    var delInp = document.getElementById('qb-del-inp');
    if (delInp) del = parseFloat((delInp.value||'').replace(/[^0-9.]/g,''))||0;
    var grand = incVat + (ship==='uae' ? del : 0);
    
    var lines = ['MERCHLIST QUOTE', ''];
    items.forEach(function(it,i){
      var sideTxt = it.flatPrint ? '' : ' ('+it.sd+' side'+(it.sd>1?'s':'')+')';
      var method = it.pm==='none' ? 'No print' : (it.pmName + sideTxt);
      lines.push((i+1)+'. '+it.title);
      lines.push('   '+it.sku+' · '+method);
      lines.push('   '+it.qty.toLocaleString()+' units × AED '+it.unit.toFixed(2)+' = AED '+it.lineTotal.toFixed(2));
      lines.push('');
    });
    lines.push('────────────────');
    lines.push('Subtotal: AED '+subtotal.toFixed(2));
    lines.push('VAT 5%: AED '+vat.toFixed(2));
    if (ship==='uae' && del>0) lines.push('Delivery: AED '+del.toFixed(2));
    lines.push('TOTAL: AED '+grand.toFixed(2));
    if (ship==='intl') lines.push('\nInternational order — shipping quoted separately by the Shipping Team.');
    lines.push('');
    lines.push('Ready to proceed? Let us know.');
    return lines.join('\n');
  }
  
  function transformQuoteBuilderUI(){
    if (typeof S==='undefined' || S.tab !== 'quote') return;
    // Remove WhatsApp share button
    var shareBtn = document.getElementById('qb-share');
    if (shareBtn) shareBtn.remove();
    // Add copy box if items present
    var items = (window.readQuote||readQuote||function(){return [];})();
    if (!items.length) return;
    var wrap = document.querySelector('.qb-wrap');
    if (!wrap) return;
    if (wrap.querySelector('.qb-copybox')) return; // already added
    var summary = wrap.querySelector('.qb-summary');
    if (!summary) return;
    
    var box = document.createElement('div');
    box.className = 'qb-copybox';
    box.innerHTML =
      '<div class="qb-copybox-head">'+
        '<span class="qb-copybox-lbl">📋 Quote (Email / WhatsApp / SMS)</span>'+
        '<button class="qb-copybtn" id="qb-copybtn" type="button">'+
          '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="1.5" rx="1"/><path d="M2 2h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'+
          'Copy Quote</button>'+
      '</div>'+
      '<div class="qb-copybox-txt" id="qb-copytxt">'+escHTML(buildQuoteText())+'</div>';
    summary.parentNode.insertBefore(box, summary.nextSibling);
    
    document.getElementById('qb-copybtn').onclick = function(){
      var txt = document.getElementById('qb-copytxt').textContent;
      var b = this;
      navigator.clipboard.writeText(txt).then(function(){
        b.classList.add('done');
        b.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied ✓';
        setTimeout(function(){
          b.classList.remove('done');
          b.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="1.5" rx="1"/><path d="M2 2h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Copy Quote';
        }, 1600);
      }).catch(function(){
        // Fallback: select the textbox
        var r = document.createRange(); r.selectNodeContents(document.getElementById('qb-copytxt'));
        var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
      });
    };
    
    // Refresh copy text when delivery input changes (already handled in v18's renderer)
    var delInp = document.getElementById('qb-del-inp');
    if (delInp){
      var orig = delInp.oninput;
      delInp.addEventListener('input', function(){
        var tx = document.getElementById('qb-copytxt');
        if (tx) tx.textContent = buildQuoteText();
      });
    }
  }

  /* ═══════════════════════════════════════════════════════════
     V19: BOOT — hook into render
     ═══════════════════════════════════════════════════════════ */
  function v19Hook(){
    reInjectLogo();
    reorderTabs();
    toggleShipVisibility();
    if (typeof S!=='undefined' && S.tab==='calc'){
      injectAddBtnV19();
      cleanDeliveryLabel();
      fixSupplierSpecV19();
    } else if (typeof S!=='undefined' && S.tab==='quote'){
      transformQuoteBuilderUI();
    }
  }
  
  var _v19RenderPatched = false;
  function patchRenderV19(){
    if (_v19RenderPatched || typeof render!=='function') return;
    _v19RenderPatched = true;
    var orig = render;
    window.render = function(){
      var r = orig.apply(this, arguments);
      setTimeout(v19Hook, 50);
      return r;
    };
  }
  
  var iv = setInterval(function(){
    if (typeof render==='function'){
      clearInterval(iv);
      patchRenderV19();
      v19Hook();
    }
  }, 150);
  // Also run on DOM mutations to catch updOut refreshes
  setInterval(v19Hook, 800);
})();
</script>
<!-- ═══════════════════ END UI PATCH v3.3 (v19) ═══════════════════ -->

</body></html>
