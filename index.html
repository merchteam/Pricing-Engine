    document.querySelectorAll('.air-ex-chip').forEach(function(ch){
      ch.onclick=function(){
        itemsInp.value=ch.getAttribute('data-ex-q')||'';
        budInp.value=ch.getAttribute('data-ex-b')||'';
        var bm=ch.getAttribute('data-ex-m')||'per_item';
        var s=readAIRState(); s.budgetMode=bm; writeAIRState(s);
        document.querySelectorAll('[data-bm]').forEach(function(b){b.classList.toggle('on', b.getAttribute('data-bm')===bm);});
        runSearch();
      };
    });
  }
  
  function renderResults(results, state){
    if(!results||!results.groups.length) return '';
    var nonEmpty=results.groups.filter(function(g){return g.results.length>0;});
    var empty=results.groups.filter(function(g){return g.results.length===0;});
    
    if(!nonEmpty.length){
      return '<div class="air-nomatch"><div class="air-nomatch-i">🤔</div><strong>No products matched your search.</strong><br><span style="font-size:11.5px;color:#9a3412">Try broader terms or remove the budget filter.</span></div>';
    }
    
    var html='';
    var budgetTxt='';
    if(state.budget&&parseFloat(state.budget)>0){
      budgetTxt = state.budgetMode==='per_item' 
        ? ' · budget ≤ AED '+state.budget+' per piece'
        : ' · total order budget AED '+state.budget;
    }
    
    html+='<div class="air-summary">'+
      '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8l4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      'Found <b>'+results.totalMatches+'</b> matches across <b>'+nonEmpty.length+'</b> item type'+(nonEmpty.length>1?'s':'')+
      budgetTxt+'. Click any product to open in Calculator.</div>';
    
    nonEmpty.forEach(function(g,gi){
      var groupId='g'+gi;
      var isExpanded = state.expanded&&state.expanded[g.token];
      var INITIAL=12;
      var visible = isExpanded ? g.results : g.results.slice(0, INITIAL);
      var withinCount = g.results.filter(function(r){return r.withinBudget;}).length;
      
      html+='<div class="air-group">';
      html+='<div class="air-grp-head"><div class="air-grp-t">'+escAIR(g.token)+'</div>'+
            '<div class="air-grp-meta">'+
              '<span class="air-grp-stat b">'+visible.length+' shown</span>'+
              '<span class="air-grp-stat">'+g.totalFound+' total</span>'+
              (state.budget&&state.budgetMode==='per_item'?'<span class="air-grp-stat">'+withinCount+' in budget</span>':'')+
            '</div></div>';
      
      html+='<div class="air-cards" id="cards-'+groupId+'">';
      visible.forEach(function(r){
        html+=renderCard(r);
      });
      html+='</div>';
      
      if(g.results.length>INITIAL && !isExpanded){
        html+='<div class="air-more" data-expand="'+escAIR(g.token)+'">↓ Show all '+g.results.length+' products in '+escAIR(g.token)+'</div>';
      } else if(g.results.length>INITIAL && isExpanded){
        html+='<div class="air-more" data-expand="'+escAIR(g.token)+'" data-collapse="1">↑ Show less</div>';
      }
      
      html+='</div>';
    });
    
    if(empty.length){
      html+='<div style="margin-top:14px;padding:11px 14px;background:#fef3c7;border:1px solid #fde68a;border-radius:9px;font-size:11px;color:#92400e">'+
        '<strong>No matches for:</strong> '+empty.map(function(g){return '"'+escAIR(g.token)+'"';}).join(', ')+'.</div>';
    }
    return html;
  }
  
  function renderCard(r){
    var p=r.p;
    var stkLabel=({I:'In Stock',O:'Out',P:'Pending',D:'Disc.'})[p.stockCode]||'';
    var stkCls=p.stockCode||'';
    var tier=tierPreviewFor(p);
    var matchTerm=r.term && r.term.length<28 ? r.term : '';
    var budget = readAIRState().budget;
    var bgMode = readAIRState().budgetMode;
    var outOfBudget = (budget && parseFloat(budget)>0 && bgMode==='per_item' && !r.withinBudget);
    
    // Check cache for image/desc — show immediately if already cached
    var cached = ICACHE[p.sku];
    var cachedDesc = DCACHE[p.sku];
    var hasImg = cached && cached !== false && cached !== null;
    var imgState = (cached===false) ? 'noimg' : (cached===undefined || cached===null) ? 'pending' : 'ok';
    
    var html='<div class="air-card'+(outOfBudget?' overbudget':'')+'" data-sku="'+escAIR(p.sku)+'" style="'+(outOfBudget?'opacity:.55':'')+'">';
    
    // Match badge (top-right)
    if(matchTerm){
      html+='<div class="air-c-match">'+escAIR(matchTerm.toUpperCase())+'</div>';
    }
    
    // Thumbnail
    html+='<div class="air-c-thumb'+(imgState==='pending'?' loading':'')+'">';
    if(imgState==='ok'){
      html+='<img src="'+cached+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
    } else if(imgState==='noimg'){
      html+='<div class="air-c-noimg"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
    }
    html+='</div>';
    
    // Body
    html+='<div class="air-c-body">';
    html+='<div class="air-c-row1"><div class="air-c-t">'+escAIR(p.title)+'</div>'+
          (stkLabel?'<span class="air-c-stk '+stkCls+'">'+stkLabel+'</span>':'')+'</div>';
    
    // Description
    var descClass = cachedDesc===undefined||cachedDesc===null ? 'pending' : (cachedDesc ? '' : 'empty');
    var descText = cachedDesc===undefined||cachedDesc===null ? 'Loading…' : (cachedDesc||'—');
    html+='<div class="air-c-desc '+descClass+'">'+escAIR(descText.slice(0,140))+'</div>';
    
    html+='<div class="air-c-row2">'+
            '<div class="air-c-sku">'+escAIR(p.sku)+'</div>'+
            '<div class="air-c-pricing">'+
              '<div class="air-c-priceL">Web Price</div>'+
              '<div class="air-c-price">AED '+(p.web||0)+'</div>'+
            '</div>'+
          '</div>';
    
    // Volume preview
    if(tier){
      html+='<div class="air-c-tier">'+
              '<span>At Qty '+tier.qty+'</span>'+
              '<span>AED '+tier.price.toFixed(2)+'/pc</span>'+
            '</div>';
    }
    
    html+='</div>'; // body
    html+='</div>'; // card
    return html;
  }
  
  function wireResultCards(){
    document.querySelectorAll('.air-card').forEach(function(card){
      card.onclick=function(){
        var sku=card.getAttribute('data-sku');
        var idx=P.findIndex(function(p){return p.sku===sku;});
        if(idx>=0){
          S.si=idx;
          S.tab='calc';
          S.pr=false;
          var pm2=gpm(P[S.si]);
          if(pm2.length&&!pm2.find(function(m){return m.id===S.pm;})) S.pm=pm2[0].id;
          render(true);
        }
      };
    });
    document.querySelectorAll('[data-expand]').forEach(function(btn){
      btn.onclick=function(){
        var token=btn.getAttribute('data-expand');
        var collapsing=btn.hasAttribute('data-collapse');
        var s=readAIRState();
        if(!s.expanded) s.expanded={};
        if(collapsing) delete s.expanded[token];
        else s.expanded[token]=true;
        writeAIRState(s);
        document.getElementById('air-results').innerHTML=renderResults(s.results, s);
        wireResultCards();
        triggerThumbLoads();
      };
    });
  }
  
  function triggerThumbLoads(){
    // Stagger thumbnail loads to avoid hammering the API
    var thumbs=document.querySelectorAll('.air-card .air-c-thumb.loading');
    var i=0;
    thumbs.forEach(function(t){
      var card=t.closest('.air-card');
      if(!card) return;
      var sku=card.getAttribute('data-sku');
      setTimeout(function(){loadCardThumb(sku);}, i*80);
      i++;
    });
  }
  
  function escAIR(s){
    return String(s||'').replace(/[&<>"']/g,function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  
  /* ═══════════════════════════════════════════════════════════
     V25: TAB MANAGEMENT — Move AI Recommender to LAST + hide ship toggle
     ═══════════════════════════════════════════════════════════ */
  function repositionAITab(){
    var tabs=document.querySelector('.tb-tabs');
    if(!tabs) return;
    var airTab=tabs.querySelector('[data-tab="airec"]');
    if(!airTab){
      // Inject if not present
      airTab=document.createElement('button');
      airTab.className='tab'+(typeof S!=='undefined'&&S.tab==='airec'?' on':'');
      airTab.setAttribute('data-tab','airec');
      airTab.type='button';
      airTab.innerHTML='✨ AI Recommender';
      airTab.onclick=function(){
        if(typeof S==='undefined') return;
        S.tab='airec';
        if(typeof render==='function') render(true);
      };
      tabs.appendChild(airTab);
    } else {
      // Move to end
      tabs.appendChild(airTab);
    }
  }
  
  function toggleShipInAITab(){
    var ship=document.getElementById('ml-ship');
    if(!ship) return;
    if(typeof S!=='undefined'&&(S.tab==='airec'||S.tab==='finder')){
      ship.style.display='none';
    } else {
      ship.style.display='';
    }
  }
  
  /* ═══════════════════════════════════════════════════════════
     V25: CALCULATOR — INJECT SHORT DESCRIPTION INTO PRODUCT CARD
     ═══════════════════════════════════════════════════════════ */
  function injectCalcDesc(){
    // V28: Short descriptions removed per user feedback — function neutralized
    return;
  }
  function _injectCalcDesc_disabled_v28(){
    try{
      if(typeof S==='undefined'||S.si===null||S.tab!=='calc') return;
      var p=P[S.si]; if(!p) return;
      var titleArea=document.querySelector('.ph-title');
      if(!titleArea) return;
      var parent=titleArea.parentNode;
      // Remove old description we injected
      var old=parent.parentNode.querySelector('.ml-calc-desc');
      if(old) old.remove();
      
      var desc=DCACHE[p.sku];
      if(desc===undefined||desc===null){
        // Trigger load
        if(typeof loadProductData==='function'){
          loadProductData(p, function(pd){
            if(pd&&pd.desc&&S.si!==null&&P[S.si].sku===p.sku){
              injectCalcDesc(); // re-inject when loaded
            }
          });
        }
        return;
      }
      if(!desc) return; // no description available
      
      var d=document.createElement('div');
      d.className='ml-calc-desc';
      d.style.cssText='font-size:11.5px;color:#6b7280;line-height:1.5;margin-top:6px;font-style:italic;border-left:2px solid #e5e7eb;padding-left:9px';
      d.textContent=desc.slice(0,260);
      parent.parentNode.appendChild(d);
    }catch(e){}
  }
  
  /* ═══════════════════════════════════════════════════════════
     V25: BOOT
     ═══════════════════════════════════════════════════════════ */
  function v25Hook(){
    repositionAITab();
    toggleShipInAITab();
    if(typeof S!=='undefined'){
      if(S.tab==='airec') renderAIRecommender();
      else if(S.tab==='calc') injectCalcDesc();
    }
  }
  
  var _v25Patched=false;
  function patchRenderV25(){
    if(_v25Patched||typeof render!=='function') return;
    _v25Patched=true;
    var orig=window.render;
    window.render=function(){
      var r=orig.apply(this, arguments);
      try{v25Hook();}catch(e){}
      return r;
    };
  }
  
  var iv=setInterval(function(){
    if(typeof render==='function'){
      clearInterval(iv);
      patchRenderV25();
      v25Hook();
    }
  }, 150);
})();
</script>
<!-- ═══════════════════ END UI PATCH v3.6 (v25) ═══════════════════ -->

  function parseIntent(input){
    var txt = input || '';
    
    // Use case
    var useCase = null;
    for (var i=0; i<USECASES.length; i++){
      if(USECASES[i].match.test(txt)){ useCase = USECASES[i]; break; }
    }
    
    // Tones (can be multiple)
    var tones = TONES.filter(function(t){return t.match.test(txt);});
    
    // Budget detection — multiple patterns
    var budget = null, budgetUnit = 'per_person';
    var bm;
    if((bm = txt.match(/(?:budget|under|max|maximum|upto|up to|around|about|approximately|~)\s*(?:aed|dhs?|د\.إ|\$)?\s*(\d[\d,]*)/i))){
      budget = parseFloat(bm[1].replace(/,/g,''));
    } else if((bm = txt.match(/(?:aed|dhs?)\s*(\d[\d,]*)\s*(?:\/|per|each|\/?head|p\.?p|a\s*piece|pp)/i))){
      budget = parseFloat(bm[1].replace(/,/g,''));
      budgetUnit = 'per_person';
    } else if((bm = txt.match(/(\d[\d,]+)\s*(?:aed|dhs?)\s*(?:total|budget|spend)/i))){
      budget = parseFloat(bm[1].replace(/,/g,''));
      budgetUnit = 'total';
    } else if((bm = txt.match(/(?:aed|dhs?)\s*(\d[\d,]+)/i))){
      budget = parseFloat(bm[1].replace(/,/g,''));
      budgetUnit = budget >= 500 ? 'total' : 'per_person';
    }
    
    // Quantity detection
    var qty = null, qm;
    if((qm = txt.match(/(\d+)\s*(?:people|person|attendee|guest|employee|staff|hire|joiner|recipient|client|head|head)s?/i))){
      qty = parseInt(qm[1]);
    } else if((qm = txt.match(/(?:for|to|of)\s+(\d+)/i))){
      qty = parseInt(qm[1]);
    } else if((qm = txt.match(/(\d+)\s*(?:pcs?|pieces?|units?|x)/i))){
      qty = parseInt(qm[1]);
    } else if((qm = txt.match(/\b(\d{2,5})\b/))){
      // Standalone large number
      var n = parseInt(qm[1]);
      if(n>=10 && n<=10000) qty = n;
    }
    
    // Audience
    var audience = null;
    if(/exec|c.{0,2}suite|ceo|director|board|leader|partner/i.test(txt)) audience='executives';
    else if(/new.?hire|joiner|onboard|recruit/i.test(txt)) audience='new_hires';
    else if(/client|customer|account/i.test(txt)) audience='clients';
    else if(/employee|staff|team/i.test(txt)) audience='employees';
    else if(/guest|attendee|visitor/i.test(txt)) audience='guests';
    
    return {
      useCase: useCase,
      tones: tones,
      budget: budget,
      budgetUnit: budgetUnit,
      quantity: qty,
      audience: audience,
      raw: txt
    };
  }
  
  /* ─── KIT TEMPLATES ─────────────────────────────────────── */

  // Slot → category/keyword mapping (used to pick real SKUs from PDATA)
  var SLOT_MATCHERS = {
    tshirt:    {cats:['TP'], words:['t-shirt','tshirt','tee','round neck']},

  /* ─── KIT COMPOSER ──────────────────────────────────────── */
  
  function pickProductForSlot(slot, opts){
    if(typeof P==='undefined') return null;
    var matcher = SLOT_MATCHERS[slot];
    if(!matcher) return null;
    var ecoBias = opts && opts.ecoBias;
    var preferPremium = opts && opts.premium;
    var maxPrice = opts && opts.maxPrice;
    var excludeSku = opts && opts.excludeSku || [];
    
    var candidates = P.filter(function(p){
      if(!p.web || !p.cost) return false;
      if(excludeSku.indexOf(p.sku) >= 0) return false;
      if(maxPrice && p.web > maxPrice) return false;
      // Category match
      if(matcher.cats.indexOf(p.cc) < 0) return false;
      // Keyword match in title
      var title = (p.title||'').toLowerCase();
      var anyWord = matcher.words.some(function(w){return title.indexOf(w) >= 0;});
      return anyWord;
    }).map(function(p){
      var score = 100;
      if(p.stockCode === 'I') score += 50;
      else if(p.stockCode === 'O' || p.stockCode === 'D') score -= 100;
      if(ecoBias){
        var t = (p.title+' '+(p.mat||'')).toLowerCase();
        if(/recycl|bamboo|jute|organic|sustainabl|eco|cotton|cork/i.test(t)) score += 40;
      }
      if(preferPremium){
        var t2 = (p.title||'').toLowerCase();
        if(/premium|luxury|executive|leather/i.test(t2)) score += 30;
        if(p.prem && p.prem > 0) score += 10;
      }
      // Price-fit: closer to mid of available range = better
      score += Math.min(20, p.web/5);
      return {p:p, score:score};
    });
    
    candidates.sort(function(a,b){return b.score - a.score;});
    return candidates.length ? candidates[0].p : null;
  }
  
  function composeKit(template, intent){
    var picks = [];
    var used = [];
    var preferPremium = (template.tier === 'premium') || 
                        (intent.tones && intent.tones.some(function(t){return t.id==='premium';}));
    var ecoBias = intent.tones && intent.tones.some(function(t){return t.id==='eco';});
    
    template.items.forEach(function(slotDef){
      var p = pickProductForSlot(slotDef.slot, {
        ecoBias: ecoBias || slotDef.ecoBias,
        premium: preferPremium || slotDef.premium,
        excludeSku: used
      });
      if(p){
        picks.push({slot:slotDef.slot, product:p, priority:slotDef.priority});
        used.push(p.sku);
      }
    });
    
    return picks;
  }
  
  function calcKitPrice(picks, qty){
    if(typeof calcP !== 'function') return {perHead:0, total:0, items:[]};
    var perHead = 0;
    var itemDetails = [];
    picks.forEach(function(pk){
      var p = pk.product;
      // Pick default print method available
      var pm = (typeof gpm === 'function') ? gpm(p)[0] : null;
      var pmId = pm ? pm.id : 'none';
      var r = calcP(p, pmId, 1, false, qt(qty));
      var unitPrice = r ? r.px : p.web;
      perHead += unitPrice;
      itemDetails.push({sku:p.sku, title:p.title, unit:unitPrice, total:unitPrice*qty});
    });
    return {perHead:perHead, total:perHead*qty, items:itemDetails};
  }
  
  function recommend(intent){
    var kits = [];
    var products = [];
    
    // 1. KIT GENERATION
    var templatePool = intent.useCase ? (KIT_TEMPLATES[intent.useCase.id] || []) : [];
    
    // If no use case, try multiple templates
    if(!templatePool.length){
      Object.keys(KIT_TEMPLATES).forEach(function(k){
        templatePool = templatePool.concat(KIT_TEMPLATES[k]);
      });
    }
    
    // Filter by budget if specified
    if(intent.budget){
      var perPerson = intent.budgetUnit==='total' && intent.quantity 
        ? intent.budget/intent.quantity 
        : intent.budget;
      templatePool = templatePool.filter(function(t){
        return perPerson >= t.minBudget*0.6 && perPerson <= t.maxBudget*1.5;
      });
    }
    
    var qtyUsed = intent.quantity || 50;
    
    templatePool.slice(0, 4).forEach(function(template){
      var picks = composeKit(template, intent);
      if(picks.length < 2) return; // skip kits where we couldn't fill items
      var pricing = calcKitPrice(picks, qtyUsed);
      kits.push({
        template: template,
        picks: picks,
        pricing: pricing,
        qty: qtyUsed
      });
    });
    
    // Sort: featured first, then closest budget match
    kits.sort(function(a,b){
      var fa = a.template.featured ? 1 : 0;
      var fb = b.template.featured ? 1 : 0;
      if(fb-fa !== 0) return fb-fa;
      if(intent.budget){
        var ba = Math.abs(a.pricing.perHead - intent.budget);
        var bb = Math.abs(b.pricing.perHead - intent.budget);
        return ba - bb;
      }
      return 0;
    });
    
    // 2. INDIVIDUAL PRODUCT SUGGESTIONS — distinct from kit items
    var kitSkus = {};
    kits.forEach(function(k){k.picks.forEach(function(pk){kitSkus[pk.product.sku]=1;});});
    
    // Suggest top products related to detected tones/use case
    var prodCandidates = [];
    var ecoBias = intent.tones && intent.tones.some(function(t){return t.id==='eco';});
    var techBias = intent.tones && intent.tones.some(function(t){return t.id==='tech';}) ||
                   (intent.useCase && intent.useCase.id === 'tech');
    
    P.forEach(function(p){
      if(!p.web || !p.cost) return;
      if(kitSkus[p.sku]) return;
      if(intent.budget && intent.budgetUnit==='per_person' && p.web > intent.budget * 1.2) return;
      
      var score = 0;
      var title = (p.title||'').toLowerCase();
      var cat = p.cc;
      
      // Score by use case keywords
      if(intent.useCase){
        var ucWords = USECASES.find(function(u){return u.id===intent.useCase.id;});
        // Use category preferences
        if(intent.useCase.id==='vip' && (cat==='OA' || cat==='DW')) score += 20;
        if(intent.useCase.id==='tech' && cat==='TT') score += 30;
        if(intent.useCase.id==='eco' && /recycl|bamboo|jute|organic|sustainabl|eco/i.test(title)) score += 30;
        if(intent.useCase.id==='awards' && /troph|medal|plaque|award/i.test(title)) score += 40;
        if(intent.useCase.id==='sports' && cat==='JS') score += 30;
        if(intent.useCase.id==='hospitality' && (/mug|apron|coaster/i.test(title))) score += 30;
      }
      
      if(ecoBias && /recycl|bamboo|jute|organic|sustainabl|cork/i.test(title+' '+(p.mat||''))) score += 20;
      if(techBias && cat==='TT') score += 25;
      
      // Stock bonus
      if(p.stockCode === 'I') score += 15;
      else if(p.stockCode === 'O' || p.stockCode === 'D') score -= 50;
      
      if(score > 0){
        prodCandidates.push({p:p, score:score});
      }
    });
    
    prodCandidates.sort(function(a,b){return b.score - a.score;});
    products = prodCandidates.slice(0, 12).map(function(c){return c.p;});
    
    return {kits:kits, products:products, intent:intent, qty:qtyUsed};
  }
  
  /* ─── RENDERING ─────────────────────────────────────────── */
  
  function intentSentence(intent){
    var parts = [];
    if(intent.useCase) parts.push(intent.useCase.label);
    if(intent.quantity) parts.push('for ' + intent.quantity + ' recipient' + (intent.quantity>1?'s':''));
    if(intent.budget){
      parts.push('budget AED ' + intent.budget + (intent.budgetUnit==='per_person' ? ' per piece' : ' total'));
    }
    if(intent.tones && intent.tones.length){
      parts.push(intent.tones.map(function(t){return t.id;}).join(' + ') + ' tone');
    }
    return parts.length ? parts.join(' · ') : 'Open-ended product search';
  }
  
  function buildPitchText(result){
    var intent = result.intent;
    var qty = result.qty;
    var lines = [];
    lines.push('Hi,');
    lines.push('');
    if(intent.useCase){
      lines.push('Thank you for your enquiry. Based on your requirement (' + intent.useCase.label.toLowerCase() + (intent.quantity ? ' for ' + intent.quantity + ' recipients' : '') + '), here are our recommendations:');
    } else {
      lines.push('Thank you for your enquiry. Here are our recommendations based on your requirement:');
    }
    lines.push('');
    
    if(result.kits.length){
      lines.push('--- SUGGESTED KITS ---');
      lines.push('');
      result.kits.slice(0,2).forEach(function(kit,i){
        lines.push((i+1) + '. ' + kit.template.name);
        kit.picks.forEach(function(pk){
          lines.push('   • ' + pk.product.title + ' (' + pk.product.sku + ')');
        });
        lines.push('   Per-recipient: AED ' + kit.pricing.perHead.toFixed(2));
        lines.push('   Total (' + qty + ' recipients): AED ' + kit.pricing.total.toFixed(2));
        lines.push('');
      });
    }
    
    lines.push('All prices include branded customization. VAT 5% additional.');
    lines.push('');
    lines.push('Happy to refine these or quote alternatives. Let me know.');
    lines.push('');
    lines.push('Best,');
    lines.push('Merchlist Team');
    
    return lines.join('\n');
  }

  function renderProductCard(p){

    var stkCls = p.stockCode || '';

    if(typeof calcP === 'function' && typeof gpm === 'function'){
      try{

          var r = calcP(p, pm.id, 1, false, 100);
          if(r) tier = {qty:100, price:r.px};
        }
      }catch(e){}
    }

    var cachedDesc = DCACHE[p.sku];

    html += '<div class="air-c-thumb'+(imgState==='pending'?' loading':'')+'">';

  /* ─── EVENT WIRING ──────────────────────────────────────── */
  
  function wireRecommender(){
    var tx = document.getElementById('air3-tx');
    var goBtn = document.getElementById('air3-go');
    var st = readSt();
    
    function runSearch(){
      var q = (tx.value || '').trim();
      if(!q){tx.focus();return;}
      goBtn.disabled = true; goBtn.innerHTML = 'Thinking…';
      setTimeout(function(){
        var intent = parseIntent(q);
        var result = recommend(intent);
        var newSt = {q:q, res:result};
        writeSt(newSt);
        document.getElementById('air3-results').innerHTML = renderResultsBlock(result);
        wireCards();
        triggerThumbs();
        goBtn.disabled = false;
        goBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg> Recommend';
      }, 350);
    }
    
    goBtn.onclick = runSearch;
    tx.addEventListener('keydown', function(e){
      if(e.key==='Enter' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); runSearch(); }
    });
    document.querySelectorAll('.air-ex-chip').forEach(function(ch){
      ch.onclick = function(){
        tx.value = ch.getAttribute('data-ex');
        runSearch();
      };
    });
    wireCards();
    triggerThumbs();
  }
  
  function wireCards(){
    // Product card click → calculator
    document.querySelectorAll('.air-card').forEach(function(card){
      card.onclick = function(){
        var sku = card.getAttribute('data-sku');
        openInCalc(sku);
      };
    });
    // Kit item click → calculator
    document.querySelectorAll('.air-k-item').forEach(function(item){
      item.onclick = function(){
        var sku = item.getAttribute('data-sku');
        openInCalc(sku);
      };
    });
    // Kit "Open in Calc" → opens first item
    document.querySelectorAll('[data-kit-open]').forEach(function(btn){
      btn.onclick = function(e){
        e.stopPropagation();
        var idx = parseInt(btn.getAttribute('data-kit-open'));
        var st = readSt();
        if(st.res && st.res.kits[idx] && st.res.kits[idx].picks[0]){
          openInCalc(st.res.kits[idx].picks[0].product.sku);
        }
      };
    });
    // Kit "Add all to Quote"
    document.querySelectorAll('[data-kit-addall]').forEach(function(btn){
      btn.onclick = function(e){
        e.stopPropagation();
        var idx = parseInt(btn.getAttribute('data-kit-addall'));
        var st = readSt();
        if(!st.res || !st.res.kits[idx]) return;
        var kit = st.res.kits[idx];
        var qty = kit.qty;
        var added = 0;
        kit.picks.forEach(function(pk){
          var p = pk.product;
          var pm = (typeof gpm==='function') ? gpm(p)[0] : null;
          var pmId = pm ? pm.id : 'none';
          var r = (typeof calcP==='function') ? calcP(p, pmId, 1, false, qt(qty)) : null;
          if(!r) return;
          var item = {
            id: Date.now()+'-'+Math.random().toString(36).slice(2,7)+'-'+added,
            sku:p.sku, title:p.title, cat:p.cat, qty:qty,
            pm:pmId, pmName:pm?pm.n:'No print',
            sd:1, flatPrint:pm?!!pm.f:true, prem:false,
            unit:r.px, margin:r.m, lineTotal:r.px*qty,
            addedAt:Date.now()
          };
          var list = (window.readQuote||readQuote)();
          list.push(item);
          (window.writeQuote||writeQuote)(list);
          added++;
        });
        if(added>0){
          btn.classList.add('done');
          btn.innerHTML = '✓ Added '+added+' items';
          if(typeof showToast==='function'){
            showToast('Added '+added+'-item kit to Quote Builder');
          }
          if(typeof updateQuoteTabBadge==='function') updateQuoteTabBadge();
          setTimeout(function(){
            btn.classList.remove('done');
            btn.innerHTML = '+ Add Kit to Quote';
          }, 2500);
        }
      };
    });
    // Pitch copy
    var copyBtn = document.getElementById('air3-copypitch');
    if(copyBtn){
      copyBtn.onclick = function(){
        var txt = document.getElementById('air3-pitchtxt').textContent;
        navigator.clipboard.writeText(txt).then(function(){
          copyBtn.classList.add('done');
          copyBtn.innerHTML = '✓ Copied';
          setTimeout(function(){
            copyBtn.classList.remove('done');
            copyBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="1.5" rx="1"/><path d="M2 2h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Copy';
          }, 1800);
        }).catch(function(){});
      };
    }
  }
  
  function openInCalc(sku){
    var idx = P.findIndex(function(p){return p.sku===sku;});
    if(idx>=0){
      S.si = idx; S.tab = 'calc'; S.pr = false;
      var pm2 = gpm(P[S.si]);
      if(pm2.length && !pm2.find(function(m){return m.id===S.pm;})) S.pm = pm2[0].id;
      render(true);
    }
  }
  
  function triggerThumbs(){
    var thumbs = document.querySelectorAll('.air-card .air-c-thumb.loading');
    var i = 0;
    thumbs.forEach(function(t){
      var card = t.closest('.air-card');
      if(!card) return;
      var sku = card.getAttribute('data-sku');
      setTimeout(function(){
        if(typeof loadProductData!=='function') return;
        var p = P.find(function(x){return x.sku===sku;});
        if(!p) return;
        loadProductData(p, function(pd){
          var card2 = document.querySelector('.air-card[data-sku="'+sku+'"]');
          if(!card2) return;
          var thumb2 = card2.querySelector('.air-c-thumb');
          if(thumb2){
            thumb2.classList.remove('loading');
            if(pd && pd.img){
              var img = document.createElement('img');
              img.src = pd.img; img.alt = ''; img.loading = 'lazy';
              img.onerror = function(){thumb2.innerHTML = NOIMG_SVG3;};
              thumb2.innerHTML = ''; thumb2.appendChild(img);
            } else {
              thumb2.innerHTML = NOIMG_SVG3;
            }
          }
          var descEl = card2.querySelector('.air-c-desc.pending');
          if(descEl){
            if(pd && pd.desc){
              descEl.textContent = pd.desc.slice(0,140);
              descEl.classList.remove('pending');
            } else {
              descEl.textContent = '—';
              descEl.classList.remove('pending');
              descEl.classList.add('empty');
            }
          }
        });
      }, i*80);
      i++;
    });
  }
  
  function escAIR(s){
    return String(s||'').replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  
  /* ─── BOOT ──────────────────────────────────────────────── */
  // Override the V25 renderAIRecommender by hooking later
  var _v26Patched = false;
  function patchRenderV26(){
    if(_v26Patched || typeof render!=='function') return;
    _v26Patched = true;
    var orig = window.render;
    window.render = function(){
      var r = orig.apply(this, arguments);
      try{
        if(typeof S!=='undefined' && S.tab==='airec'){
          renderRecommender();
        }
      }catch(e){console.error(e);}
      return r;
    };
  }
  
  var iv = setInterval(function(){
    if(typeof render==='function' && typeof P!=='undefined'){
      clearInterval(iv);
      patchRenderV26();
      if(typeof S!=='undefined' && S.tab==='airec') renderRecommender();
    }
  }, 200);
})();
</script>

<style>
/* Slight refinement for the no-image placeholder visibility */

<script>
(function(){
  /* ════════════════════════════════════════════════════════════
     V27 FIX A: Save/Restore scroll position on every render
     Prevents page-jump when clicking print method, sides, etc.
     ════════════════════════════════════════════════════════════ */
  var _scrollGuardPatched = false;
  function patchScrollGuard(){
    if(_scrollGuardPatched || typeof render !== 'function') return;
    _scrollGuardPatched = true;
    var orig = window.render;
    window.render = function(){
      // Capture ALL scroll positions before render
      var winY = window.scrollY || document.documentElement.scrollTop || 0;
      var mnEl = document.querySelector('.mn');
      var mnY = mnEl ? mnEl.scrollTop : 0;
      var sbEl = document.querySelector('.sb');
      var sbY = sbEl ? sbEl.scrollTop : 0;
      var bodyMain = document.querySelector('.body .main');
      var bmY = bodyMain ? bodyMain.scrollTop : 0;
      
      var r = orig.apply(this, arguments);
      
      // Aggressive multi-tick restore — survives async content (images, etc.) that change page height
      function doRestore(){
        try {
          if(winY > 0 && Math.abs(window.scrollY - winY) > 3) window.scrollTo(0, winY);
          var nMn = document.querySelector('.mn');
          if(nMn && mnY > 0 && Math.abs(nMn.scrollTop - mnY) > 3) nMn.scrollTop = mnY;
          var nSb = document.querySelector('.sb');
          if(nSb && sbY > 0 && Math.abs(nSb.scrollTop - sbY) > 3) nSb.scrollTop = sbY;
          var nBm = document.querySelector('.body .main');
          if(nBm && bmY > 0 && Math.abs(nBm.scrollTop - bmY) > 3) nBm.scrollTop = bmY;
        } catch(e){}
      }
      
      // Run synchronously first
      doRestore();
      // Then at rAF, then 50ms, 150ms, 400ms to catch image-load reflows
      requestAnimationFrame(doRestore);
      setTimeout(doRestore, 50);
      setTimeout(doRestore, 150);
      setTimeout(doRestore, 400);
      
      return r;
    };
  }
  
  /* ════════════════════════════════════════════════════════════
     V27 FIX B: Robust window-exposed addCurrentToQuote
     V18 didn't expose this on window. V19's button can't reach it.
     This re-implements it at window scope using V18's window funcs.
     ════════════════════════════════════════════════════════════ */
  // Verify it's available; if not, install our own
  function ensureAddCurrentToQuote(){
    if(typeof window.addCurrentToQuote === 'function') return;
    
    window.addCurrentToQuote = function(){
      if(typeof S === 'undefined' || S.si === null) return false;
      var p = P[S.si]; if(!p) return false;
      var cur = calcP(p, S.pm, S.sd, S.pr, qt(S.qty));
      if(!cur) return false;
      var pmO = PMS.find(function(m){return m.id === S.pm;});
      
      var item = {
        id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
        sku: p.sku, title: p.title, cat: p.cat, qty: S.qty,
        pm: S.pm, pmName: pmO ? pmO.n : S.pm, sd: S.sd,
        flatPrint: pmO ? !!pmO.f : true, prem: S.pr,
        unit: cur.px, margin: cur.m, lineTotal: cur.px * S.qty,
        addedAt: Date.now()
      };
      
      var list = (window.readQuote || function(){
        try{return JSON.parse(localStorage.getItem('ml_quote_v1') || '[]');}catch(e){return [];}
      })();
      list.push(item);
      (window.writeQuote || function(arr){
        try{localStorage.setItem('ml_quote_v1', JSON.stringify(arr));}catch(e){}
      })(list);
      
      if(window.showToast) window.showToast('Added to Bulk Quote · ' + list.length + ' items');
      if(window.updateQuoteTabBadge) window.updateQuoteTabBadge();
      return true;
    };
  }
  
  /* ════════════════════════════════════════════════════════════
     V27 FIX C: Bulletproof button click handler for ALL Add buttons
     Listens at document level so it works even if button is re-rendered
     ════════════════════════════════════════════════════════════ */
  document.addEventListener('click', function(e){
    var btn = e.target.closest('#ml-addbq, .ml-addbq-btn');
    if(!btn) return;
    e.preventDefault();
    if(typeof window.addCurrentToQuote !== 'function'){
      console.error('[V28] window.addCurrentToQuote is NOT a function. V18 IIFE may have failed.');
      alert('Add to Quote unavailable — check console for [V28] errors.');
      return;
    }
    window.addCurrentToQuote();
    // Read back to confirm
    var list = [];
    try { list = JSON.parse(localStorage.getItem('ml_quote_v1') || '[]'); } catch(err){}
    btn.classList.add('done');
    var orig = btn.innerHTML;
    btn.innerHTML = '\u2713 Added (' + list.length + ' in quote)';
    setTimeout(function(){
      btn.classList.remove('done');
      btn.innerHTML = orig;
    }, 1800);
  }, false);  // bubble phase — runs AFTER inline handlers if any
  
  /* ════════════════════════════════════════════════════════════
     V27 FIX D: AI Recommender tab MUST always be present
     Independent of the chain — runs on a MutationObserver of .tb-tabs
     ════════════════════════════════════════════════════════════ */
  function ensureAITab(){
    var tabs = document.querySelector('.tb-tabs');
    if(!tabs) return;
    var airTab = tabs.querySelector('[data-tab="airec"]');
    if(!airTab){
      airTab = document.createElement('button');
      airTab.className = 'tab' + (typeof S !== 'undefined' && S.tab === 'airec' ? ' on' : '');
      airTab.setAttribute('data-tab', 'airec');
      airTab.type = 'button';
      airTab.innerHTML = '✨ AI Recommender';
      airTab.addEventListener('click', function(){
        if(typeof S === 'undefined') return;
        S.tab = 'airec';
        if(typeof render === 'function') render(true);
      });
    }
    // Always reattach to end (idempotent — appending an existing child just moves it)
    if(tabs.lastElementChild !== airTab) tabs.appendChild(airTab);
    // Toggle on-state
    airTab.classList.toggle('on', typeof S !== 'undefined' && S.tab === 'airec');
  }
  
  // Run ensureAITab continuously — every 400ms is overkill but bulletproof
  // Also via MutationObserver for instant response
  function watchTabBar(){
    var tabs = document.querySelector('.tb-tabs');
    if(!tabs) return;
    var mo = new MutationObserver(function(){
      ensureAITab();
    });
    mo.observe(tabs, {childList: true});
  }
  
  /* ════════════════════════════════════════════════════════════
     V27 FIX E: Improved image fetch with multiple proxies + diagnostics
     ════════════════════════════════════════════════════════════ */
  if(typeof window.loadProductData === 'function'){
    var ICACHE_W = (typeof ICACHE !== 'undefined') ? ICACHE : (window.ICACHE = {});
    var DCACHE_W = (typeof DCACHE !== 'undefined') ? DCACHE : (window.DCACHE = {});
    
    window.loadProductData = function(p, cb){
      if(!p || !p.sku){cb(null); return;}
      if(ICACHE_W[p.sku] !== undefined && DCACHE_W[p.sku] !== undefined){
        cb({img: ICACHE_W[p.sku], desc: DCACHE_W[p.sku], url: null});
        return;
      }
      try{
        var cached = localStorage.getItem('ml_pd_' + p.sku);
        if(cached){
          var pd = JSON.parse(cached);
          if(pd && pd._t && (Date.now() - pd._t < 7*24*60*60*1000)){
            ICACHE_W[p.sku] = pd.img || false;
            DCACHE_W[p.sku] = pd.desc || '';
            cb({img: pd.img || false, desc: pd.desc || '', url: pd.url || null});
            return;
          }
        }
      }catch(e){}
      ICACHE_W[p.sku] = null;
      DCACHE_W[p.sku] = null;
      
      var skuQ = 'https://themerchlist.com/wp-json/wc/store/v1/products?sku=' + encodeURIComponent(p.sku);
      var titleQ = 'https://themerchlist.com/wp-json/wc/store/v1/products?search=' + encodeURIComponent(p.title) + '&per_page=1';
      
      function stripHTML(s){
        return String(s||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ')
          .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')
          .replace(/\s+/g,' ').trim();
      }
      
      function parseProduct(d){
        try{
          var data = Array.isArray(d) ? d : (d && d.contents ? JSON.parse(d.contents) : d);
          if(!Array.isArray(data)) data = data ? [data] : [];
          if(!data.length) return null;
          var prod = data[0];
          return {
            img: (prod.images && prod.images[0] && prod.images[0].src) ? prod.images[0].src : null,
            desc: stripHTML(prod.short_description || prod.description || '').slice(0, 280),
            url: prod.permalink || null
          };
        }catch(e){return null;}
      }
      
      function done(r){
        var img = r && r.img || false;
        var desc = r && r.desc || '';
        var url = r && r.url || null;
        ICACHE_W[p.sku] = img;
        DCACHE_W[p.sku] = desc;
        try{
          localStorage.setItem('ml_pd_' + p.sku, JSON.stringify({img:img, desc:desc, url:url, _t:Date.now()}));
        }catch(e){}
        cb({img:img, desc:desc, url:url});
      }
      
      // Two proxies for fallback redundancy
      var PROX1 = 'https://api.allorigins.win/get?url=';
      var PROX2 = 'https://corsproxy.io/?';
      
      function tryFetch(url, mode, onResult){
        var fetchUrl;
        if(mode === 'direct') fetchUrl = url;
        else if(mode === 'p1') fetchUrl = PROX1 + encodeURIComponent(url);
        else if(mode === 'p2') fetchUrl = PROX2 + encodeURIComponent(url);
        
        var ctrl = null;
        try{ctrl = AbortSignal.timeout(7000);}catch(e){}
        fetch(fetchUrl, ctrl ? {signal: ctrl} : {})
          .then(function(r){return r.json();})
          .then(function(d){onResult(parseProduct(d));})
          .catch(function(err){onResult(null);});
      }
      
      // 6-stage fetch chain: direct/p1/p2 × sku/title
      tryFetch(skuQ, 'direct', function(r1){
        if(r1 && r1.img){done(r1); return;}
        tryFetch(skuQ, 'p1', function(r2){
          if(r2 && r2.img){done(r2); return;}
          tryFetch(skuQ, 'p2', function(r3){
            if(r3 && r3.img){done(r3); return;}
            tryFetch(titleQ, 'direct', function(r4){
              if(r4 && r4.img){done(r4); return;}
              tryFetch(titleQ, 'p1', function(r5){
                if(r5 && r5.img){done(r5); return;}
                tryFetch(titleQ, 'p2', function(r6){done(r6);});
              });
            });
          });
        });
      });
    };
    
    // Also keep backward-compat loadImg
    window.loadImg = function(p, cb){
      window.loadProductData(p, function(pd){cb(pd && pd.img ? pd.img : false);});
    };
  }
  
  /* ════════════════════════════════════════════════════════════
     V27 BOOT
     ════════════════════════════════════════════════════════════ */
  function boot(){
    patchScrollGuard();
    ensureAddCurrentToQuote();
    ensureAITab();
    watchTabBar();
  }
  
  // Boot when render() is ready (means initial DOM is ready too)
  var bootTries = 0;
  var bootInt = setInterval(function(){
    bootTries++;
    if(typeof render === 'function' && document.querySelector('.tb-tabs')){
      clearInterval(bootInt);
      boot();
      // Also re-ensure on next tick to catch late patches
      setTimeout(ensureAITab, 50);
      setTimeout(ensureAddCurrentToQuote, 50);
    } else if(bootTries > 60){
      clearInterval(bootInt);
      console.warn('[V27] Boot timeout — render() never became available');
    }
  }, 150);
  
  // Diagnostic: log on first image fetch
  
})();

<script>

     200ms polling is dead simple and works.
     ═══════════════════════════════════════════════════════════ */
  function makeAITab(){

    if(!tabs) return false;

      // Already there — ensure it's at end + correct state

     ═══════════════════════════════════════════════════════════ */
  
  var AIR4_KEY = 'ml_air4_v1';

    catch(e){return makeDefault();}
  }

  function makeDefault(){
    return {
      productType: '',
      qty: '',

      requirements: '',
      tones: [],
      results: null,
      showCount: 12
    };
  }
  
  // Product type synonyms — same dict as V25 but pruned for clarity
  var SYNS = {
    'keychain':['keychain','key chain','keyring','key ring','keytag','key holder'],
    'powerbank':['power bank','powerbank','battery pack','portable charger'],
    'charger':['charger','charging cable','adapter','charging dock'],

  };
  
  function expandQuery(productType){
    var t = (productType||'').toLowerCase().trim();
    if(!t) return [];
    var terms = [t];
    // Look up canonical synonyms
    if(SYNS[t]) terms = terms.concat(SYNS[t]);
    // Also check if 't' appears in any synonym list
    Object.keys(SYNS).forEach(function(k){
      if(SYNS[k].indexOf(t) >= 0){
        terms.push(k);
        terms = terms.concat(SYNS[k]);
      }
    });
    // Dedupe
    return terms.filter(function(x,i,arr){return arr.indexOf(x) === i;});
  }
  
  function scoreProduct(p, terms, tones, requirements){
    if(!p || !p.web || !p.cost) return 0;
    var title = (p.title||'').toLowerCase();
    var cat = (p.cat||'').toLowerCase();
    var mat = (p.mat||'').toLowerCase();
    var hay = title + ' ' + cat + ' ' + mat;
    
    var score = 0;
    var matchedTerm = '';
    
    // Term matching against title (primary)
    for(var i=0; i<terms.length; i++){
      var t = terms[i];
      if(!t || t.length < 2) continue;
      if(title.indexOf(t) >= 0){
        var s = (i === 0) ? 100 : 80;  // user's exact word > synonym
        if(title.indexOf(t) === 0) s += 10;
        if(s > score){score = s; matchedTerm = t;}
      }
    }
    // Category/material fallback
    if(score === 0){
      for(var j=0; j<terms.length; j++){
        if(terms[j] && hay.indexOf(terms[j]) >= 0){
          score = 45;
          matchedTerm = terms[j];
          break;
        }
      }
    }
    if(score === 0) return {score:0, matchedTerm:''};
    
    // Tone modifiers
    if(tones.indexOf('eco') >= 0){
      if(/recycl|bamboo|jute|organic|sustainabl|eco|cork|cotton/i.test(title+' '+mat)) score += 25;

    if(tones.indexOf('premium') >= 0){
      if(/premium|luxury|executive|leather/i.test(title)) score += 20;
      if(p.prem > 0) score += 10;
    }
    if(tones.indexOf('tech') >= 0){
      if(p.cc === 'TT' || /tech|usb|charger|battery|wireless/i.test(title)) score += 20;
    }
    
    // Free-text requirements
    if(requirements){
      var req = requirements.toLowerCase();
      if(req && hay.indexOf(req) >= 0) score += 15;
      // Split by commas
      req.split(/,|\s+/).forEach(function(w){
        if(w.length > 3 && hay.indexOf(w) >= 0) score += 5;
      });
    }
    
    // Stock bonus
    if(p.stockCode === 'I') score += 30;
    else if(p.stockCode === 'O' || p.stockCode === 'D') score -= 80;
    
    return {score:score, matchedTerm:matchedTerm};
  }
  
  function search(state){
    if(typeof P === 'undefined' || !P.length) return null;
    var terms = expandQuery(state.productType);
    if(!terms.length) return null;
    var budget = parseFloat(state.budget) || 0;
    var qty = parseInt(state.qty) || 0;
    
    var scored = [];
    P.forEach(function(p){
      var r = scoreProduct(p, terms, state.tones||[], state.requirements||'');
      if(r.score <= 0) return;
      // Budget filter
      if(budget > 0 && p.web > budget * 1.3) return;  // 30% buffer
      var withinBudget = budget > 0 ? p.web <= budget : true;
      scored.push({p:p, score:r.score, matchedTerm:r.matchedTerm, withinBudget:withinBudget});
    });
    
    scored.sort(function(a,b){
      var ba = a.withinBudget ? 1 : 0;
      var bb = b.withinBudget ? 1 : 0;
      if(bb-ba !== 0) return bb-ba;
      return b.score - a.score;
    });
    
    return {results:scored, qty:qty, budget:budget, query:state.productType};
  }
  
  /* ─── RENDERING ──────────────────────────────────────────── */
  
  function escA(s){
    return String(s||'').replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }
  
  function tierPrice(p, qty){
    if(typeof calcP !== 'function' || typeof gpm !== 'function' || typeof qt !== 'function') return null;
    try{
      var pm = gpm(p)[0];
      if(!pm) return null;
      var useQty = qty > 0 ? qty : 100;
      var r = calcP(p, pm.id, 1, false, qt(useQty));
      return r ? {qty:useQty, price:r.px} : null;
    }catch(e){return null;}
  }
  
  function renderRecommender(){
    if(typeof S === 'undefined' || S.tab !== 'airec') return;
    var body = document.querySelector('.body');
    if(!body) return;
    var mainArea = body.querySelector('.main') || body.children[body.children.length-1];
    if(!mainArea) return;
    
    var st = readSt();
    var html = '<div class="air4-wrap">';
    
    // Header
    html += '<div class="air4-head">'+
            '<div class="air4-title">\u2728 AI Recommender</div>'+
            '<div class="air4-sub">Find the right product fast. Tell me what your client wants, how many, and your budget per piece. I will surface the best matches from your full catalogue with live volume pricing.</div></div>';
    
    // Form
    html += '<div class="air4-form">'+
              '<div class="air4-grid">'+
                '<div class="air4-fld">'+
                  '<div class="air4-lbl">Product type<span class="req">*</span></div>'+
                  '<input class="air4-inp" id="air4-pt" type="text" placeholder="e.g. keychain, mug, power bank, polo shirt" value="'+escA(st.productType)+'">'+
                '</div>'+
                '<div class="air4-fld">'+
                  '<div class="air4-lbl">Quantity<span class="opt">(optional)</span></div>'+
                  '<input class="air4-inp" id="air4-qty" type="text" inputmode="numeric" placeholder="100" value="'+escA(st.qty)+'">'+
                '</div>'+
                '<div class="air4-fld">'+
                  '<div class="air4-lbl">Budget per piece<span class="opt">(optional)</span></div>'+
                  '<div class="air4-pre"><span class="air4-pre-txt">AED</span><input id="air4-bud" type="text" inputmode="decimal" placeholder="50" value="'+escA(st.budget)+'"></div>'+
                '</div>'+
              '</div>'+
              '<div class="air4-extras">'+
                '<div class="air4-extra">'+
                  '<div class="air4-lbl">Specific requirements<span class="opt">(optional)</span></div>'+
                  '<input class="air4-extras-inp" id="air4-req" type="text" placeholder="e.g. leather, eco-friendly, in stock, with strap" value="'+escA(st.requirements)+'">'+
                '</div>'+
              '</div>'+
              '<div class="air4-tones">'+
                '<span class="air4-tone-lbl">Style:</span>'+
                ['premium','eco','tech','minimal'].map(function(t){
                  var on = st.tones && st.tones.indexOf(t) >= 0 ? ' on' : '';
                  var labels = {premium:'Premium',eco:'Eco-friendly',tech:'Tech',minimal:'Minimal'};
                  return '<button class="air4-tone'+on+'" data-tone="'+t+'" type="button">'+labels[t]+'</button>';
                }).join('')+
              '</div>'+
              '<div class="air4-actions">'+
                '<div class="air4-hint">Press Enter to search · in-stock items shown first</div>'+
                '<button class="air4-go" id="air4-go" type="button">'+
                  '<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.8"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>'+
                  'Find Products'+
                '</button>'+
              '</div>'+
            '</div>';
    
    // Quick-fill chips
    html += '<div class="air4-quick">'+
              '<span class="air4-quick-lbl">Quick:</span>'+
              ['keychain','power bank','polo shirt','tote bag','water bottle','notebook','cap','mug','trophy','speaker'].map(function(q){
                return '<button class="air4-quick-chip" data-quick="'+q+'" type="button">'+q+'</button>';
              }).join('')+
            '</div>';
    
    // Results
    html += '<div id="air4-results">';
    if(st.results){
      html += renderResultsBlock(st);
    } else {
      html += '<div class="air4-empty"><div class="air4-empty-i">\uD83D\uDD0D</div>'+
              '<div class="air4-empty-t">What product is your client looking for?</div>'+
              '<div class="air4-empty-s">Enter a product type (like "keychain" or "power bank"), optionally add quantity and budget, then click Find Products. I will rank matches by relevance, prioritise in-stock items, and show live volume pricing.</div></div>';
    }
    html += '</div></div>';
    
    mainArea.innerHTML = html;
    wireForm();
    wireCards();
    triggerThumbs();
  }
  
  function renderResultsBlock(state){
    var res = state.results;
    if(!res || !res.results || !res.results.length){
      return '<div class="air4-nomatch"><strong>No matches found.</strong>Try a different product type or remove the budget. The catalogue may not have this exact item.</div>';
    }
    var visible = res.results.slice(0, state.showCount || 12);
    var hasMore = res.results.length > visible.length;
    var inBudget = state.budget && parseFloat(state.budget) > 0
      ? res.results.filter(function(r){return r.withinBudget;}).length
      : res.results.length;
    
    var html = '<div class="air4-summary">'+
      '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8l4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
      'Found <b>'+res.results.length+'</b> matches for <b>"'+escA(res.query)+'"</b>'+
      (state.budget && parseFloat(state.budget) > 0 ? ' · <b>'+inBudget+'</b> within budget' : '')+
      ' · Showing <b>'+visible.length+'</b>'+
      '</div>';
    
    html += '<div class="air4-results">';
    visible.forEach(function(r){
      html += renderCard(r, res.qty);
    });
    html += '</div>';
    
    if(hasMore){
      var remaining = res.results.length - visible.length;
      html += '<div class="air4-more" id="air4-more">\u2193 Show '+Math.min(12, remaining)+' more (of '+remaining+' remaining)</div>';
    }
    return html;
  }
  
  function renderCard(r, qty){
    var p = r.p;
    var stkMap = {I:'In Stock',O:'Out',P:'Pending',D:'Disc.'};
    var stkLabel = stkMap[p.stockCode] || '';
    var stkCls = p.stockCode || '';
    var tier = tierPrice(p, qty || 100);
    
    var cached = (typeof ICACHE !== 'undefined') ? ICACHE[p.sku] : undefined;
    var imgState = cached === false ? 'noimg' : (cached === undefined || cached === null ? 'pending' : 'ok');
    
    var noimgSvg = '<div class="air4-c-noimg"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
    
    var outOfBudget = (!r.withinBudget);
    var html = '<div class="air4-card" data-sku="'+escA(p.sku)+'"'+(outOfBudget ? ' style="opacity:.6"' : '')+'>';
    
    if(r.matchedTerm) html += '<div class="air4-c-match">'+escA(r.matchedTerm.toUpperCase())+'</div>';
    
    html += '<div class="air4-c-thumb'+(imgState === 'pending' ? ' loading' : '')+'">';
    if(imgState === 'ok'){
      html += '<img src="'+escA(cached)+'" alt="" loading="lazy">';
    } else if(imgState === 'noimg'){
      html += noimgSvg;
    }
    html += '</div>';
    
    html += '<div class="air4-c-body">'+
              '<div class="air4-c-row1">'+
                '<div class="air4-c-t">'+escA(p.title)+'</div>'+
                (stkLabel ? '<span class="air4-c-stk '+stkCls+'">'+stkLabel+'</span>' : '')+
              '</div>'+
              '<div class="air4-c-row2">'+
                '<div class="air4-c-sku">'+escA(p.sku)+'</div>'+
                '<div class="air4-c-price">AED '+(p.web||0)+'</div>'+
              '</div>';
    if(tier){
      html += '<div class="air4-c-tier"><span>At Qty '+tier.qty+'</span><span>AED '+tier.price.toFixed(2)+'/pc</span></div>';
    }
    html += '</div></div>';
    return html;
  }
  
  /* ─── EVENT WIRING ──────────────────────────────────────── */
  function wireForm(){
    var pt = document.getElementById('air4-pt');
    var qty = document.getElementById('air4-qty');
    var bud = document.getElementById('air4-bud');
    var req = document.getElementById('air4-req');
    var go = document.getElementById('air4-go');
    
    function readForm(){
      var s = readSt();
      s.productType = pt.value.trim();
      s.qty = qty.value.replace(/[^0-9]/g, '');
      s.budget = bud.value.replace(/[^0-9.]/g, '');
      s.requirements = req.value.trim();
      // tones already in state via toggle
      return s;
    }
    
    function runSearch(){
      var s = readForm();
      if(!s.productType){pt.focus(); return;}
      go.disabled = true; go.innerHTML = 'Searching\u2026';
      setTimeout(function(){
        s.results = search(s);
        s.showCount = 12;
        writeSt(s);
        document.getElementById('air4-results').innerHTML = renderResultsBlock(s);
        wireCards();
        triggerThumbs();
        go.disabled = false;
        go.innerHTML = '<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.8"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Find Products';
      }, 200);
    }
    
    go.onclick = runSearch;
    [pt, qty, bud, req].forEach(function(inp){
      inp.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){e.preventDefault(); runSearch();}
      });
    });
    
    // Tones toggle
    document.querySelectorAll('[data-tone]').forEach(function(btn){
      btn.onclick = function(){
        var s = readForm();
        var t = btn.getAttribute('data-tone');
        s.tones = s.tones || [];
        var i = s.tones.indexOf(t);
        if(i >= 0) s.tones.splice(i, 1);
        else s.tones.push(t);
        writeSt(s);
        btn.classList.toggle('on');
      };
    });
    
    // Quick chips
    document.querySelectorAll('[data-quick]').forEach(function(ch){
      ch.onclick = function(){
        pt.value = ch.getAttribute('data-quick');
        runSearch();
      };
    });
    
    // See more
    var moreBtn = document.getElementById('air4-more');
    if(moreBtn){
      moreBtn.onclick = function(){
        var s = readSt();
        s.showCount = (s.showCount || 12) + 12;
        writeSt(s);
        document.getElementById('air4-results').innerHTML = renderResultsBlock(s);
        wireCards();
        triggerThumbs();
      };
    }
  }
  
  function wireCards(){
    document.querySelectorAll('.air4-card').forEach(function(card){
      card.onclick = function(){
        var sku = card.getAttribute('data-sku');
        var idx = P.findIndex(function(p){return p.sku === sku;});
        if(idx < 0) return;
        S.si = idx; S.tab = 'calc'; S.pr = false;
        var pm2 = (typeof gpm === 'function') ? gpm(P[S.si]) : [];
        if(pm2.length && !pm2.find(function(m){return m.id === S.pm;})) S.pm = pm2[0].id;
        render(true);
      };
    });
  }
  
  function triggerThumbs(){
    if(typeof window.loadProductData !== 'function') return;
    var thumbs = document.querySelectorAll('.air4-card .air4-c-thumb.loading');
    var i = 0;
    thumbs.forEach(function(t){
      var card = t.closest('.air4-card');
      if(!card) return;
      var sku = card.getAttribute('data-sku');
      setTimeout(function(){
        var p = (typeof P !== 'undefined') ? P.find(function(x){return x.sku === sku;}) : null;
        if(!p) return;
        window.loadProductData(p, function(pd){
          var card2 = document.querySelector('.air4-card[data-sku="'+sku+'"]');
          if(!card2) return;
          var thumb2 = card2.querySelector('.air4-c-thumb');
          if(!thumb2) return;
          thumb2.classList.remove('loading');
          if(pd && pd.img){
            var img = document.createElement('img');
            img.src = pd.img; img.alt = ''; img.loading = 'lazy';
            img.onerror = function(){
              thumb2.innerHTML = '<div class="air4-c-noimg"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
            };
            thumb2.innerHTML = '';
            thumb2.appendChild(img);
          } else {
            thumb2.innerHTML = '<div class="air4-c-noimg"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
          }
        });
      }, i * 80);
      i++;
    });
  }
  
  /* ═══════════════════════════════════════════════════════════
     V28: Patch render() to call new recommender when on airec tab
     This overrides the V26 renderer
     ═══════════════════════════════════════════════════════════ */
  var _v28Patched = false;
  function patchRenderV28(){
    if(_v28Patched || typeof render !== 'function') return;
    _v28Patched = true;
    var orig = window.render;
    window.render = function(){
      var r = orig.apply(this, arguments);
      try{
        if(typeof S !== 'undefined' && S.tab === 'airec'){
          renderRecommender();
        }
      }catch(e){console.error('[V28] AI render error:', e);}
      return r;
    };
  }
  
  // Boot
  var bt = 0;
  var bi = setInterval(function(){
    bt++;
    if(typeof render === 'function' && typeof P !== 'undefined' && P.length){
      clearInterval(bi);
      patchRenderV28();
      if(typeof S !== 'undefined' && S.tab === 'airec') renderRecommender();
      
    } else if(bt > 60){
      clearInterval(bi);
      console.warn('[V28] Boot timeout');
    }
  }, 200);
  
})();
</script>
<!-- ═══════════════════ END V28 PATCH ═══════════════════ -->


<!-- ═══════════════════ MERCHLIST V29 — TIGHTENED FLOW ═══════════════════ -->
<style>
/* V29: make quote builder items clickable to edit */
.qb-item{cursor:pointer}
.qb-item .qb-it-info:hover{text-decoration:underline}
.qb-item:hover{border-color:#111}
.qb-it-edit{position:absolute;top:8px;right:42px;font-size:9px;color:#9ca3af;font-weight:700;text-transform:uppercase;letter-spacing:.4px;opacity:0;transition:opacity .15s;pointer-events:none}
.qb-item{position:relative}
.qb-item:hover .qb-it-edit{opacity:1}
</style>

<script>
(function(){
  
  /* ═══════════════════════════════════════════════════════════
     V29 FIX A: Hide AI Recommender tab (user said revisit later)
     Override V28's makeAITab to do nothing AND remove any present tab
     ═══════════════════════════════════════════════════════════ */
  // Stop V28's polling by replacing makeAITab
  // V28 already declared `setInterval(makeAITab, 200)` at module scope.
  // We can't unbind that interval. But we can REPLACE the function it calls.
  // makeAITab in V28 is a local function — not on window. 
  // Strategy: hide via CSS instead. Simpler.
  
  // Inject style to hide AI Recommender tab
  var hideStyle = document.createElement('style');
  hideStyle.id = 'v29-hide-ai';
  hideStyle.textContent = '[data-tab="airec"]{display:none!important}';
  document.head.appendChild(hideStyle);
  
  
  // If user was on AI tab, kick them back to calc
  if(typeof S !== 'undefined' && S.tab === 'airec'){
    S.tab = 'calc';
  }
  
  /* ═══════════════════════════════════════════════════════════
     V29 FIX B: SINGLE document-level click handler for bulk-add
     V28 had bubble-phase listener. V19 inline onclick was removed in
     phase 1. This is now the SOLE handler. No duplicate adds possible.
     ═══════════════════════════════════════════════════════════ */
  // The V28 handler is still in place from previous patch — it does the right
  // thing now that V19's inline is gone. Just verify it's wired right.
  // We don't add another listener; we trust the V28 one.
  
  /* ═══════════════════════════════════════════════════════════
     V29 FIX C: Quote Builder items → click to edit in Calculator
     Adds click handler to .qb-item that loads the SKU in calc with
     ORIGINAL config (qty, pm, sd, prem) restored.
     ═══════════════════════════════════════════════════════════ */
  document.addEventListener('click', function(e){
    // Ignore clicks on the remove button or buttons in general
    if(e.target.closest('[data-rm], button')) return;
    var item = e.target.closest('.qb-item');
    if(!item) return;
    
    var itemId = item.getAttribute('data-id');
    if(!itemId) return;
    
    var list = (window.readQuote || function(){
      try{return JSON.parse(localStorage.getItem('ml_quote_v1')||'[]');}catch(err){return [];}
    })();
    var entry = list.find(function(x){return x.id === itemId;});
    if(!entry) return;
    
    // Find the product index
    var idx = (typeof P !== 'undefined') ? P.findIndex(function(p){return p.sku === entry.sku;}) : -1;
    if(idx < 0){
      console.warn('[V29] Quote item product not found:', entry.sku);
      return;
    }
    
    // Restore full config in S
    S.si = idx;
    S.qty = entry.qty || 100;
    S.pm = entry.pm || 'dtf';
    S.sd = entry.sd || 1;
    S.pr = !!entry.prem;
    S.tab = 'calc';
    
    if(typeof render === 'function') render(true);
    
  }, false);
  
  /* ═══════════════════════════════════════════════════════════
     V29 FIX D: Add "EDIT" hint on QB items + smarter wiring
     This patches the renderQuoteBuilder to add the hint label
     ═══════════════════════════════════════════════════════════ */
  // Patch the .qb-items rendering to include an edit hint via a MutationObserver
  function addEditHints(){
    document.querySelectorAll('.qb-item:not([data-edit-hint])').forEach(function(item){
      item.setAttribute('data-edit-hint', '1');
      var hint = document.createElement('span');
      hint.className = 'qb-it-edit';
      hint.textContent = 'CLICK TO EDIT';
      item.appendChild(hint);
    });
  }
  setInterval(addEditHints, 300);
  
  /* ═══════════════════════════════════════════════════════════
     V29 FIX E: Image loading — better diagnostics + fallback
     Logs every SKU's fetch outcome so user can identify mismatches
     ═══════════════════════════════════════════════════════════ */
  if(typeof window.loadProductData === 'function'){
    var origLPD = window.loadProductData;
    var fetchStats = {success:0, fail:0, cached:0};
    
    window.loadProductData = function(p, cb){
      if(!p || !p.sku){cb(null); return;}
      
      // Check if it was already attempted
      var preCache = (typeof ICACHE !== 'undefined') ? ICACHE[p.sku] : undefined;
      if(preCache !== undefined){
        fetchStats.cached++;
        return origLPD(p, cb);
      }
      
      return origLPD(p, function(result){
        if(result && result.img){
          fetchStats.success++;
        } else {
          fetchStats.fail++;
          console.log('[V29 img-fetch] FAIL for SKU', p.sku, '(title:', p.title.slice(0,40)+'...) — not in WooCommerce or CORS blocked');
        }
        // Every 10 attempts, log running totals
        if((fetchStats.success + fetchStats.fail) % 10 === 0){
          console.log('[V29 img-stats]', fetchStats);
        }
        cb(result);
      });
    };
  }
  
  /* ═══════════════════════════════════════════════════════════
     V29 BOOT
     ═══════════════════════════════════════════════════════════ */
  
})();
</script>
<!-- ═══════════════════ END V29 PATCH ═══════════════════ -->
