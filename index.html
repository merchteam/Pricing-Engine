var ICACHE={};
function loadImg(p,cb){
  if(ICACHE[p.sku]!==undefined){cb(ICACHE[p.sku]);return;}
  ICACHE[p.sku]=null;
  var apiUrl="https://themerchlist.com/wp-json/wc/store/v1/products?search="+encodeURIComponent(p.title)+"&per_page=1";
  fetch(PROX+encodeURIComponent(apiUrl),{signal:AbortSignal.timeout(8000)})
    .then(function(r){return r.json();})
    .then(function(d){
      try{
        var data=JSON.parse(d.contents||"[]");
        if(Array.isArray(data)&&data[0]&&data[0].images&&data[0].images[0]&&data[0].images[0].src){
          ICACHE[p.sku]=data[0].images[0].src;cb(ICACHE[p.sku]);return;
        }
      }catch(e){}
      // Fallback: scrape themerchlist.com product page
      var pgUrl="https://themerchlist.com/customize/"+encodeURIComponent(p.title.toLowerCase().replace(/[^a-z0-9]+/g,"-"))+"/";
      fetch(PROX+encodeURIComponent(pgUrl),{signal:AbortSignal.timeout(6000)})
        .then(function(r2){return r2.json();})
        .then(function(d2){
          try{
            var h=d2.contents||"";
            var m=h.match(/"src":"(https:\/\/themerchlist\.com\/wp-content\/uploads\/[^"]+\.(?:jpg|jpeg|png|webp))"/i);
            if(!m)m=h.match(/class="[^"]*wp-post-image[^"]*"[^>]*src="([^"]+)"/);
            if(m&&m[1]){ICACHE[p.sku]=m[1];cb(m[1]);return;}
          }catch(e){}
          ICACHE[p.sku]=false;cb(false);
        }).catch(function(){ICACHE[p.sku]=false;cb(false);});
    }).catch(function(){ICACHE[p.sku]=false;cb(false);});
}

// ── FUZZY SEARCH ─────────────────────────────────────────────────────────
// Normalises input so "tshirt" matches "t-shirt", "polo shirt" matches "polo",
// single-char typos are tolerated (Levenshtein ≤1 on individual words).
function normStr(s){
  return s.toLowerCase()
    .replace(/[-_]/g,' ')        // t-shirt → t shirt
    .replace(/\s+/g,' ')
    .trim();
}
// Alias map: common alternate spellings / abbreviations
var ALIASES={
  'tshirt':'t shirt','tshirts':'t shirts',
  'hoodie':'hoodies','hoodies':'hoodie',
  'polo':'polo shirt','polos':'polo shirt',
  'cap':'baseball cap','caps':'baseball cap',
  'mug':'ceramic mug','bottle':'water bottle',
  'bag':'tote bag','bags':'tote bag',
  'notebook':'notebook','notepad':'notebook',
  'pen':'ballpoint pen','pens':'metal pen',
  'powerbank':'power bank','power bank':'powerbank',
  'usb':'usb stick'
};
function expandQuery(q){
  var n=normStr(q),words=n.split(' '),extra=[];
  words.forEach(function(w){if(ALIASES[w])extra.push(ALIASES[w]);});
  return [n].concat(extra);
}
function levenshtein(a,b){
  if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;
  var m=[];
  for(var i=0;i<=b.length;i++){m[i]=[i];for(var j=1;j<=a.length;j++){m[i][j]=i===0?j:Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(b[i-1]!==a[j-1]?1:0));}}
  return m[b.length][a.length];
}
function fuzzyScore(haystack,queries){
  var h=normStr(haystack),best=0;
  queries.forEach(function(q){
    // exact substring
    if(h.indexOf(q)>=0){best=Math.max(best,1);return;}
    // word-level fuzzy: all query words must match within distance 1
    var qWords=q.split(' '),hWords=h.split(' ');
    var allMatch=qWords.every(function(qw){
      return hWords.some(function(hw){
        if(hw.indexOf(qw)>=0||qw.indexOf(hw)>=0)return true;
        if(qw.length>=4&&levenshtein(qw,hw)<=1)return true;
        return false;
      });
    });
    if(allMatch)best=Math.max(best,0.8);
  });
  return best;
}
function fuzzyFilter(products,query){
  var queries=expandQuery(query);
  var scored=products.map(function(p){
    var ts=fuzzyScore(p.title,queries);
    var ss=fuzzyScore(p.sku,queries)*0.9;  // SKU match slightly lower priority
    return{p:p,score:Math.max(ts,ss)};
  }).filter(function(x){return x.score>0;});
  scored.sort(function(a,b){return b.score-a.score;});
  return scored.map(function(x){return x.p;});
}

      (pmMoq?"<div class='moq-warn'>\u26A0 "+pmO.n+" requires min "+pmO.q+" units</div>":"")+
      "</div><div id='OA'></div>";
  }
  var listH=fl.slice(0,300).map(function(fp){
    var ri=P.indexOf(fp),gp=gridOf(fp);
    return"<div class='pi"+(S.si===ri?" sel":"")+"' data-i='"+ri+"'><div class='pi-dot "+gp+"'></div><div class='pi-info'><div class='pi-n'>"+he(fp.title)+"</div><div class='pi-m'>"+he(fp.sku)+(!fp.stock?" \u00B7 <span class='pi-oos'>OOS</span>":"")+"</div></div><div class='pi-p'>"+fp.web+"</div></div>";
  }).join("")+(fl.length>300?"<div style='padding:8px;text-align:center;font-size:10px;color:#9ca3af'>Showing 300 of "+fl.length+"</div>":"")+(fl.length===0?"<div style='padding:16px;text-align:center;font-size:11px;color:#9ca3af'>No products found</div>":"");
  app.innerHTML="<div class='app'><div class='topbar'><div class='tb-l'><span class='tb-logo'>MERCHLIST</span><span class='tb-v'>v13</span><div class='tb-tabs'><button class='tab "+(S.tab==="calc"?"on":"")+"' data-tab='calc' type='button'>Calculator</button><button class='tab "+(S.tab==="finder"?"on":"")+"' data-tab='finder' type='button'>Product Finder</button></div></div><span class='tb-r'>INTERNAL USE ONLY</span></div><div class='body'><div class='sb'><div class='sf'><input class='sf-inp' id='sIn' placeholder='Search name or SKU\u2026' value='"+he(S.q)+"'><div class='sf-row'><select class='sf-sel' id='cSel'><option value='ALL'>All Categories</option>"+cats.map(function(c){return"<option value='"+he(c)+"' "+(S.cf===c?"selected":"")+">"+he(c)+"</option>";}).join("")+"</select><select class='sf-sel' id='gSel' style='flex:0 0 88px'><option value='ALL'>All Grids</option><option value='S' "+(S.gf==="S"?"selected":"")+">Softline</option><option value='H' "+(S.gf==="H"?"selected":"")+">Hardline</option><option value='C' "+(S.gf==="C"?"selected":"")+">Custom</option></select></div><div class='sf-cnt'>"+fl.length+" products</div></div><div class='plist'>"+listH+"</div></div><div class='mn'>"+main+"</div></div></div>";
  if(keep){var mn2=document.querySelector(".mn");if(mn2)mn2.scrollTop=sy;}
  if(p&&!isC(p)&&ICACHE[p.sku]===undefined){
    loadImg(p,function(url){var el=document.getElementById("phImg");if(el){el.classList.remove("img-loading");el.innerHTML=url?"<img src='"+url+"' alt='' onerror=\"this.parentNode.innerHTML='\uD83D\uDCE6'\">":"\uD83D\uDCE6";}});
  }
  var sIn=document.getElementById("sIn");
  if(sIn){sIn.oninput=function(){S.q=this.value;var pos=this.selectionStart;render();var e=document.getElementById("sIn");if(e){e.focus();try{e.setSelectionRange(pos,pos);}catch(x){}}};}
  document.getElementById("cSel").onchange=function(){S.cf=this.value;render();};
  document.getElementById("gSel").onchange=function(){S.gf=this.value;render();};
  document.querySelectorAll("[data-tab]").forEach(function(el){el.onclick=function(){S.tab=el.getAttribute("data-tab");render();};});
  document.querySelectorAll(".pi").forEach(function(el){el.onclick=function(){S.si=parseInt(el.getAttribute("data-i"));S.pr=false;var pm2=gpm(P[S.si]);if(!pm2.find(function(m){return m.id===S.pm;}))S.pm=pm2[0]?pm2[0].id:"dtf";render();};});
  document.querySelectorAll("[data-pm]").forEach(function(el){el.onclick=function(){S.pm=el.getAttribute("data-pm");var pm=PMS.find(function(m){return m.id===S.pm;});if(pm&&pm.f)S.sd=1;render(true);};});
  document.querySelectorAll("[data-sd]").forEach(function(el){el.onclick=function(){S.sd=parseInt(el.getAttribute("data-sd"));render(true);};});
  document.querySelectorAll("[data-fb]").forEach(function(el){el.onclick=function(){S.pr=el.getAttribute("data-fb")==="1";render(true);};});
  // Finder
  var fIn=document.getElementById("fIn"),fGo=document.getElementById("fGo");
  if(fIn){fIn.oninput=function(){S.fq=this.value;};fIn.onkeydown=function(e){if(e.key==="Enter"&&fGo)fGo.click();};}
  if(fGo){fGo.onclick=function(){
    if(!S.fq||!S.fq.trim())return;
    S.fl=true;S.fr=null;render();
    setTimeout(function(){
      var queries=expandQuery(S.fq);
      var results=P.map(function(p){
        var ts=fuzzyScore(p.title,queries);
        var ss=fuzzyScore(p.sku,queries)*0.9;
        return{p:p,score:Math.max(ts,ss)};
      }).filter(function(x){return x.score>0;}).sort(function(a,b){return b.score-a.score;}).slice(0,10);
      S.fr=results;S.fl=false;render();
    },30);
  };}
  document.querySelectorAll("[data-fu]").forEach(function(el){el.onclick=function(){S.si=parseInt(el.getAttribute("data-fu"));S.tab="calc";render();};});
  updOut();
}
render();
</script>
<style>
  /* Hide the old dark PIN screen — replaced by our gate */
  .pin-ov { display: none !important; }

  /* ── Gate overlay ── */
  #ml-gate {
    position: fixed; inset: 0; z-index: 9999;
    background: #f9fafb;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    animation: gFadeIn .25s ease;
  }
  @keyframes gFadeIn { from { opacity: 0 } to { opacity: 1 } }

  .ml-card {
    background: #fff;
    border: 1.5px solid #e5e7eb;
    border-radius: 24px;
    padding: 48px 40px 40px;
    width: 100%; max-width: 420px;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0,0,0,.06);
  }

  .ml-wordmark {
    display: inline-flex; align-items: center; gap: 7px;
    margin-bottom: 28px;
  }
  .ml-dot {
    width: 8px; height: 8px;
    background: #16a34a; border-radius: 50%;
  }
  .ml-brand {
    font-size: 11px; font-weight: 900;
    letter-spacing: 5px; color: #111;
  }

  .ml-title {
    font-size: 26px; font-weight: 800;
    color: #111; margin-bottom: 6px;
    letter-spacing: -.4px;
  }
  .ml-sub {
    font-size: 13px; color: #9ca3af;
    margin-bottom: 32px; line-height: 1.5;
  }

  .ml-field { margin-bottom: 10px; text-align: left; }
  .ml-label {
    display: block;
    font-size: 11px; font-weight: 700;
    color: #6b7280; letter-spacing: .4px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .ml-inp {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid #e5e7eb; border-radius: 10px;
    font-size: 14px; color: #111;
    background: #fff; outline: none;
    transition: border-color .15s, box-shadow .15s;
    box-sizing: border-box;
  }
  .ml-inp:focus {
    border-color: #16a34a;
    box-shadow: 0 0 0 3px rgba(22,163,74,.1);
  }
  .ml-inp.ml-err-inp { border-color: #dc2626; }

  .ml-btn {
    width: 100%; padding: 15px;
    background: #111; color: #fff;
    border: none; border-radius: 10px;
    font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 6px;
    letter-spacing: .3px;
    transition: background .15s, transform .1s;
  }
  .ml-btn:hover { background: #16a34a; }
  .ml-btn:active { transform: scale(.98); }

  .ml-err {
    color: #dc2626; font-size: 12px;
    margin-top: 10px; min-height: 18px;
    font-weight: 500;
  }
  .ml-footer {
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid #f3f4f6;
    font-size: 11px; color: #d1d5db;
    line-height: 1.6;
  }
  .ml-footer strong { color: #9ca3af; }

  /* ── Welcome flash ── */
  #ml-welcome {
    position: fixed; inset: 0; z-index: 9999;
    background: #fff;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    animation: wFade .6s ease forwards;
    pointer-events: none;
  }
  @keyframes wFade {
    0%   { opacity: 1 }
    60%  { opacity: 1 }
    100% { opacity: 0 }
  }
  .ml-wm { font-size: 11px; font-weight: 900; letter-spacing: 5px; color: #16a34a; margin-bottom: 12px; }
  .ml-wt { font-size: 22px; font-weight: 800; color: #111; }

  /* ── User badge in topbar ── */
  #ml-user-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: #f0fdf4; border: 1px solid #bbf7d0;
    border-radius: 20px; cursor: pointer;
  }
  #ml-user-badge .uav {
    width: 20px; height: 20px; border-radius: 50%;
    background: #16a34a; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800;
  }
  #ml-user-badge .unm {
    font-size: 11px; font-weight: 700; color: #15803d;
  }
</style>

<script>
(function () {
  var KEY = 'ml_user_v1';
  var DOMAIN = '@themerchlist.com';

  /* ── 1. Check if already registered ── */
  function getUser() {
    try {
      var raw = localStorage.getItem(KEY);
      if (!raw) return null;
      var u = JSON.parse(raw);
      if (u && u.name && u.email && u.email.endsWith(DOMAIN)) return u;
    } catch (e) {}
    localStorage.removeItem(KEY);
    return null;
  }

  /* ── 2. Grant access ── */
  function grantAccess(user, isNew) {
    window._ML_USER = user;

    // Bypass the old PIN screen
    if (typeof S !== 'undefined') { S.u = true; }
    if (typeof render === 'function') { render(); }

    if (isNew) {
      showWelcome(user);
    }

    // Inject user badge into topbar
    setTimeout(function () {
      injectBadge(user);
    }, isNew ? 700 : 100);
  }

  /* ── 3. Welcome flash (new registrations only) ── */
  function showWelcome(user) {
    var w = document.createElement('div');
    w.id = 'ml-welcome';
    var first = user.name.split(' ')[0];
    w.innerHTML =
      '<div class="ml-wm">MERCHLIST</div>' +
      '<div class="ml-wt">Welcome, ' + esc(first) + ' 👋</div>';
    document.body.appendChild(w);
    setTimeout(function () { w && w.remove(); }, 700);
  }

  /* ── 4. User badge in topbar ── */
  function injectBadge(user) {
    var tb = document.querySelector('.tb-r');
    if (!tb) return;
    var initials = user.name.split(' ').map(function (w) { return w[0]; }).join('').toUpperCase().slice(0, 2);
    var first = user.name.split(' ')[0];
    var badge = document.createElement('div');
    badge.id = 'ml-user-badge';
    badge.title = 'Signed in as ' + user.email + '\nClick to sign out';
    badge.innerHTML =
      '<div class="uav">' + esc(initials) + '</div>' +
      '<div class="unm">' + esc(first) + '</div>';
    badge.onclick = function () {
      if (confirm('Sign out of Merchlist Pricing Engine?\n\nYou will need to register again next visit.')) {
        localStorage.removeItem(KEY);
        location.reload();
      }
    };
    tb.replaceWith(badge);
  }

  /* ── 5. Show registration gate ── */
  function showGate() {
    var gate = document.createElement('div');
    gate.id = 'ml-gate';
    gate.innerHTML =
      '<div class="ml-card">' +
        '<div class="ml-wordmark"><div class="ml-dot"></div><div class="ml-brand">MERCHLIST</div></div>' +
        '<div class="ml-title">Sales Tool Access</div>' +
        '<div class="ml-sub">Register with your Merchlist email to<br>open the Pricing Engine.</div>' +
        '<div class="ml-field"><label class="ml-label">Full Name</label>' +
          '<input class="ml-inp" id="ml-name" type="text" placeholder="e.g. Akhil Sharma" autocomplete="name"></div>' +
        '<div class="ml-field"><label class="ml-label">Work Email</label>' +
          '<input class="ml-inp" id="ml-email" type="email" placeholder="you@themerchlist.com" autocomplete="email"></div>' +
        '<button class="ml-btn" id="ml-submit">Access Pricing Engine →</button>' +
        '<div class="ml-err" id="ml-err"></div>' +
        '<div class="ml-footer"><strong>Staff only</strong> · Requires @themerchlist.com · Your access is saved on this device</div>' +
      '</div>';
    document.body.appendChild(gate);

    // Focus first field
    setTimeout(function () {
      var n = document.getElementById('ml-name');
      if (n) n.focus();
    }, 80);

    // Tab between fields on Enter
    document.getElementById('ml-name').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('ml-email').focus(); }
    });
    document.getElementById('ml-email').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { e.preventDefault(); submit(); }
    });
    document.getElementById('ml-submit').addEventListener('click', submit);
  }

  /* ── 6. Submit handler ── */
  function submit() {
    var nameEl  = document.getElementById('ml-name');
    var emailEl = document.getElementById('ml-email');
    var errEl   = document.getElementById('ml-err');
    var name    = nameEl.value.trim();
    var email   = emailEl.value.trim().toLowerCase();

    nameEl.classList.remove('ml-err-inp');
    emailEl.classList.remove('ml-err-inp');
    errEl.textContent = '';

    if (!name) {
      nameEl.classList.add('ml-err-inp');
      errEl.textContent = 'Please enter your full name.';
      nameEl.focus(); return;
    }
    if (!email) {
      emailEl.classList.add('ml-err-inp');
      errEl.textContent = 'Please enter your work email.';
      emailEl.focus(); return;
    }
    if (!email.endsWith(DOMAIN)) {
      emailEl.classList.add('ml-err-inp');
      errEl.textContent = 'Must be a @themerchlist.com email address.';
      emailEl.focus(); return;
    }

    var user = { name: name, email: email, since: Date.now() };
    localStorage.setItem(KEY, JSON.stringify(user));

    // Remove gate smoothly
    var gate = document.getElementById('ml-gate');
    if (gate) {
      gate.style.transition = 'opacity .25s';
      gate.style.opacity = '0';
      setTimeout(function () { gate.remove(); }, 260);
    }

    grantAccess(user, true);
  }

  /* ── 7. Escape HTML helper ── */
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  /* ── 8. Boot ── */
  var user = getUser();
  if (user) {
    grantAccess(user, false);
  } else {
    showGate();
  }

})();
</script>
</body></html>
